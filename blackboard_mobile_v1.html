<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>blackboard_mobile_v1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&family=Kosugi+Maru&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family:'M PLUS Rounded 1c',sans-serif; touch-action:manipulation; -webkit-tap-highlight-color:transparent; }
    .canvas-bg {
      background-image:repeating-linear-gradient(45deg,#e5e7eb 25%,transparent 25%,transparent 75%,#e5e7eb 75%,#e5e7eb),
                       repeating-linear-gradient(45deg,#e5e7eb 25%,#f3f4f6 25%,#f3f4f6 75%,#e5e7eb 75%,#e5e7eb);
      background-position:0 0,10px 10px; background-size:20px 20px;
    }
    input[type=range]{height:34px;-webkit-appearance:none;width:100%;background:transparent;cursor:pointer}
    input[type=range]::-webkit-slider-runnable-track{height:8px;background:#cbd5e1;border-radius:4px}
    input[type=range]::-webkit-slider-thumb{height:26px;width:26px;border-radius:50%;background:#2563eb;-webkit-appearance:none;margin-top:-9px;box-shadow:0 2px 4px rgba(0,0,0,.4);border:2px solid white}
    .tab-active{background-color:#1e40af!important;color:white!important}
    .btn-pos-active{background-color:#d1fae5!important;border-color:#059669!important;color:#065f46!important;font-weight:bold}
    button:active{transform:scale(0.96)}
    input:focus,select:focus,textarea:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.15)}
    .sr-input{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0;opacity:0}
    #canvasWrap.drag-mode #mainCanvas{cursor:grab}
    #canvasWrap.drag-mode #mainCanvas:active{cursor:grabbing}
    .size-pill{display:inline-flex;align-items:center;padding:5px 10px;border:2px solid #cbd5e1;border-radius:999px;cursor:pointer;font-size:.78rem;font-weight:bold;user-select:none;transition:.12s;background:white;color:#374151}
    .size-pill.active{border-color:#2563eb;background:#dbeafe;color:#1e40af}
    .sub-tab-active{background-color:#dbeafe!important;color:#1e40af!important;border-bottom:3px solid #2563eb!important;font-weight:bold}
  </style>
</head>
<body class="bg-gray-100 text-gray-900 pb-24">

<header class="bg-slate-800 text-white px-4 py-3 sticky top-0 z-50 shadow-lg flex items-center justify-between">
  <h1 class="text-base font-bold flex items-center gap-2">
    <span class="material-icons text-xl">construction</span>blackboard_mobile_v1
  </h1>
  <span id="currentFileLabel" class="text-xs bg-slate-600 px-2 py-1 rounded-full truncate max-w-[180px]">画像未選択</span>
</header>

<div class="max-w-6xl mx-auto px-3 mt-4 flex flex-col lg:flex-row gap-5">

  <!-- ===== 左列: キャンバス ===== -->
  <div class="w-full lg:w-3/5 flex flex-col gap-3">

    <!-- ドロップゾーン -->
    <div id="dropZone" class="border-4 border-dashed border-gray-300 rounded-2xl p-3 bg-white relative hover:border-blue-400 transition-colors">
      <div id="dragOverlay" class="absolute inset-0 bg-blue-50/90 hidden items-center justify-center rounded-xl z-10 pointer-events-none">
        <span class="text-xl font-bold text-blue-600 flex items-center gap-2">
          <span class="material-icons text-3xl">add_photo_alternate</span>ここにドロップ
        </span>
      </div>
      <input type="file" id="fileInput"   accept="image/*" class="sr-input" multiple />
      <input type="file" id="cameraInput" accept="image/*" capture="environment" class="sr-input" />
      <div class="grid grid-cols-2 gap-3">
        <button id="btnCamera" type="button" class="border-4 border-blue-400 rounded-2xl p-2 flex flex-col items-center h-20 bg-white hover:bg-blue-50 shadow-md">
          <span class="material-icons text-3xl text-blue-600">photo_camera</span>
          <span class="font-bold text-blue-800 text-xs mt-1">カメラ</span>
        </button>
        <button id="btnFile" type="button" class="border-4 border-gray-300 rounded-2xl p-2 flex flex-col items-center h-20 bg-white hover:bg-gray-50 shadow-md">
          <span class="material-icons text-3xl text-gray-500">photo_library</span>
          <span class="font-bold text-gray-700 text-xs mt-1">アルバム/PC</span>
        </button>
      </div>
    </div>

    <!-- キャンバス -->
    <div id="canvasWrap" class="canvas-bg rounded-xl overflow-hidden border-2 border-gray-300 shadow-inner relative">
      <div id="loading" class="hidden absolute inset-0 bg-white/90 z-20 flex flex-col items-center justify-center">
        <div class="animate-spin rounded-full h-12 w-12 border-b-4 border-blue-600 mb-2"></div>
        <span class="font-bold text-gray-600">処理中...</span>
      </div>
      <canvas id="mainCanvas" class="w-full h-auto block mx-auto" style="max-height:75vh"></canvas>
    </div>

    <!-- ドラッグモード -->
    <div class="flex items-center gap-3 bg-white rounded-xl px-4 py-2 border border-gray-200 shadow-sm">
      <label class="flex items-center gap-2 cursor-pointer select-none">
        <input type="checkbox" id="dragModeToggle" class="w-5 h-5 rounded text-blue-600" />
        <span class="font-bold text-gray-700 text-sm flex items-center gap-1">
          <span class="material-icons text-base text-blue-500">open_with</span>黒板をドラッグで移動
        </span>
      </label>
      <button onclick="resetBoardPosition()" class="ml-auto text-xs text-gray-500 underline hover:text-gray-700">位置リセット</button>
    </div>

    <!-- 画像ナビ -->
    <div id="imageNav" class="hidden items-center justify-between bg-white p-2 rounded-xl shadow-sm border border-gray-200">
      <button onclick="prevImage()" class="flex items-center gap-1 px-3 py-2 bg-gray-100 rounded-lg font-bold hover:bg-gray-200 text-sm">
        <span class="material-icons text-base">arrow_back</span>前へ
      </button>
      <span class="font-bold"><span id="currentImageNum">1</span> / <span id="totalImageNum">1</span></span>
      <button onclick="nextImage()" class="flex items-center gap-1 px-3 py-2 bg-gray-100 rounded-lg font-bold hover:bg-gray-200 text-sm">
        次へ<span class="material-icons text-base">arrow_forward</span>
      </button>
    </div>

    <!-- 保存・共有 -->
    <div class="grid grid-cols-2 gap-3">
      <button id="btnDownload" class="bg-blue-600 text-white font-bold py-3 rounded-xl shadow-lg flex flex-col items-center border-b-4 border-blue-800 hover:bg-blue-700 gap-1">
        <span class="material-icons text-xl">download</span><span class="text-xs">端末に保存</span>
      </button>
      <button id="btnShare" class="bg-green-600 text-white font-bold py-3 rounded-xl shadow-lg flex flex-col items-center border-b-4 border-green-800 hover:bg-green-700 gap-1">
        <span class="material-icons text-xl">share</span><span class="text-xs">共有</span>
      </button>
    </div>
  </div>

  <!-- ===== 右列: 操作パネル ===== -->
  <div class="w-full lg:w-2/5 flex flex-col gap-3">

    <!-- タブ（バッチなし・4タブ） -->
    <div class="flex rounded-xl overflow-hidden border-2 border-blue-600 bg-white shadow-md text-xs">
      <button type="button" onclick="switchTab('settings')" id="btn-tab-settings" class="tab-btn flex-1 py-2.5 font-bold text-blue-700 hover:bg-blue-50 flex flex-col items-center tab-active">
        <span class="material-icons text-lg">tune</span>設定
      </button>
      <button type="button" onclick="switchTab('site')" id="btn-tab-site" class="tab-btn flex-1 py-2.5 font-bold text-blue-700 hover:bg-blue-50 flex flex-col items-center border-l border-blue-300">
        <span class="material-icons text-lg">business</span>現場
      </button>
      <button type="button" onclick="switchTab('content')" id="btn-tab-content" class="tab-btn flex-1 py-2.5 font-bold text-blue-700 hover:bg-blue-50 flex flex-col items-center border-l border-blue-300">
        <span class="material-icons text-lg">edit_note</span>内容
      </button>
      <button type="button" onclick="switchTab('adjust')" id="btn-tab-adjust" class="tab-btn flex-1 py-2.5 font-bold text-blue-700 hover:bg-blue-50 flex flex-col items-center border-l border-blue-300">
        <span class="material-icons text-lg">format_size</span>調整
      </button>
    </div>

    <!-- ===== TAB: 設定 ===== -->
    <div id="tab-settings" class="tab-content bg-white rounded-xl shadow-md border-2 border-gray-200 p-4 space-y-4">

      <div>
        <label class="block font-bold text-gray-700 mb-2 text-sm">黒板の位置</label>
        <div class="grid grid-cols-2 gap-2">
          <button type="button" onclick="setBoardPos('left')"  id="pos-btn-left"  class="py-2.5 rounded-lg font-bold border-2 border-gray-300 bg-white hover:bg-gray-50 text-sm">◀ 左下</button>
          <button type="button" onclick="setBoardPos('right')" id="pos-btn-right" class="py-2.5 rounded-lg font-bold border-2 border-gray-300 bg-white hover:bg-gray-50 text-sm btn-pos-active">右下 ▶</button>
        </div>
      </div>

      <div>
        <label class="block font-bold text-gray-700 mb-2 text-sm">黒板の色</label>
        <select id="boardColor" class="w-full p-2.5 border-2 border-gray-300 rounded-lg font-bold text-gray-800 bg-gray-50 text-sm">
          <option value="green">緑（標準）</option>
          <option value="black">黒板（黒）</option>
          <option value="white">ホワイトボード</option>
          <option value="blue">青（現場用）</option>
        </select>
      </div>

      <div>
        <label class="block font-bold text-gray-700 mb-2 text-sm">黒板の大きさ</label>
        <div class="flex flex-wrap gap-2" id="sizePillGroup">
          <span class="size-pill" data-size="xs">極小</span>
          <span class="size-pill" data-size="s">小</span>
          <span class="size-pill" data-size="sm">小＋</span>
          <span class="size-pill active" data-size="m">中</span>
          <span class="size-pill" data-size="ml">中＋</span>
          <span class="size-pill" data-size="l">大</span>
        </div>
      </div>

      <div>
        <label class="block font-bold text-gray-700 mb-2 text-sm">工種ラベル</label>
        <div class="grid grid-cols-2 gap-2">
          <label class="flex items-center gap-2 cursor-pointer bg-white p-2 rounded-lg border-2 border-gray-300 text-sm">
            <input type="radio" name="labelType" value="worktype" class="text-blue-600"> <span class="font-bold">工種</span>
          </label>
          <label class="flex items-center gap-2 cursor-pointer bg-white p-2 rounded-lg border-2 border-gray-300 text-sm">
            <input type="radio" name="labelType" value="place" checked class="text-blue-600"> <span class="font-bold">工事場所</span>
          </label>
        </div>
      </div>

      <div class="space-y-2">
        <label class="flex items-center gap-3 cursor-pointer select-none">
          <input type="checkbox" id="toggleBoard" class="w-5 h-5 rounded text-blue-600" checked />
          <span class="font-bold text-gray-700 text-sm">黒板を表示する</span>
        </label>
        <label class="flex items-center gap-3 cursor-pointer select-none">
          <input type="checkbox" id="showConstructor" class="w-5 h-5 rounded text-blue-600" />
          <span class="font-bold text-gray-700 text-sm">施工者欄を表示する</span>
        </label>
      </div>

      <!-- 日付・時間の表示設定 -->
      <div>
        <label class="block font-bold text-gray-700 mb-2 text-sm">日付・時間の表示設定</label>
        <div class="space-y-3">

          <div class="bg-blue-50 border border-blue-200 rounded-xl p-3">
            <div class="text-xs font-bold text-blue-700 mb-2">📅 日付の表示場所</div>
            <div class="grid grid-cols-4 gap-1.5">
              <label class="cursor-pointer"><input type="radio" name="datePlace" value="right" class="hidden peer" checked />
                <div class="p-1.5 border-2 border-gray-300 rounded-lg text-center text-xs font-bold peer-checked:border-blue-600 peer-checked:bg-blue-100 peer-checked:text-blue-700">右下</div></label>
              <label class="cursor-pointer"><input type="radio" name="datePlace" value="left" class="hidden peer" />
                <div class="p-1.5 border-2 border-gray-300 rounded-lg text-center text-xs font-bold peer-checked:border-blue-600 peer-checked:bg-blue-100 peer-checked:text-blue-700">左下</div></label>
              <label class="cursor-pointer"><input type="radio" name="datePlace" value="inline" class="hidden peer" />
                <div class="p-1.5 border-2 border-gray-300 rounded-lg text-center text-xs font-bold peer-checked:border-blue-600 peer-checked:bg-blue-100 peer-checked:text-blue-700">備考下</div></label>
              <label class="cursor-pointer"><input type="radio" name="datePlace" value="none" class="hidden peer" />
                <div class="p-1.5 border-2 border-gray-300 rounded-lg text-center text-xs font-bold peer-checked:border-gray-500 peer-checked:bg-gray-100">なし</div></label>
            </div>
            <div class="mt-2">
              <label class="block text-xs font-bold text-gray-500 mb-1">フォーマット</label>
              <select id="dateFormatSelect" class="w-full p-1.5 border border-gray-300 rounded-lg text-xs font-bold bg-white">
                <option value="md_jp" selected>3月14日</option>
                <option value="ymd_slash">2026/03/14</option>
                <option value="ymd_jp">2026年3月14日</option>
                <option value="md_slash">3/14</option>
              </select>
            </div>
          </div>

          <div class="bg-green-50 border border-green-200 rounded-xl p-3">
            <div class="text-xs font-bold text-green-700 mb-2">⏰ 時間の表示場所</div>
            <div class="grid grid-cols-4 gap-1.5">
              <label class="cursor-pointer"><input type="radio" name="timePlace" value="right" class="hidden peer" checked />
                <div class="p-1.5 border-2 border-gray-300 rounded-lg text-center text-xs font-bold peer-checked:border-green-600 peer-checked:bg-green-100 peer-checked:text-green-700">右下</div></label>
              <label class="cursor-pointer"><input type="radio" name="timePlace" value="left" class="hidden peer" />
                <div class="p-1.5 border-2 border-gray-300 rounded-lg text-center text-xs font-bold peer-checked:border-green-600 peer-checked:bg-green-100 peer-checked:text-green-700">左下</div></label>
              <label class="cursor-pointer"><input type="radio" name="timePlace" value="inline" class="hidden peer" />
                <div class="p-1.5 border-2 border-gray-300 rounded-lg text-center text-xs font-bold peer-checked:border-green-600 peer-checked:bg-green-100 peer-checked:text-green-700">備考下</div></label>
              <label class="cursor-pointer"><input type="radio" name="timePlace" value="none" class="hidden peer" />
                <div class="p-1.5 border-2 border-gray-300 rounded-lg text-center text-xs font-bold peer-checked:border-gray-500 peer-checked:bg-gray-100">なし</div></label>
            </div>
            <div class="mt-2">
              <label class="block text-xs font-bold text-gray-500 mb-1">フォーマット</label>
              <select id="timeFormatSelect" class="w-full p-1.5 border border-gray-300 rounded-lg text-xs font-bold bg-white">
                <option value="hm_jp" selected>9時00分</option>
                <option value="hm_colon">9:00</option>
                <option value="hm_colon0">09:00</option>
              </select>
            </div>
          </div>

        </div>
        <div class="flex justify-end mt-2">
          <button onclick="setToday()" class="bg-gray-200 px-2 py-1.5 rounded-lg text-xs hover:bg-gray-300 font-bold text-gray-700 flex items-center gap-1">
            <span class="material-icons text-sm">update</span>現在時刻を設定
          </button>
        </div>
        <div class="flex gap-2 mt-2">
          <input type="date" id="inputDate" class="flex-1 p-2.5 border-2 border-gray-300 rounded-lg text-base font-bold text-gray-700" />
          <input type="time" id="inputTime" class="w-24 p-2.5 border-2 border-gray-300 rounded-lg text-base font-bold text-gray-700" />
        </div>
      </div>
    </div>

    <!-- ===== TAB: 現場 ===== -->
    <div id="tab-site" class="tab-content hidden bg-white rounded-xl shadow-md border-2 border-gray-200 p-4 space-y-3">
      <h3 class="font-bold text-gray-800 border-b pb-2 flex items-center gap-2 text-sm">
        <span class="material-icons text-gray-500 text-base">business</span>現場情報
      </h3>
      <div>
        <label class="block font-bold text-gray-700 mb-1 text-sm">工事件名</label>
        <textarea id="inputProject" rows="2" placeholder="例: ○○マンション新築工事" class="w-full p-2.5 border-2 border-gray-300 rounded-lg text-sm text-gray-700 resize-none"></textarea>
      </div>
      <div>
        <label id="workTypeLabel" class="block font-bold text-gray-700 mb-1 text-sm">工事場所</label>
        <textarea id="inputWorkType" rows="2" placeholder="例: 1階 エントランス" class="w-full p-2.5 border-2 border-gray-300 rounded-lg text-sm text-gray-700 resize-none"></textarea>
      </div>
      <div>
        <label class="block font-bold text-gray-700 mb-1 text-sm">施工者名</label>
        <input type="text" id="inputConstructor" value="ヒューマンヤード(株)" class="w-full p-2.5 border-2 border-gray-300 rounded-lg text-sm text-gray-700" />
      </div>
    </div>

    <!-- ===== TAB: 内容 ===== -->
    <div id="tab-content" class="tab-content hidden bg-white rounded-xl shadow-md border-2 border-gray-200 p-4 space-y-3">
      <h3 class="font-bold text-gray-800 border-b pb-2 flex items-center gap-2 text-sm">
        <span class="material-icons text-gray-500 text-base">edit_note</span>備考・内容
      </h3>

      <!-- 簡単入力支援 -->
      <div class="bg-blue-50 rounded-xl border-2 border-blue-100">
        <button type="button" onclick="toggleEasyInput()" class="w-full p-3 text-sm font-bold text-blue-800 flex items-center justify-between">
          <span class="flex items-center gap-1"><span class="material-icons text-sm">touch_app</span> 簡単入力支援</span>
          <span id="easyInputIcon" class="material-icons text-blue-600">keyboard_arrow_down</span>
        </button>
        <div id="easyInputContent" class="hidden">
          <div class="flex border-b border-blue-200">
            <button type="button" onclick="switchSubTab('soil')" id="btn-sub-soil" class="flex-1 py-2.5 text-sm font-bold text-blue-700 hover:bg-blue-100 sub-tab-active">土砂・運搬</button>
            <button type="button" onclick="switchSubTab('dimension')" id="btn-sub-dimension" class="flex-1 py-2.5 text-sm font-bold text-blue-700 hover:bg-blue-100">寸法・数値</button>
          </div>

          <!-- 土砂・運搬 -->
          <div id="panel-soil" class="p-3">
            <div class="flex flex-wrap gap-2 mb-2">
              <label class="flex-1 min-w-[80px] inline-flex items-center justify-center cursor-pointer bg-white px-2 py-2 rounded-lg border-2 border-blue-200 hover:bg-blue-50 select-none" onclick="updateSoilDirectly()">
                <input type="radio" name="soilType" value="残土搬出" class="hidden peer" checked />
                <span class="text-sm font-bold text-gray-700 peer-checked:text-blue-700">残土搬出</span>
              </label>
              <label class="flex-1 min-w-[80px] inline-flex items-center justify-center cursor-pointer bg-white px-2 py-2 rounded-lg border-2 border-blue-200 hover:bg-blue-50 select-none" onclick="updateSoilDirectly()">
                <input type="radio" name="soilType" value="客土搬入" class="hidden peer" />
                <span class="text-sm font-bold text-gray-700 peer-checked:text-blue-700">客土搬入</span>
              </label>
              <label class="inline-flex items-center justify-center cursor-pointer bg-white px-3 py-2 rounded-lg border-2 border-gray-200 hover:bg-gray-50 select-none" onclick="updateSoilDirectly()">
                <input type="radio" name="soilType" value="" class="hidden peer" />
                <span class="text-sm font-bold text-gray-500 peer-checked:text-gray-900">なし</span>
              </label>
            </div>
            <div class="flex flex-wrap gap-2 mb-3">
              <span class="text-xs font-bold text-gray-600 flex items-center">積載:</span>
              <label class="inline-flex items-center cursor-pointer bg-white px-3 py-1.5 rounded border border-gray-300 select-none" onclick="updateSoilDirectly()">
                <input type="radio" name="truckCap" value="2t" class="hidden peer" />
                <span class="text-sm font-bold text-gray-500 peer-checked:text-blue-600 peer-checked:underline">2t</span>
              </label>
              <label class="inline-flex items-center cursor-pointer bg-white px-3 py-1.5 rounded border border-gray-300 select-none" onclick="updateSoilDirectly()">
                <input type="radio" name="truckCap" value="3t" class="hidden peer" checked />
                <span class="text-sm font-bold text-gray-500 peer-checked:text-blue-600 peer-checked:underline">3t</span>
              </label>
              <label class="inline-flex items-center cursor-pointer bg-white px-3 py-1.5 rounded border border-gray-300 select-none" onclick="updateSoilDirectly()">
                <input type="radio" name="truckCap" value="4t" class="hidden peer" />
                <span class="text-sm font-bold text-gray-500 peer-checked:text-blue-600 peer-checked:underline">4t</span>
              </label>
              <label class="inline-flex items-center cursor-pointer bg-white px-3 py-1.5 rounded border border-gray-300 select-none" onclick="updateSoilDirectly()">
                <input type="radio" name="truckCap" value="8t" class="hidden peer" />
                <span class="text-sm font-bold text-gray-500 peer-checked:text-blue-600 peer-checked:underline">8t</span>
              </label>
              <label class="inline-flex items-center cursor-pointer bg-white px-3 py-1.5 rounded border border-gray-300 select-none" onclick="updateSoilDirectly()">
                <input type="radio" name="truckCap" value="" class="hidden peer" />
                <span class="text-sm font-bold text-gray-500 peer-checked:text-blue-600">なし</span>
              </label>
            </div>
            <div class="flex items-center gap-2">
              <div class="flex items-center border-2 border-gray-300 rounded-lg bg-white overflow-hidden flex-1">
                <button type="button" onclick="changeCounter(-1)" class="px-4 py-2.5 bg-gray-50 hover:bg-gray-200 text-gray-700 border-r border-gray-200 w-14 flex justify-center">
                  <span class="material-icons">remove</span>
                </button>
                <span id="counterValue" class="flex-1 py-2 font-extrabold text-2xl text-center text-gray-800">1</span>
                <button type="button" onclick="changeCounter(1)" class="px-4 py-2.5 bg-gray-50 hover:bg-gray-200 text-gray-700 border-l border-gray-200 w-14 flex justify-center">
                  <span class="material-icons">add</span>
                </button>
              </div>
              <span class="text-base font-bold text-gray-700 whitespace-nowrap">台目</span>
            </div>
          </div>

          <!-- 寸法・数値 -->
          <div id="panel-dimension" class="p-3 hidden">
            <div class="mb-2">

<script>
// ============================================================
// STATE
// ============================================================
const S = {
  image:null, currentFileName:'',
  boardPos:'right',
  boardSize:'m',
  boardOffsetX:null, boardOffsetY:null,
  boardColor:'green',
  showBoard:true, showConstructor:false,
  datePlace:'right', timePlace:'right',
  dateFormat:'md_jp', timeFormat:'hm_jp',
  workLabelType:'place',
  text:{project:'',workType:'',memo:'',constructorName:'ヒューマンヤード(株)',date:'',time:''},
  style:{fontFamily:"'M PLUS Rounded 1c',sans-serif",fontScaleProject:1.2,fontScaleWorkType:1.2,fontScaleMemo:1.4,fontScaleDate:1.0,lineHeight:1.2,yOffset:0},
};

let currentImages = [];  // { img, name }
let currentImgIdx = 0;
let dragMode = false;
let isDragging = false, dragStartX=0, dragStartY=0, dragBoardX=0, dragBoardY=0;

// ============================================================
// CANVAS
// ============================================================
const canvas = document.getElementById('mainCanvas');
const ctx    = canvas.getContext('2d');
const canvasWrap = document.getElementById('canvasWrap');

function getBoardColors() {
  const m = {
    black:{bg:'#1a1a1a',line:'#fff',text:'#fff',shadow:'rgba(0,0,0,.5)'},
    white:{bg:'#fff',line:'#333',text:'#111',shadow:'rgba(0,0,0,.3)'},
    blue: {bg:'#0d47a1',line:'#fff',text:'#fff',shadow:'rgba(0,0,0,.5)'},
    green:{bg:'#004d40',line:'#fff',text:'#fff',shadow:'rgba(0,0,0,.5)'},
  };
  return m[S.boardColor] || m.green;
}

const SIZE_RATIOS = {xs:.26, s:.31, sm:.37, m:.44, ml:.50, l:.56};

function getBoardDimensions() {
  const cw=canvas.width, ch=canvas.height;
  const r=SIZE_RATIOS[S.boardSize]??0.44;
  const bw=cw*r, bh=ch*r;
  let bx, by;
  if (S.boardOffsetX!==null && S.boardOffsetY!==null) {
    bx=Math.max(0,Math.min(cw-bw,S.boardOffsetX));
    by=Math.max(0,Math.min(ch-bh,S.boardOffsetY));
  } else {
    bx=S.boardPos==='left'?0:cw-bw;
    by=ch-bh;
  }
  return {bx,by,bw,bh};
}

function drawBlackboard(ctx,x,y,w,h,c) {
  ctx.save();
  ctx.shadowColor=c.shadow; ctx.shadowBlur=10; ctx.shadowOffsetX=5; ctx.shadowOffsetY=5;
  ctx.fillStyle=c.bg; ctx.fillRect(x,y,w,h);
  ctx.shadowColor='transparent';
  ctx.strokeStyle=S.boardColor==='white'?'#999':'#e0e0e0';
  ctx.lineWidth=Math.max(2,w*.005);
  const hl=ctx.lineWidth/2;
  ctx.strokeRect(x+hl,y+hl,w-ctx.lineWidth,h-ctx.lineWidth);
  ctx.strokeStyle=c.line; ctx.lineWidth=Math.max(1,w*.003);
  ctx.beginPath();
  ctx.moveTo(x,y+h*.18); ctx.lineTo(x+w,y+h*.18);
  ctx.moveTo(x,y+h*.36); ctx.lineTo(x+w,y+h*.36);
  ctx.moveTo(x+w*.22,y); ctx.lineTo(x+w*.22,y+h*.36);
  if(S.showConstructor){
    const cH=h*.14,cY=y+h-cH;
    ctx.moveTo(x,cY); ctx.lineTo(x+w,cY);
    ctx.moveTo(x+w*.22,cY); ctx.lineTo(x+w*.22,y+h);
  }
  ctx.stroke(); ctx.restore();
}

function drawTextOnBoard(ctx,bx,by,bw,bh,c) {
  ctx.save();
  ctx.fillStyle=c.text;
  ctx.beginPath(); ctx.rect(bx,by,bw,bh); ctx.clip();
  const labelSz=bw*.047, base=bw*.055, pad=bw*.04, offY=S.style.yOffset, font=S.style.fontFamily;
  const row1CY=by+bh*.09, row2CY=by+bh*.27;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font=`${labelSz}px ${font}`;
  ctx.fillText('工事件名',bx+bw*.11,row1CY);
  ctx.fillText(S.workLabelType==='place'?'工事場所':'工種',bx+bw*.11,row2CY);
  if(S.showConstructor) ctx.fillText('施工者',bx+bw*.11,by+bh-bh*.14/2);
  ctx.textAlign='left'; ctx.textBaseline='middle';
  const pSz=Math.min(S.style.fontScaleProject*base,bh*.13);
  ctx.font=`${pSz}px ${font}`;
  const pLines=(S.text.project||'').split('\n').filter(Boolean);
  if(pLines.length){const pLH=pSz*S.style.lineHeight,pTH=pLines.length*pLH,pSY=row1CY-pTH/2+pSz/2+offY; pLines.forEach((l,i)=>ctx.fillText(l,bx+bw*.25+pad*.3,pSY+i*pLH));}
  const wSz=Math.min(S.style.fontScaleWorkType*base,bh*.13);
  ctx.font=`${wSz}px ${font}`;
  const wLines=(S.text.workType||'').split('\n').filter(Boolean);
  if(wLines.length){const wLH=wSz*S.style.lineHeight,wTH=wLines.length*wLH,wSY=row2CY-wTH/2+wSz/2+offY; wLines.forEach((l,i)=>ctx.fillText(l,bx+bw*.25+pad*.3,wSY+i*wLH));}
  ctx.textBaseline='top';
  const memoY=by+bh*.36+pad*.4+offY, memoSz=S.style.fontScaleMemo*base;
  ctx.font=`${memoSz}px ${font}`;
  const mlines=(S.text.memo||'').split('\n');
  const mLH=memoSz*S.style.lineHeight;
  mlines.forEach((l,i)=>ctx.fillText(l,bx+pad,memoY+i*mLH));
  if(S.showConstructor){ctx.textBaseline='middle';ctx.font=`${labelSz*.9}px ${font}`;ctx.fillText(S.text.constructorName,bx+bw*.25+pad*.3,by+bh-bh*.14/2);}
  // 日付・時間 独立描画
  const dateTxt=buildDatePart(), timeTxt=buildTimePart();
  const inlineParts=[];
  if(S.datePlace==='inline'&&dateTxt) inlineParts.push(dateTxt);
  if(S.timePlace==='inline'&&timeTxt) inlineParts.push(timeTxt);
  if(inlineParts.length){ctx.textBaseline='top';ctx.font=`${S.style.fontScaleDate*base}px ${font}`;ctx.fillText(inlineParts.join(' '),bx+pad,memoY+mlines.length*mLH+pad*.2);}
  const drawCorner=place=>{
    const parts=[];
    if(S.datePlace===place&&dateTxt) parts.push(dateTxt);
    if(S.timePlace===place&&timeTxt) parts.push(timeTxt);
    if(!parts.length) return;
    ctx.textBaseline='middle'; ctx.font=`${S.style.fontScaleDate*base*.85}px ${font}`;
    let dY=by+bh-pad*.8; if(S.showConstructor)dY=by+bh-bh*.14-pad*.4;
    if(place==='right'){ctx.textAlign='right';ctx.fillText(parts.join(' '),bx+bw-pad,dY);}
    else{ctx.textAlign='left';ctx.fillText(parts.join(' '),bx+pad,dY);}
  };
  drawCorner('right'); drawCorner('left');
  ctx.restore();
}

function buildDatePart(){
  if(!S.text.date) return '';
  const p=S.text.date.replace(/\//g,'-').split('-');
  if(p.length!==3) return S.text.date;
  const yy=p[0],mm=parseInt(p[1]),dd=parseInt(p[2]);
  const mm2=String(mm).padStart(2,'0'),dd2=String(dd).padStart(2,'0');
  switch(S.dateFormat){case 'ymd_slash':return `${yy}/${mm2}/${dd2}`;case 'ymd_jp':return `${yy}年${mm}月${dd}日`;case 'md_slash':return `${mm}/${dd2}`;default:return `${mm}月${dd}日`;}
}
function buildTimePart(){
  if(!S.text.time) return '';
  const t=S.text.time.split(':'); if(t.length<2) return S.text.time;
  const hh=parseInt(t[0]),mm=parseInt(t[1]),hh2=String(hh).padStart(2,'0'),mm2=String(mm).padStart(2,'0');
  switch(S.timeFormat){case 'hm_colon':return `${hh}:${mm2}`;case 'hm_colon0':return `${hh2}:${mm2}`;default:return `${hh}時${mm2}分`;}
}
function drawML(ctx,text,x,y,lh){if(!text)return;text.split('\n').forEach((l,i)=>ctx.fillText(l,x,y+i*lh));}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';
  if(S.image){
    const img=S.image,cw=canvas.width,ch=canvas.height;
    const ir=img.width/img.height,cr=cw/ch;
    let dw,dh,dx,dy;
    if(ir>cr){dh=ch;dw=dh*ir;dx=-(dw-cw)/2;dy=0;}else{dw=cw;dh=dw/ir;dx=0;dy=-(dh-ch)/2;}
    ctx.drawImage(img,dx,dy,dw,dh);
    if(S.showBoard){const{bx,by,bw,bh}=getBoardDimensions(),c=getBoardColors();drawBlackboard(ctx,bx,by,bw,bh,c);drawTextOnBoard(ctx,bx,by,bw,bh,c);}
  } else {
    ctx.fillStyle='#e2e8f0';ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#94a3b8';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font='bold 20px sans-serif';
    ctx.fillText('画像をドロップしてください',canvas.width/2,canvas.height/2);
  }
}

// ============================================================
// DRAG BLACKBOARD
// ============================================================
function canvasPoint(e){
  const rect=canvas.getBoundingClientRect();
  const sx=canvas.width/rect.width,sy=canvas.height/rect.height;
  const cx=e.touches?e.touches[0].clientX:e.clientX,cy=e.touches?e.touches[0].clientY:e.clientY;
  return{x:(cx-rect.left)*sx,y:(cy-rect.top)*sy};
}
function isInsideBoard(px,py){const{bx,by,bw,bh}=getBoardDimensions();return px>=bx&&px<=bx+bw&&py>=by&&py<=by+bh;}
canvas.addEventListener('mousedown',e=>{if(!dragMode)return;const p=canvasPoint(e);if(!isInsideBoard(p.x,p.y))return;isDragging=true;const{bx,by}=getBoardDimensions();dragStartX=p.x;dragStartY=p.y;dragBoardX=S.boardOffsetX!==null?S.boardOffsetX:bx;dragBoardY=S.boardOffsetY!==null?S.boardOffsetY:by;e.preventDefault();});
canvas.addEventListener('mousemove',e=>{if(!isDragging)return;const p=canvasPoint(e);S.boardOffsetX=dragBoardX+(p.x-dragStartX);S.boardOffsetY=dragBoardY+(p.y-dragStartY);draw();e.preventDefault();});
canvas.addEventListener('mouseup',()=>{isDragging=false;});
canvas.addEventListener('mouseleave',()=>{isDragging=false;});
canvas.addEventListener('touchstart',e=>{if(!dragMode)return;const p=canvasPoint(e);if(!isInsideBoard(p.x,p.y))return;isDragging=true;const{bx,by}=getBoardDimensions();dragStartX=p.x;dragStartY=p.y;dragBoardX=S.boardOffsetX!==null?S.boardOffsetX:bx;dragBoardY=S.boardOffsetY!==null?S.boardOffsetY:by;e.preventDefault();},{passive:false});
canvas.addEventListener('touchmove',e=>{if(!isDragging)return;const p=canvasPoint(e);S.boardOffsetX=dragBoardX+(p.x-dragStartX);S.boardOffsetY=dragBoardY+(p.y-dragStartY);draw();e.preventDefault();},{passive:false});
canvas.addEventListener('touchend',()=>{isDragging=false;});
window.resetBoardPosition=()=>{S.boardOffsetX=null;S.boardOffsetY=null;draw();};

// ============================================================
// FILE HANDLING（シンプル版：バッチなし）
// ============================================================
function handleFiles(files){
  if(!files||files.length===0) return;
  const loading=document.getElementById('loading');
  loading.classList.remove('hidden');
  const newItems=[]; let done=0;
  Array.from(files).forEach(file=>{
    if(!file.type.startsWith('image/')){done++;return;}
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        newItems.push({img,name:file.name});
        done++;
        if(done===files.length){
          currentImages=currentImages.concat(newItems);
          const nav=document.getElementById('imageNav');
          if(currentImages.length>1) nav.classList.replace('hidden','flex');
          setImage(currentImages.length-newItems.length);
          loading.classList.add('hidden');
        }
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function setImage(idx){
  if(idx<0||idx>=currentImages.length) return;
  currentImgIdx=idx;
  const item=currentImages[idx];
  S.image=item.img; S.currentFileName=item.name;
  document.getElementById('currentFileLabel').textContent=item.name;
  canvas.width=item.img.width; canvas.height=item.img.height;
  document.getElementById('currentImageNum').textContent=idx+1;
  document.getElementById('totalImageNum').textContent=currentImages.length;
  draw();
}
window.prevImage=()=>{if(currentImgIdx>0)setImage(currentImgIdx-1);};
window.nextImage=()=>{if(currentImgIdx<currentImages.length-1)setImage(currentImgIdx+1);};

// ============================================================
// TAB
// ============================================================
window.switchTab=name=>{
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.add('hidden'));
  document.querySelectorAll('.tab-btn').forEach(el=>el.classList.remove('tab-active'));
  document.getElementById(`tab-${name}`).classList.remove('hidden');
  document.getElementById(`btn-tab-${name}`).classList.add('tab-active');
};

// ============================================================
// BOARD POS
// ============================================================
window.setBoardPos=pos=>{
  S.boardPos=pos; S.boardOffsetX=null; S.boardOffsetY=null;
  ['left','right'].forEach(p=>{const b=document.getElementById(`pos-btn-${p}`);if(p===pos)b.classList.add('btn-pos-active');else b.classList.remove('btn-pos-active');});
  draw();
};
window.adjustOffset=d=>{S.style.yOffset+=d;draw();};
window.resetAll=()=>{if(confirm('リセットしますか？'))location.reload();};

// ============================================================
// DATE / TIME
// ============================================================
window.setToday=()=>{
  const n=new Date(),yy=n.getFullYear(),mm=String(n.getMonth()+1).padStart(2,'0'),dd=String(n.getDate()).padStart(2,'0');
  const hh=String(n.getHours()).padStart(2,'0'),mi=String(n.getMinutes()).padStart(2,'0');
  document.getElementById('inputDate').value=`${yy}-${mm}-${dd}`;
  document.getElementById('inputTime').value=`${hh}:${mi}`;
  S.text.date=`${yy}/${mm}/${dd}`; S.text.time=`${hh}:${mi}`; draw();
};

// ============================================================
// 簡単入力支援
// ============================================================
let counterValue=1;

window.toggleEasyInput=()=>{
  const c=document.getElementById('easyInputContent'),i=document.getElementById('easyInputIcon');
  c.classList.toggle('hidden');
  i.innerText=c.classList.contains('hidden')?'keyboard_arrow_down':'keyboard_arrow_up';
};
window.switchSubTab=name=>{
  ['soil','dimension'].forEach(n=>{document.getElementById(`btn-sub-${n}`).classList.remove('sub-tab-active');document.getElementById(`panel-${n}`).classList.add('hidden');});
  document.getElementById(`btn-sub-${name}`).classList.add('sub-tab-active');
  document.getElementById(`panel-${name}`).classList.remove('hidden');
};
window.changeCounter=delta=>{
  counterValue=Math.max(1,counterValue+delta);
  document.getElementById('counterValue').innerText=counterValue;
  updateSoilDirectly();
};
window.updateSoilDirectly=(forceInsert=false)=>{
  const soilType=document.querySelector('input[name="soilType"]:checked')?.value||'';
  const truckCap=document.querySelector('input[name="truckCap"]:checked')?.value||'';
  const parts=[]; if(soilType)parts.push(soilType); if(truckCap)parts.push(truckCap); parts.push(`${counterValue}台目`);
  const newText=parts.join(' ');
  const pattern=/(?:残土搬出|客土搬入|残土|客土)?[\s　]*(?:\d+t)?[\s　]*\d+台目/g;
  const ta=document.getElementById('inputMemo'); let cur=ta.value;
  if(pattern.test(cur)&&!forceInsert){cur=cur.replace(pattern,newText);}
  else{if(cur&&!cur.endsWith('\n'))cur+='\n';cur+=newText;}
  ta.value=cur; S.text.memo=cur; draw();
};
window.adjustDimValue=val=>{const i=document.getElementById('dimValue');i.value=(parseFloat(i.value)||0)+val;};
window.insertDimension=()=>{
  const prefix=document.querySelector('input[name="dimPrefix"]:checked')?.value||'';
  const val=document.getElementById('dimValue').value; if(!val&&val!=='0')return;
  const txt=` ${prefix}${val} `, ta=document.getElementById('inputMemo');
  const s=ta.selectionStart,e=ta.selectionEnd;
  ta.value=ta.value.slice(0,s)+txt+ta.value.slice(e);
  ta.setSelectionRange(s+txt.length,s+txt.length); ta.focus();
  S.text.memo=ta.value; draw();
};
window.clearMemo=()=>{if(confirm('備考をクリアしますか？')){document.getElementById('inputMemo').value='';S.text.memo='';draw();}};

// ============================================================
// DOWNLOAD / SHARE
// ============================================================
function getBlobAsync(){return new Promise(res=>canvas.toBlob(res,'image/jpeg',.95));}
document.getElementById('btnDownload').addEventListener('click',async()=>{
  if(!S.image){alert('画像が選択されていません');return;}
  const blob=await getBlobAsync();
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=S.currentFileName.replace(/\.[^.]+$/,'')+'.jpg';a.click();
});
document.getElementById('btnShare').addEventListener('click',async()=>{
  if(!S.image){alert('画像が選択されていません');return;}
  const blob=await getBlobAsync();
  const file=new File([blob],'photo.jpg',{type:'image/jpeg'});
  if(navigator.share&&navigator.canShare?.({files:[file]})){
    try{await navigator.share({files:[file],title:'工事写真'});}catch{}
  } else alert('このブラウザは共有に対応していません。「端末に保存」をお使いください。');
});

// ============================================================
// EVENT LISTENERS
// ============================================================
document.addEventListener('DOMContentLoaded',()=>{
  canvas.width=800;canvas.height=500;draw();

  const dz=document.getElementById('dropZone');
  dz.addEventListener('dragover',e=>{e.preventDefault();document.getElementById('dragOverlay').classList.replace('hidden','flex');});
  dz.addEventListener('dragleave',()=>document.getElementById('dragOverlay').classList.replace('flex','hidden'));
  dz.addEventListener('drop',e=>{e.preventDefault();document.getElementById('dragOverlay').classList.replace('flex','hidden');handleFiles(e.dataTransfer.files);});
  document.getElementById('btnCamera').addEventListener('click',()=>document.getElementById('cameraInput').click());
  document.getElementById('btnFile'  ).addEventListener('click',()=>document.getElementById('fileInput').click());
  document.getElementById('cameraInput').addEventListener('change',e=>handleFiles(e.target.files));
  document.getElementById('fileInput'  ).addEventListener('change',e=>handleFiles(e.target.files));

  [['inputProject','project'],['inputWorkType','workType'],['inputMemo','memo'],['inputConstructor','constructorName']].forEach(([id,key])=>{
    document.getElementById(id)?.addEventListener('input',e=>{S.text[key]=e.target.value;draw();});
  });
  document.getElementById('inputDate').addEventListener('input',e=>{S.text.date=e.target.value.replace(/-/g,'/');draw();});
  document.getElementById('inputTime').addEventListener('input',e=>{S.text.time=e.target.value;draw();});

  document.getElementById('boardColor').addEventListener('change',e=>{S.boardColor=e.target.value;draw();});
  document.getElementById('toggleBoard').addEventListener('change',e=>{S.showBoard=e.target.checked;draw();});
  document.getElementById('showConstructor').addEventListener('change',e=>{S.showConstructor=e.target.checked;draw();});

  document.querySelectorAll('input[name="datePlace"]').forEach(r=>r.addEventListener('change',e=>{S.datePlace=e.target.value;draw();}));
  document.querySelectorAll('input[name="timePlace"]').forEach(r=>r.addEventListener('change',e=>{S.timePlace=e.target.value;draw();}));
  document.getElementById('dateFormatSelect').addEventListener('change',e=>{S.dateFormat=e.target.value;draw();});
  document.getElementById('timeFormatSelect').addEventListener('change',e=>{S.timeFormat=e.target.value;draw();});

  document.querySelectorAll('input[name="labelType"]').forEach(r=>r.addEventListener('change',e=>{
    S.workLabelType=e.target.value;
    const lbl=e.target.value==='place'?'工事場所':'工種';
    document.getElementById('workTypeLabel').textContent=lbl;
    document.getElementById('adjustLabelWorkType').textContent=lbl+' サイズ';
    draw();
  }));

  document.getElementById('sizePillGroup').addEventListener('click',e=>{
    const pill=e.target.closest('.size-pill');if(!pill)return;
    document.querySelectorAll('.size-pill').forEach(p=>p.classList.remove('active'));
    pill.classList.add('active');
    S.boardSize=pill.dataset.size;S.boardOffsetX=null;S.boardOffsetY=null;draw();
  });

  document.getElementById('dragModeToggle').addEventListener('change',e=>{
    dragMode=e.target.checked;canvasWrap.classList.toggle('drag-mode',dragMode);
  });

  document.getElementById('fontFamily').addEventListener('change',e=>{S.style.fontFamily=e.target.value;draw();});
  function ss(id,key,did){const el=document.getElementById(id);el?.addEventListener('input',e=>{S.style[key]=parseFloat(e.target.value);const d=document.getElementById(did);if(d)d.textContent=parseFloat(e.target.value).toFixed(1);draw();});}
  ss('scaleProject','fontScaleProject','valScaleProject');
  ss('scaleWorkType','fontScaleWorkType','valScaleWorkType');
  ss('scaleMemo','fontScaleMemo','valScaleMemo');
  ss('scaleDate','fontScaleDate','valScaleDate');
  ss('lineHeight','lineHeight','dispLineHeight');

  setToday();
});
</script>
