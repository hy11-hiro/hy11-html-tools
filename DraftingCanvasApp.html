                const x3=lineB.p1.x, y3=lineB.p1.y, x4=lineB.p2.x, y4=lineB.p2.y;
                const denom = (x1-x2)*(y3-y4) - (y1-y2)*(x3-x4);
                if (Math.abs(denom) < 1e-9) return { error: 'parallel' }; // 平行線は処理不可

                const t = ((x1-x3)*(y3-y4) - (y1-y3)*(x3-x4)) / denom;
                const I = { x: x1 + t*(x2-x1), y: y1 + t*(y2-y1) };

                // 各線について、交点Iから遠い方の端点（残す側）を特定
                const farA = Geo.dist(I, lineA.p1) > Geo.dist(I, lineA.p2) ? lineA.p1 : lineA.p2;
                const nearAKey = farA === lineA.p1 ? 'p2' : 'p1';
                const farB = Geo.dist(I, lineB.p1) > Geo.dist(I, lineB.p2) ? lineB.p1 : lineB.p2;
                const nearBKey = farB === lineB.p1 ? 'p2' : 'p1';

                const dA = Geo.dist(I, farA), dB = Geo.dist(I, farB);
                if (dA < 1e-6 || dB < 1e-6) return { error: 'parallel' };
                const uA = { x: (farA.x-I.x)/dA, y: (farA.y-I.y)/dA };
                const uB = { x: (farB.x-I.x)/dB, y: (farB.y-I.y)/dB };

                const dot = Math.max(-1, Math.min(1, uA.x*uB.x + uA.y*uB.y));
                const theta = Math.acos(dot);
                if (theta < 1e-4 || theta > Math.PI - 1e-4) return { error: 'parallel' }; // ほぼ平行/一直線

                if (mode === 'chamfer') {
                    const d = Math.min(amount, dA - 0.01, dB - 0.01);
                    if (d <= 0) return { error: 'too_large' };
                    const P1 = { x: I.x + uA.x*d, y: I.y + uA.y*d };
                    const P2 = { x: I.x + uB.x*d, y: I.y + uB.y*d };
                    return { nearAKey, nearBKey, trimA: P1, trimB: P2, extra: { type: TOOLS.LINE, p1: P1, p2: P2 } };
                } else {
                    // fillet
                    const halfTheta = theta / 2;
                    const d = amount / Math.tan(halfTheta);
                    const dMax = Math.min(dA, dB) - 0.01;
                    if (d <= 0 || d > dMax) return { error: 'too_large' };
                    const T1 = { x: I.x + uA.x*d, y: I.y + uA.y*d };
                    const T2 = { x: I.x + uB.x*d, y: I.y + uB.y*d };
                    const bisLen = Math.sqrt((uA.x+uB.x)**2 + (uA.y+uB.y)**2);
                    if (bisLen < 1e-6) return { error: 'parallel' };
                    const bx = (uA.x+uB.x)/bisLen, by = (uA.y+uB.y)/bisLen;
                    const centerDist = amount / Math.sin(halfTheta);
                    const O = { x: I.x + bx*centerDist, y: I.y + by*centerDist };
                    let a1 = Math.atan2(T1.y-O.y, T1.x-O.x);
                    let a2 = Math.atan2(T2.y-O.y, T2.x-O.x);
                    // 短い方の弧（中心角 = π-theta）になるよう回転方向を選ぶ
                    let diff = a2 - a1;
                    while (diff <= -Math.PI) diff += Math.PI*2;
                    while (diff > Math.PI) diff -= Math.PI*2;
                    const anticlockwise = diff < 0;
                    return { nearAKey, nearBKey, trimA: T1, trimB: T2, extra: { type: TOOLS.CIRCLE, isArc: true, c: O, r: amount, startAngle: a1, endAngle: a2, anticlockwise } };
                }
            };

            const applyCornerOp = (lineA, lineB, mode, amount) => {
                const result = computeCornerOp(lineA, lineB, mode, amount);
                if (!result || result.error) {
                    const label = mode === 'fillet' ? '角丸め' : '面取り';
                    const msg = result && result.error === 'too_large'
                        ? `${label}できません。半径/距離が線の長さに対して大きすぎます。値を小さくしてください。`
                        : `${label}できません。選んだ2本の線が平行（向かい合う辺同士など）です。角を挟んで隣り合う2辺を選んでください。`;
                    window.alert(msg);
                    return;
                }
                const next = entities.map(e => {
                    if (e.id === lineA.id) return { ...e, [result.nearAKey]: result.trimA };
                    if (e.id === lineB.id) return { ...e, [result.nearBKey]: result.trimB };
                    return e;
                });
                next.push({ ...result.extra, id: Date.now() + Math.random()*999, color: lineA.color || strokeColor, lineWidth: lineA.lineWidth || strokeWidth, layer: 'drawing' });
                setEntities(next); pushHistory(next);
            };

            const eraseEntityAt = (pos) => {
                const threshold = 5 / viewRef.current.scale;
                const remaining = entities.filter(ent => {
                    let hit = false;
                    if (ent.type === TOOLS.LINE || ent.type === TOOLS.DIM) {
                        if (Geo.distToSegment(pos, ent.p1, ent.p2) < threshold) hit = true;
                    } else if (ent.type === TOOLS.CIRCLE) {
                        if (Math.abs(Geo.dist(pos, ent.c) - ent.r) < threshold) hit = true;
                    } else if (ent.type === TOOLS.RECT) {
                        const p1 = ent.p1;
                        const p2 = { x: p1.x + ent.w, y: p1.y };
                        const p3 = { x: p1.x + ent.w, y: p1.y + ent.h };
                        const p4 = { x: p1.x, y: p1.y + ent.h };
                        if (Geo.distToSegment(pos, p1, p2) < threshold || Geo.distToSegment(pos, p2, p3) < threshold || Geo.distToSegment(pos, p3, p4) < threshold || Geo.distToSegment(pos, p4, p1) < threshold) hit = true;
                    } else if (ent.type === 'text_label') {
                         if (Geo.dist(pos, ent.p1) < threshold) hit = true;
                    } else if (ent.type === 'mline' || ent.type === 'leader') {
                         if (ent.p1 && ent.p2 && Geo.distToSegment(pos, ent.p1, ent.p2) < threshold) hit = true;
                    }
                    return !hit; 
                });
                if (remaining.length !== entities.length) {
                    setEntities(remaining);
                    pushHistory(remaining);
                }
            };

            // EXPORT PDF FUNCTION - canvas全体をキャプチャしてPDF化
            // ── ベクターPDF書き出し（jsPDFのネイティブ描画命令を使用。線・文字は拡大しても劣化しない）──
            const exportPDFVector = useCallback(() => {
                try {
                    const p = PAPERS[paper];
                    const doc = new jsPDF({
                        orientation: p.width > p.height ? 'l' : 'p',
                        unit: 'mm',
                        format: [p.width, p.height]
                    });
                    const ptFromMM = (mm) => mm * 72 / 25.4;
                    const hexToRgb = (hex) => {
                        if (!hex) return [0, 0, 0];
                        const h = hex.replace('#', '');
                        const full = h.length === 3 ? h.split('').map(c => c + c).join('') : h;
                        const n = parseInt(full, 16);
                        if (isNaN(n)) return [0, 0, 0];
                        return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
                    };
                    const setStroke = (colorHex, widthMM) => {
                        const [r, g, b] = hexToRgb(colorHex || '#000000');
                        doc.setDrawColor(r, g, b);
                        doc.setLineWidth(Math.max(0.05, widthMM || 0.3));
                    };
                    const setDash = (lineStyle) => {
                        const dash = (LINE_STYLES[lineStyle] || LINE_STYLES.solid).dash;
                        doc.setLineDashPattern(dash && dash.length ? dash : [], 0);
                    };
                    const vText = (str, x, y, fontSizeMM, colorHex, align, rotationDeg) => {
                        const [r, g, b] = hexToRgb(colorHex || '#000000');
                        doc.setTextColor(r, g, b);
                        doc.setFontSize(ptFromMM(fontSizeMM || 3));
                        doc.text(String(str), x, y, { align: align || 'left', angle: rotationDeg || 0 });
                    };
                    // 円弧を短い折れ線（多角形近似）でベクター描画
                    const vArc = (cx, cy, r, a1, a2, anticlockwise) => {
                        let sweep = anticlockwise ? a1 - a2 : a2 - a1;
                        while (sweep < 0) sweep += Math.PI * 2;
                        while (sweep > Math.PI * 2) sweep -= Math.PI * 2;
                        const steps = Math.max(8, Math.round((sweep / (Math.PI * 2)) * 96));
                        let prev = null;
                        for (let i = 0; i <= steps; i++) {
                            const a = anticlockwise ? a1 - sweep * (i / steps) : a1 + sweep * (i / steps);
                            const pt = { x: cx + Math.cos(a) * r, y: cy + Math.sin(a) * r };
                            if (prev) doc.line(prev.x, prev.y, pt.x, pt.y);
                            prev = pt;
                        }
                    };

                    // ── 用紙外周 ──
                    doc.setDrawColor(160, 160, 160); doc.setLineWidth(0.1); doc.setLineDashPattern([], 0);
                    doc.rect(0, 0, p.width, p.height);

                    // ── グリッド（主グリッド＋サブグリッド、淡いグレー） ──
                    if (gridConfig.visible && gridMode === GRID_MODES.ORTHO) {
                        const step = gridConfig.spacing || 10;
                        const showSub = gridConfig.showSubGrid;
                        const subDiv = Math.max(2, gridConfig.subDivisions || 5);
                        const subStep = step / subDiv;

                        if (showSub) {
                            doc.setDrawColor(232, 232, 232); doc.setLineWidth(0.03); doc.setLineDashPattern([], 0);
                            for (let x = 0; x <= p.width + 0.01; x += subStep) {
                                if (Math.abs(x % step) < 0.001) continue; // 主グリッドと重複する線は除く
                                doc.line(x, 0, x, p.height);
                            }
                            for (let y = 0; y <= p.height + 0.01; y += subStep) {
                                if (Math.abs(y % step) < 0.001) continue;
                                doc.line(0, y, p.width, y);
                            }
                        }
                        doc.setDrawColor(210, 210, 210); doc.setLineWidth(0.06); doc.setLineDashPattern([], 0);
                        for (let x = 0; x <= p.width + 0.01; x += step) doc.line(x, 0, x, p.height);
                        for (let y = 0; y <= p.height + 0.01; y += step) doc.line(0, y, p.width, y);
                    }

                    // ── 材料ハッチング（簡易ベクター版：斜線／点/短い縦線で系統別に表現）──
                    const vMaterialHatch = (pts, material) => {
                        const mat = MATERIALS[material];
                        if (!mat || !mat.pattern) return;
                        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
                        pts.forEach(pt => { minX = Math.min(minX, pt.x); maxX = Math.max(maxX, pt.x); minY = Math.min(minY, pt.y); maxY = Math.max(maxY, pt.y); });
                        const sp = Math.max(2, Math.min(maxX - minX, maxY - minY) / 12 || 5);
                        const dotPatterns = ['sand', 'gravel', 'asphalt'];
                        const gridPatterns = ['tile', 'tile600', 'brick', 'interlock', 'hirakita'];
                        doc.setDrawColor(0, 0, 0); doc.setLineWidth(0.08); doc.setLineDashPattern([], 0);
                        if (dotPatterns.includes(mat.pattern)) {
                            doc.setFillColor(0, 0, 0);
                            for (let gx = minX + sp/2; gx < maxX; gx += sp) {
                                for (let gy = minY + sp/2; gy < maxY; gy += sp) {
                                    doc.circle(gx, gy, 0.15, 'F');
                                }
                            }
                        } else if (gridPatterns.includes(mat.pattern)) {
                            for (let x = minX; x < maxX; x += sp) doc.line(x, minY, x, maxY);
                            for (let y = minY; y < maxY; y += sp) doc.line(minX, y, maxX, y);
                        } else if (mat.pattern === 'grass' || mat.pattern === 'grass_j') {
                            for (let gx = minX; gx < maxX; gx += sp * 0.7) {
                                for (let gy = minY + sp/2; gy < maxY; gy += sp) {
                                    doc.line(gx, gy + sp*0.4, gx + sp*0.2, gy);
                                }
                            }
                        } else {
                            // 既定：45°斜線ハッチ（コンクリート・地盤・割り石・木材など）
                            for (let d = minX + minY; d < maxX + maxY; d += sp * 0.8) {
                                doc.line(Math.max(minX, d - maxY), Math.min(maxY, d - minX), Math.min(maxX, d - minY), Math.max(minY, d - maxX));
                            }
                        }
                    };

                    entities.forEach(ent => {
                        try {
                            const entLayer = ent.layer || 'drawing';
                            if (layerVisibility[entLayer] === false) return;
                            const color = ent.color || '#000000';

                            if (ent.type === TOOLS.LINE) {
                                setStroke(color, ent.lineWidth); setDash(ent.lineStyle);
                                doc.line(ent.p1.x, ent.p1.y, ent.p2.x, ent.p2.y);
                            } else if (ent.type === TOOLS.RECT) {
                                setStroke(color, ent.lineWidth); setDash(ent.lineStyle);
                                doc.rect(ent.p1.x, ent.p1.y, ent.w, ent.h);
                            } else if (ent.type === TOOLS.CIRCLE) {
                                setStroke(color, ent.lineWidth); setDash(ent.lineStyle);
                                if (ent.isArc) vArc(ent.c.x, ent.c.y, ent.r, ent.startAngle, ent.endAngle, ent.anticlockwise);
                                else doc.circle(ent.c.x, ent.c.y, ent.r, 'S');
                            } else if (ent.type === 'mline') {
                                setStroke(color, ent.lineWidth); setDash(ent.lineStyle);
                                const dx = ent.p2.x - ent.p1.x, dy = ent.p2.y - ent.p1.y;
                                const len = Math.sqrt(dx*dx+dy*dy) || 1;
                                const nx = -dy/len, ny = dx/len;
                                const offsets = computeMlineOffsets(ent.spacing || 100, ent.leftCount != null ? ent.leftCount : 1, ent.rightCount != null ? ent.rightCount : 1, ent.showCenter !== false);
                                offsets.forEach(off => doc.line(ent.p1.x+nx*off, ent.p1.y+ny*off, ent.p2.x+nx*off, ent.p2.y+ny*off));
                            } else if (ent.type === 'leader') {
                                setStroke(color, ent.lineWidth); doc.setLineDashPattern([], 0);
                                const dirX = ent.p2.x >= ent.p1.x ? 1 : -1;
                                const tailEnd = { x: ent.p2.x + dirX*6, y: ent.p2.y };
                                doc.line(ent.p1.x, ent.p1.y, ent.p2.x, ent.p2.y);
                                doc.line(ent.p2.x, ent.p2.y, tailEnd.x, tailEnd.y);
                                vText(ent.text || '', tailEnd.x + dirX*0.8, tailEnd.y - 0.5, ent.fontSize || 3, color, dirX>0?'left':'right', 0);
                            } else if (ent.type === TOOLS.DIM) {
                                setStroke(color, 0.2); doc.setLineDashPattern([], 0);
                                doc.line(ent.p1.x, ent.p1.y, ent.p2.x, ent.p2.y);
                                const ang = Math.atan2(ent.p2.y-ent.p1.y, ent.p2.x-ent.p1.x);
                                const tx = Math.cos(ang+Math.PI/2)*2, ty = Math.sin(ang+Math.PI/2)*2;
                                doc.line(ent.p1.x-tx, ent.p1.y-ty, ent.p1.x+tx, ent.p1.y+ty);
                                doc.line(ent.p2.x-tx, ent.p2.y-ty, ent.p2.x+tx, ent.p2.y+ty);
                                const mid = Geo.mid(ent.p1, ent.p2);
                                const dfs = ent.fontSize != null ? ent.fontSize : dimFontSize;
                                const dto = ent.textOffset != null ? ent.textOffset : dimTextOffset;
                                let dAng = (ang > Math.PI/2 || ang < -Math.PI/2) ? ang + Math.PI : ang;
                                const perpX = Math.cos(dAng - Math.PI/2) * dto, perpY = Math.sin(dAng - Math.PI/2) * dto;
                                const dimText = formatDim(Geo.dist(ent.p1, ent.p2) * drawingScale);
                                vText(dimText, mid.x + perpX, mid.y + perpY, dfs, color, 'center', -dAng*180/Math.PI);
                            } else if (ent.type === 'text_label') {
                                const isGroupName = ent.color === '#ffff00';
                                const isUserText = ent.userText === true;
                                const fs = ent.fontSize || (isGroupName ? 4 : (isUserText ? 3 : 2));
                                const align = ent.align || (isGroupName ? 'center' : 'left');
                                const rot = (ent.rotation || 0);
                                vText(ent.text, ent.p1.x, ent.p1.y, fs, isGroupName ? '#333333' : (color === '#ff00ff' ? '#333333' : color), align, -rot);
                            } else if (ent.type === TOOLS.POLYGON) {
                                if (ent.material && ent.material !== 'none') vMaterialHatch(ent.pts, ent.material);
                                setStroke(color, ent.lineWidth); setDash(ent.lineStyle);
                                for (let i = 0; i < ent.pts.length; i++) {
                                    const a = ent.pts[i], b = ent.pts[(i+1)%ent.pts.length];
                                    doc.line(a.x, a.y, b.x, b.y);
                                }
                            } else if (ent.type === 'symbol') {
                                // シンボルは形状の種類が非常に多いため、簡易ベクター表現（枠＋ラベル）とする
                                const sym = GAIKO_SYMBOLS[ent.symbolType];
                                if (!sym) return;
                                setStroke(color, ent.lineWidth); doc.setLineDashPattern([], 0);
                                const s = (ent.scale || 1) / drawingScale;
                                if (sym.r) {
                                    doc.circle(ent.p1.x, ent.p1.y, sym.r * s, 'S');
                                } else if (sym.w && sym.h) {
                                    doc.rect(ent.p1.x - sym.w*s/2, ent.p1.y - sym.h*s/2, sym.w*s, sym.h*s, 'S');
                                }
                                vText(sym.label, ent.p1.x, ent.p1.y + (sym.h ? sym.h*s/2+2 : (sym.r||2)*s+2), 1.8, '#222222', 'center', 0);
                            }
                        } catch (e) { console.warn('vector export entity error', ent.type, e); }
                    });

                    doc.save('drawing_vector.pdf');
                } catch (e) {
                    console.error('Vector PDF export error:', e);
                    alert('ベクターPDF出力に失敗しました: ' + e.message);
                }
            }, [paper, entities, gridConfig, gridMode, layerVisibility, drawingScale, unit, formatDim, dimFontSize, dimTextOffset]);

            const exportPDF = useCallback(() => {
                const p = PAPERS[paper];
                const realCanvas = canvasRef.current;
                if (!realCanvas) return;

                // 画面上のキャンバス（ブラウザウィンドウのピクセル数に依存）をそのまま画像化すると
                // 解像度が低くなってしまうため、印刷用に高DPIのオフスクリーンキャンバスへ
                // 用紙サイズぴったりで直接描画してから書き出す。
                const exportDPI = pdfExportDPI || 300;
                const exportMM_TO_PX = exportDPI / 25.4;
                const outW = Math.round(p.width  * exportMM_TO_PX);
                const outH = Math.round(p.height * exportMM_TO_PX);

                const offCanvas = document.createElement('canvas');
                offCanvas.width = outW;
                offCanvas.height = outH;

                const realView = viewRef.current;
                const savedCanvasRefCurrent = canvasRef.current;

                try {
                    // render() が参照している canvasRef / viewRef を一時的に
                    // オフスクリーンキャンバス・書き出し用ビューに差し替えて直接描画させる
                    canvasRef.current = offCanvas;
                    viewRef.current = { scale: exportDPI / DPI, offsetX: 0, offsetY: 0 };
                    render();

                    const imgData = offCanvas.toDataURL('image/png', 1.0);
                    const doc = new jsPDF({
                        orientation: p.width > p.height ? 'l' : 'p',
                        unit: 'mm',
                        format: [p.width, p.height]
                    });
                    doc.addImage(imgData, 'PNG', 0, 0, p.width, p.height);
                    doc.save('drawing.pdf');
                } catch(e) {
                    console.error('PDF export error:', e);
                    alert('PDF出力に失敗しました: ' + e.message);
                } finally {
                    // 画面表示用の状態に戻す
                    canvasRef.current = savedCanvasRefCurrent;
                    viewRef.current = realView;
                    setForceUpdate(n => n + 1);
                }
            }, [paper, entities, drawingScale, pdfExportDPI]);

            // Draw Grid Function
            const drawGrid = (ctx, view, paperW, paperH) => {
                if (!gridConfig.visible) return;

                ctx.save();
                const step = gridConfig.spacing || 10;
                const showSub = gridConfig.showSubGrid;
                const subDiv = Math.max(2, gridConfig.subDivisions || 5);
                const subStep = step / subDiv;
                // 実寸太さ（mm）。ズーム倍率や PDF出力時の一時スケールに依存させない。
                // これにより画面表示とPDF出力で常に同じ太さになる。ユーザーがグリッド設定パネルから調整可能。
                const majorLW = gridConfig.lineWidth || 0.15;
                const minorLW = majorLW * 0.53;

                const buildPath = (stepSize, isMajorOnly) => {
                    ctx.beginPath();
                    if (gridMode === GRID_MODES.ORTHO) {
                        for (let x = 0; x <= paperW; x += stepSize) {
                            if (!isMajorOnly && Math.abs(x % step) < 0.001) continue;
                            ctx.moveTo(x, 0); ctx.lineTo(x, paperH);
                        }
                        for (let y = 0; y <= paperH; y += stepSize) {
                            if (!isMajorOnly && Math.abs(y % step) < 0.001) continue;
                            ctx.moveTo(0, y); ctx.lineTo(paperW, y);
                        }
                    } else if (gridMode === GRID_MODES.ISO) {
                        const maxDim = Math.max(paperW, paperH) * 2;
                        const tanAngle = Math.tan((gridConfig.isoAngle * Math.PI) / 180);
                        
                        const startK = Math.floor(-maxDim / stepSize) * stepSize;

                        for (let k = startK; k < maxDim; k += stepSize) {
                            if (!isMajorOnly && Math.abs(k % step) > 0.001) {}
                            ctx.moveTo(-maxDim, -maxDim * tanAngle + k); 
                            ctx.lineTo(maxDim, maxDim * tanAngle + k);
                            ctx.moveTo(-maxDim, maxDim * tanAngle + k);
                            ctx.lineTo(maxDim, -maxDim * tanAngle + k);
                        }
                    } else if (gridMode.includes('PERSP')) {
                        if (gridMode === GRID_MODES.PERSP_1) {
                            const margin = paperW * 0.5;
                            const startX = Math.ceil(-margin / stepSize) * stepSize;
                            const endX = paperW + margin;

                            for (let x = startX; x <= endX; x += stepSize) {
                                if (!isMajorOnly && Math.abs(x % step) < 0.001) continue;
                                ctx.moveTo(vp1.x, vp1.y); ctx.lineTo(x, paperH); 
                            }
                        } else {
                            if (isMajorOnly) {
                                const stepAngle = Math.PI / 36;
                                for(let a= -Math.PI; a < Math.PI; a+= stepAngle) {
                                    if (Math.abs(Math.sin(a)) < 0.1) continue; 
                                    ctx.moveTo(vp1.x, vp1.y); ctx.lineTo(vp1.x + Math.cos(a)*2000, vp1.y + Math.sin(a)*2000);
                                }
                                for(let a= -Math.PI; a < Math.PI; a+= stepAngle) {
                                    if (Math.abs(Math.sin(a)) < 0.1) continue;
                                    ctx.moveTo(vp2.x, vp2.y); ctx.lineTo(vp2.x + Math.cos(a)*2000, vp2.y + Math.sin(a)*2000);
                                }
                            }
                        }
                    }
                };

                if (showSub) {
                    buildPath(subStep, false);
                    ctx.lineWidth = minorLW; ctx.strokeStyle = gridConfig.color; ctx.globalAlpha = gridConfig.opacity * 0.5; ctx.stroke();
                }

                // ズームインするとスナップが自動細分化される（getAdaptiveGridStep）ため、
                // 実際にスナップできる点と見た目のグリッドがずれないよう、細分化された分だけ薄いグリッドを追加描画する。
                const baseStepForAdaptive = showSub ? subStep : step;
                const adaptiveStep = getAdaptiveGridStep(baseStepForAdaptive, view.scale);
                if (adaptiveStep < baseStepForAdaptive - 1e-6) {
                    buildPath(adaptiveStep, false);
                    ctx.lineWidth = minorLW * 0.6; ctx.strokeStyle = gridConfig.color; ctx.globalAlpha = gridConfig.opacity * 0.25; ctx.stroke();
                }

                buildPath(step, true);
                ctx.lineWidth = majorLW; ctx.strokeStyle = gridConfig.color; ctx.globalAlpha = gridConfig.opacity; ctx.stroke();

                if (gridMode === GRID_MODES.PERSP_1) {
                    ctx.beginPath();
                    ctx.strokeStyle = '#00cdff'; 
                    ctx.lineWidth = Math.max(0.2 / view.scale, 0.05); 
                    ctx.globalAlpha = 0.4; 
                    const horizon = vp1.y;
                    let y = paperH; let limit = 200;
                    while (limit-- > 0 && y > horizon + 1) {
                        ctx.moveTo(0, y); ctx.lineTo(paperW, y);
                        y = horizon + (y - horizon) * 0.85; 
                        if (Math.abs(y - horizon) < 0.5) break;
                    }
                    y = 0; limit = 200;
                    while (limit-- > 0 && y < horizon - 1) {
                        ctx.moveTo(0, y); ctx.lineTo(paperW, y);
                        y = horizon - (horizon - y) * 0.85;
                        if (Math.abs(y - horizon) < 0.5) break;
                    }
                    ctx.stroke();
                }

                if (gridMode.includes('PERSP')) {
                    ctx.beginPath(); ctx.strokeStyle = '#00bcd4'; ctx.setLineDash([5/view.scale, 5/view.scale]); ctx.globalAlpha = 0.8; 
                    ctx.moveTo(-5000, vp1.y); ctx.lineTo(5000, vp1.y); ctx.stroke(); ctx.setLineDash([]);
                }
                ctx.restore();
            };

            const render = useCallback(() => {
                const canvas = canvasRef.current;
                if (!canvas) return; 
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let v = viewRef.current;
                if (!v || !isFinite(v.scale)) { viewRef.current = { scale: 1, offsetX: 0, offsetY: 0 }; v = viewRef.current; }

                ctx.save();
                ctx.translate(v.offsetX, v.offsetY);
                ctx.scale(v.scale * MM_TO_PX, v.scale * MM_TO_PX);

                const p = PAPERS[paper];
                ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, p.width, p.height);
                ctx.strokeStyle = '#999'; ctx.lineWidth = 1 / (v.scale * MM_TO_PX); ctx.strokeRect(0, 0, p.width, p.height);

                ctx.save(); ctx.beginPath(); ctx.rect(0, 0, p.width, p.height); ctx.clip();
                drawGrid(ctx, v, p.width, p.height);

                entities.forEach(ent => {
                    try {
                    // ── レイヤー表示フィルター ──
                    const entLayer = ent.layer || 'drawing';
                    const layerKey = ent.isDim ? 'annotation'
                                   : entLayer === 'annotation' ? 'annotation'
                                   : entLayer === 'dim' ? 'dim'
                                   : ent.type === 'symbol' ? 'symbol'
                                   : 'drawing';
                    if (!layerVisibility[layerKey]) return;

                    ctx.beginPath();
                    const color = ent.color || (ent.layer === 'dim' ? '#00aaff' : '#000000');
                    ctx.strokeStyle = color;
                    ctx.lineWidth = ent.layer === 'dim' ? 0.2 : (ent.lineWidth || 0.3);
                    if (ent.type === 'symbol') {
                        drawGaikoSymbol(ctx, ent, drawingScale);
                        return;
                    }
                    if (ent.type === TOOLS.LINE) { ctx.setLineDash((LINE_STYLES[ent.lineStyle]||LINE_STYLES.solid).dash); ctx.moveTo(ent.p1.x, ent.p1.y); ctx.lineTo(ent.p2.x, ent.p2.y); ctx.stroke(); ctx.setLineDash([]); }
                    else if (ent.type === TOOLS.RECT) { ctx.setLineDash((LINE_STYLES[ent.lineStyle]||LINE_STYLES.solid).dash); ctx.rect(ent.p1.x, ent.p1.y, ent.w, ent.h); ctx.stroke(); ctx.setLineDash([]); }
                    else if (ent.type === TOOLS.CIRCLE) { ctx.setLineDash((LINE_STYLES[ent.lineStyle]||LINE_STYLES.solid).dash); ent.isArc ? ctx.arc(ent.c.x, ent.c.y, ent.r, ent.startAngle, ent.endAngle, ent.anticlockwise) : ctx.arc(ent.c.x, ent.c.y, ent.r, 0, Math.PI * 2); ctx.stroke(); ctx.setLineDash([]); }
                    else if (ent.type === 'mline') {
                        // 多重線: 中心線に対して指定した左右の本数・間隔で平行線を描画
                        const dx = ent.p2.x - ent.p1.x, dy = ent.p2.y - ent.p1.y;
                        const len = Math.sqrt(dx*dx + dy*dy) || 1;
                        const nx = -dy/len, ny = dx/len;
                        const offsets = ent.offsets || computeMlineOffsets(ent.spacing || 100, ent.leftCount != null ? ent.leftCount : 1, ent.rightCount != null ? ent.rightCount : 1, ent.showCenter !== false);
                        ctx.setLineDash((LINE_STYLES[ent.lineStyle]||LINE_STYLES.solid).dash);
                        offsets.forEach(off => {
                            ctx.beginPath();
                            ctx.moveTo(ent.p1.x + nx*off, ent.p1.y + ny*off);
                            ctx.lineTo(ent.p2.x + nx*off, ent.p2.y + ny*off);
                            ctx.stroke();
                        });
                        ctx.setLineDash([]);
                    }
                    else if (ent.type === 'leader') {
                        // 引き出し線: 矢印(p1)→折れ点(p2)→水平の引き出し線→文字
                        ctx.lineWidth = ent.lineWidth || 0.3;
                        const dirX = ent.p2.x >= ent.p1.x ? 1 : -1;
                        const tailLen = 6;
                        const tailEnd = { x: ent.p2.x + dirX*tailLen, y: ent.p2.y };
                        ctx.beginPath();
                        ctx.moveTo(ent.p1.x, ent.p1.y);
                        ctx.lineTo(ent.p2.x, ent.p2.y);
                        ctx.lineTo(tailEnd.x, tailEnd.y);
                        ctx.stroke();
                        // 矢印（矢じり）
                        const ang = Math.atan2(ent.p2.y - ent.p1.y, ent.p2.x - ent.p1.x);
                        const alen = 2.2, awid = 0.8;
                        ctx.beginPath();
                        ctx.moveTo(ent.p1.x, ent.p1.y);
                        ctx.lineTo(ent.p1.x + Math.cos(ang+Math.PI-0.3)*alen, ent.p1.y + Math.sin(ang+Math.PI-0.3)*alen);
                        ctx.lineTo(ent.p1.x + Math.cos(ang+Math.PI+0.3)*alen, ent.p1.y + Math.sin(ang+Math.PI+0.3)*alen);
                        ctx.closePath(); ctx.fillStyle = ent.color || '#000000'; ctx.fill();
                        // 文字
                        const fs = ent.fontSize || 3;
                        ctx.fillStyle = ent.color || '#000000';
                        ctx.font = `${fs}px sans-serif`;
                        ctx.textAlign = dirX > 0 ? 'left' : 'right';
                        ctx.textBaseline = 'bottom';
                        ctx.fillText(ent.text || '', tailEnd.x + dirX*0.8, tailEnd.y - 0.5);
                    }
                    else if (ent.type === TOOLS.POLYGON) {
                        if (!ent.pts || ent.pts.length < 2) return;
                        // 塗り（白黒モード時は色を付けず、ハッチングのみで表現）
                        const mat = MATERIALS[ent.material || 'none'];
                        if (mat && mat.color && !bwFill) {
                            ctx.beginPath();
                            ctx.moveTo(ent.pts[0].x, ent.pts[0].y);
                            for (let i = 1; i < ent.pts.length; i++) ctx.lineTo(ent.pts[i].x, ent.pts[i].y);
                            ctx.closePath();
                            ctx.fillStyle = mat.color + 'aa';
                            ctx.fill();
                        } else if (bwFill && mat && (mat.color || mat.pattern)) {
                            // 白黒モード: 背景を白で塗り、下地が透けないようにする（用紙が白のため実質そのまま）
                            ctx.beginPath();
                            ctx.moveTo(ent.pts[0].x, ent.pts[0].y);
                            for (let i = 1; i < ent.pts.length; i++) ctx.lineTo(ent.pts[i].x, ent.pts[i].y);
                            ctx.closePath();
                            ctx.fillStyle = '#ffffff';
                            ctx.fill();
                        }
                        // ハッチング
                        if (ent.material && ent.material !== 'none') {
                            drawMaterialPattern(ctx, ent.pts, ent.material, drawingScale, bwFill);
                        }
                        // 輪郭線
                        ctx.beginPath();
                        ctx.moveTo(ent.pts[0].x, ent.pts[0].y);
                        for (let i = 1; i < ent.pts.length; i++) ctx.lineTo(ent.pts[i].x, ent.pts[i].y);
                        ctx.closePath();
                        ctx.setLineDash((LINE_STYLES[ent.lineStyle]||LINE_STYLES.solid).dash);
                        ctx.stroke();
                        ctx.setLineDash([]);
                        // 頂点マーカー
                        ent.pts.forEach(pt => {
                            ctx.beginPath(); ctx.arc(pt.x, pt.y, 0.5, 0, Math.PI*2);
                            ctx.fillStyle = color; ctx.fill();
                        });
                        // ── 面積ラベル（layerVisibility.area が true の場合）──
                        if (layerVisibility.area && ent.pts.length >= 3) {
                            // ガウス公式で面積計算（紙面mm² → 実寸m²）
                            let areaSum = 0;
                            let cx4 = 0, cy4 = 0;
                            for (let i = 0; i < ent.pts.length; i++) {
                                const j = (i + 1) % ent.pts.length;
                                areaSum += ent.pts[i].x * ent.pts[j].y - ent.pts[j].x * ent.pts[i].y;
                                cx4 += ent.pts[i].x; cy4 += ent.pts[i].y;
                            }
                            const areaPaper = Math.abs(areaSum / 2);  // 紙面mm²
                            const areaReal  = areaPaper * (drawingScale * drawingScale) / 1e6;  // 実寸m²
                            cx4 /= ent.pts.length; cy4 /= ent.pts.length;
                            const mat2 = MATERIALS[ent.material || 'none'];
                            const areaFontSize = Math.max(2, Math.min(5, Math.sqrt(areaPaper) * 0.15));
                            ctx.save();
                            // 背景白抜き
                            ctx.font = `bold ${areaFontSize}px sans-serif`;
                            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                            const areaText = `${areaReal.toFixed(2)} ㎡`;
                            const tw = ctx.measureText(areaText).width;
                            ctx.fillStyle = 'rgba(255,255,255,0.75)';
                            ctx.fillRect(cx4 - tw/2 - 0.5, cy4 - areaFontSize/2 - 0.3, tw + 1, areaFontSize + 0.6);
                            ctx.fillStyle = mat2?.color ? '#003366' : '#333333';
                            ctx.fillText(areaText, cx4, cy4);
                            ctx.restore();
                        }
                    }
                    else if (ent.type === 'fence_fill') {
                        if (!ent.pts || ent.pts.length < 4) return;
                        const [p0, p1f, p2f, p3] = ent.pts;
                        const fenceStyles = {
                            mesh:       { bg: '#c8dff0', stripe: '#5599cc', lw: 0.3, label: 'メッシュ' },
                            horizontal: { bg: '#e0e8f0', stripe: '#7799bb', lw: 0.4, label: '横格子' },
                            vertical:   { bg: '#dde8f5', stripe: '#6688bb', lw: 0.4, label: '縦格子' },
                            wood:       { bg: '#d4b896', stripe: '#8b5a2b', lw: 0.5, label: 'ウッド' },
                            louver:     { bg: '#e8e4d0', stripe: '#888866', lw: 0.4, label: 'ルーバー' },
                        };
                        const fs2 = fenceStyles[ent.fenceType] || fenceStyles.mesh;

                        // ① 帯全体を背景色で塗りつぶし（ブロック線を隠す）
                        ctx.beginPath();
                        ctx.moveTo(p0.x, p0.y); ctx.lineTo(p1f.x, p1f.y);
                        ctx.lineTo(p2f.x, p2f.y); ctx.lineTo(p3.x, p3.y);
                        ctx.closePath();
                        ctx.fillStyle = fs2.bg;
                        ctx.fill();

                        // ② パターン（クリップせず帯内に手動で収める）
                        const adx = p1f.x - p0.x, ady = p1f.y - p0.y;
                        const alen = Math.sqrt(adx*adx + ady*ady);
                        const wdx = p3.x - p0.x, wdy = p3.y - p0.y;
                        const wlen = Math.sqrt(wdx*wdx + wdy*wdy);
                        ctx.strokeStyle = fs2.stripe;

                        if (ent.fenceType === 'mesh') {
                            const pitch = Math.max(0.5, 100 / drawingScale);
                            ctx.lineWidth = fs2.lw;
                            const sA = Math.ceil(alen / pitch);
                            for (let i = 0; i <= sA; i++) {
                                const t = i / Math.max(sA, 1);
                                ctx.beginPath();
                                ctx.moveTo(p0.x + adx*t, p0.y + ady*t);
                                ctx.lineTo(p3.x + adx*t, p3.y + ady*t);
                                ctx.stroke();
                            }
                            const sW = Math.ceil(wlen / pitch);
                            for (let i = 0; i <= sW; i++) {
                                const t = i / Math.max(sW, 1);
                                ctx.beginPath();
                                ctx.moveTo(p0.x + wdx*t, p0.y + wdy*t);
                                ctx.lineTo(p1f.x + wdx*t, p1f.y + wdy*t);
                                ctx.stroke();
                            }
                        } else if (ent.fenceType === 'vertical') {
                            const pitch = Math.max(0.5, 75 / drawingScale);
                            ctx.lineWidth = fs2.lw * 1.5;
                            const sA = Math.ceil(alen / pitch);
                            for (let i = 0; i <= sA; i++) {
                                const t = i / Math.max(sA, 1);
                                ctx.beginPath();
                                ctx.moveTo(p0.x + adx*t, p0.y + ady*t);
                                ctx.lineTo(p3.x + adx*t, p3.y + ady*t);
                                ctx.stroke();
                            }
                        } else if (ent.fenceType === 'horizontal' || ent.fenceType === 'louver') {
                            const pitch = Math.max(0.5, (ent.fenceType === 'louver' ? 80 : 100) / drawingScale);
                            ctx.lineWidth = ent.fenceType === 'louver' ? fs2.lw * 2 : fs2.lw * 1.5;
                            const sW = Math.ceil(wlen / pitch);
                            for (let i = 0; i <= sW; i++) {
                                const t = i / Math.max(sW, 1);
                                ctx.beginPath();
                                ctx.moveTo(p0.x + wdx*t, p0.y + wdy*t);
                                ctx.lineTo(p1f.x + wdx*t, p1f.y + wdy*t);
                                ctx.stroke();
                            }
                        } else if (ent.fenceType === 'wood') {
                            const pitch = Math.max(0.5, 120 / drawingScale);
                            ctx.lineWidth = fs2.lw * 3;
                            const sW = Math.ceil(wlen / pitch);
                            for (let i = 1; i < sW; i++) {
                                const t = i / Math.max(sW, 1);
                                ctx.beginPath();
                                ctx.moveTo(p0.x + wdx*t, p0.y + wdy*t);
                                ctx.lineTo(p1f.x + wdx*t, p1f.y + wdy*t);
                                ctx.stroke();
                            }
                        }

                        // ③ 外枠線
                        ctx.beginPath();
                        ctx.moveTo(p0.x, p0.y); ctx.lineTo(p1f.x, p1f.y);
                        ctx.lineTo(p2f.x, p2f.y); ctx.lineTo(p3.x, p3.y);
                        ctx.closePath();
                        ctx.strokeStyle = fs2.stripe;
                        ctx.lineWidth = lineWidth * 1.5;
                        ctx.stroke();

                        // ④ ラベル
                        if (alen > 5) {
                            const cx2 = (p0.x + p1f.x + p2f.x + p3.x) / 4;
                            const cy2 = (p0.y + p1f.y + p2f.y + p3.y) / 4;
                            const fontSize = Math.max(1.5, Math.min(wlen * 0.4, 3));
                            const ang2 = Math.atan2(ady, adx);
                            ctx.save();
                            ctx.translate(cx2, cy2); ctx.rotate(ang2);
                            ctx.font = `bold ${fontSize}px sans-serif`;
                            ctx.fillStyle = fs2.stripe;
                            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                            ctx.fillText(`${fs2.label} H=${ent.fenceHeight}`, 0, 0);
                            ctx.restore();
                        }
                    }
                    else if (ent.type === TOOLS.DIM) {
                        ctx.moveTo(ent.p1.x, ent.p1.y); ctx.lineTo(ent.p2.x, ent.p2.y);
                        const ang = Math.atan2(ent.p2.y - ent.p1.y, ent.p2.x - ent.p1.x);
                        const tx = Math.cos(ang + Math.PI/2) * 2, ty = Math.sin(ang + Math.PI/2) * 2;
                        ctx.moveTo(ent.p1.x - tx, ent.p1.y - ty); ctx.lineTo(ent.p1.x + tx, ent.p1.y + ty);
                        ctx.moveTo(ent.p2.x - tx, ent.p2.y - ty); ctx.lineTo(ent.p2.x + tx, ent.p2.y + ty);
                        ctx.stroke();
                    }
                    else if (ent.type === 'text_label') {
                        const isGroupName = ent.color === '#ffff00';
                        const isDimLabel  = ent.isDim === true;
                        const isUserText  = ent.userText === true;

                        if (!isGroupName && !isDimLabel && !isUserText) {
                            // 測点マーカー
                            ctx.lineWidth = 0.5 / viewRef.current.scale;
                            ctx.beginPath();
                            ctx.moveTo(ent.p1.x - 1, ent.p1.y); ctx.lineTo(ent.p1.x + 1, ent.p1.y);
                            ctx.moveTo(ent.p1.x, ent.p1.y - 1); ctx.lineTo(ent.p1.x, ent.p1.y + 1);
                            ctx.stroke();
                        }

                        const fontSize = ent.fontSize || (isGroupName ? 4 : (isUserText ? 3 : 2));
                        const align    = ent.align || (isGroupName ? 'center' : 'left');
                        const rotation = (ent.rotation || 0) * Math.PI / 180;

                        ctx.save();
                        if (isUserText && rotation !== 0) {
                            ctx.translate(ent.p1.x, ent.p1.y);
                            ctx.rotate(rotation);
                            ctx.translate(-ent.p1.x, -ent.p1.y);
                        }
                        ctx.fillStyle = ent.color || '#ff00ff';
                        ctx.font = `${isDimLabel ? 'bold ' : ''}${fontSize}px sans-serif`;
                        ctx.textAlign = align;
                        ctx.textBaseline = isDimLabel ? 'middle' : (isGroupName ? 'middle' : (isUserText ? 'middle' : 'bottom'));
                        const tx = align === 'left' ? ent.p1.x + (isUserText ? 0 : 1.5) : ent.p1.x;
                        const ty = isDimLabel ? ent.p1.y : (isGroupName || isUserText ? ent.p1.y : ent.p1.y - 1);
                        ctx.fillText(ent.text, tx, ty);
                        ctx.restore();
                    }
                    
                    if (ent.type === TOOLS.DIM) {
                        const dfs = ent.fontSize != null ? ent.fontSize : dimFontSize;
                        const dto = ent.textOffset != null ? ent.textOffset : dimTextOffset;
                        ctx.fillStyle = color; ctx.font = `${dfs}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
                        const mid = Geo.mid(ent.p1, ent.p2);
                        const dimText = formatDim(Geo.dist(ent.p1, ent.p2) * drawingScale);
                        ctx.save(); ctx.translate(mid.x, mid.y);
                        const ang = Math.atan2(ent.p2.y - ent.p1.y, ent.p2.x - ent.p1.x);
                        ctx.rotate( (ang > Math.PI/2 || ang < -Math.PI/2) ? ang + Math.PI : ang );
                        ctx.fillText(dimText, 0, -dto); ctx.restore();
                    }
                    } catch(e) { console.warn('entity render error', ent.type, e); }
                });

                if (tempPoints.length > 0) {
                    const start = tempPoints[0];
                    const curr = snapPos.current || currentMousePos.current;
                    ctx.beginPath(); ctx.strokeStyle = strokeColor; ctx.lineWidth = (tool===TOOLS.DIM)?0.2:strokeWidth; ctx.setLineDash(previewDashed ? [2, 2] : []);
                    if (tool === TOOLS.LINE || tool === TOOLS.DIM) {
                        ctx.moveTo(start.x, start.y); ctx.lineTo(curr.x, curr.y); ctx.stroke();
                        if (showLiveMeasure) {
                        const dimText = formatDim(Geo.dist(start, curr) * drawingScale);
                        ctx.save(); ctx.fillStyle = '#ff0000'; ctx.font = `${dimFontSize}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
                        const mid = Geo.mid(start, curr);
                        const ang = Math.atan2(curr.y - start.y, curr.x - start.x);
                        ctx.translate(mid.x, mid.y); ctx.rotate((ang > Math.PI/2 || ang < -Math.PI/2) ? ang + Math.PI : ang);
                        ctx.fillText(dimText, 0, -dimTextOffset); ctx.restore();
                        }
                    } else if (tool === TOOLS.RECT) {
                        const w = curr.x - start.x, h = curr.y - start.y;
                        ctx.rect(start.x, start.y, w, h); ctx.stroke();
                        if (showLiveMeasure) {
                        const txtW = formatDim(Math.abs(w)*drawingScale), txtH = formatDim(Math.abs(h)*drawingScale);
                        ctx.save(); ctx.fillStyle = '#ff0000'; ctx.font = '3px sans-serif'; ctx.fillText(`${txtW} x ${txtH}`, curr.x+2, curr.y+5); ctx.restore();
                        }
                    } else if (tool === TOOLS.CIRCLE) {
                        const r = Geo.dist(start, curr);
                        ctx.arc(start.x, start.y, r, 0, Math.PI * 2); ctx.moveTo(start.x, start.y); ctx.lineTo(curr.x, curr.y); ctx.stroke();
                        if (showLiveMeasure) {
                        const txtR = formatDim(r*drawingScale);
                        ctx.save(); ctx.fillStyle = '#ff0000'; ctx.font = '3px sans-serif'; const mid = Geo.mid(start, curr); ctx.fillText(`R${txtR}`, mid.x, mid.y); ctx.restore();
                        }
                    } else if (tool === TOOLS.ARC) {
                        const center = tempPoints[0];
                        if (tempPoints.length === 1) {
                            // 半径・開始角を決めている段階：中心から現在点までのガイド線＋薄い円
                            const r = Geo.dist(center, curr);
                            ctx.arc(center.x, center.y, r, 0, Math.PI * 2);
                            ctx.moveTo(center.x, center.y); ctx.lineTo(curr.x, curr.y);
                            ctx.stroke();
                            if (showLiveMeasure) {
                            ctx.save(); ctx.fillStyle = '#ff0000'; ctx.font = '3px sans-serif'; ctx.fillText(`R${formatDim(r*drawingScale)}`, curr.x+2, curr.y+5); ctx.restore();
                            }
                        } else {
                            // 終了角を決めている段階：実際に描かれる弧をプレビュー
                            const startPt = tempPoints[1];
                            const r = Geo.dist(center, startPt);
                            const startAngle = Math.atan2(startPt.y - center.y, startPt.x - center.x);
                            const endAngle = Math.atan2(curr.y - center.y, curr.x - center.x);
                            const cross = (startPt.x - center.x) * (curr.y - center.y) - (startPt.y - center.y) * (curr.x - center.x);
                            ctx.arc(center.x, center.y, r, startAngle, endAngle, cross < 0);
                            ctx.stroke();
                            ctx.save(); ctx.fillStyle = '#666'; ctx.lineWidth = 0.15; ctx.setLineDash([1,1]);
                            ctx.beginPath(); ctx.moveTo(center.x, center.y); ctx.lineTo(startPt.x, startPt.y); ctx.moveTo(center.x, center.y); ctx.lineTo(curr.x, curr.y); ctx.stroke();
                            ctx.restore();
                        }
                    } else if (tool === TOOLS.BLOCK_WALL) {
                        // ブロック壁プレビュー
                        const thickPaper = blockThickness / drawingScale;
                        const dx = curr.x - start.x, dy = curr.y - start.y;
                        const len = Math.sqrt(dx*dx+dy*dy);
                        if (len > 0.1) {
                            const nx = -dy/len, ny = dx/len;
                            const { offA, offB } = blockOffsets(nx, ny, thickPaper, blockPosition, start, curr);
                            ctx.moveTo(start.x+nx*offA, start.y+ny*offA); ctx.lineTo(curr.x+nx*offA, curr.y+ny*offA);
                            ctx.moveTo(start.x+nx*offB, start.y+ny*offB); ctx.lineTo(curr.x+nx*offB, curr.y+ny*offB);
                            ctx.stroke();
                        }
                    }
                    ctx.setLineDash([]);
                }

                // ── 立方体プレビュー ──
                if (tool === TOOLS.CUBE) {
                    const curr4 = snapPos.current || currentMousePos.current;
                    if (curr4) {
                        // VP補助線（位置決めしやすくするため、VP1/VP2から現在位置への破線）
                        ctx.save();
                        ctx.strokeStyle = 'rgba(147,51,234,0.5)';
                        ctx.lineWidth = 0.25;
                        ctx.setLineDash([1.5, 1.5]);
                        ctx.beginPath(); ctx.moveTo(vp1.x, vp1.y); ctx.lineTo(curr4.x, curr4.y); ctx.stroke();
                        if (gridMode === GRID_MODES.PERSP_2) {
                            ctx.beginPath(); ctx.moveTo(vp2.x, vp2.y); ctx.lineTo(curr4.x, curr4.y); ctx.stroke();
                        }
                        ctx.setLineDash([]);
                        // VPからの垂直距離を表示（位置決めの参考値）
                        ctx.fillStyle = '#9333ea';
                        ctx.font = '2.2px sans-serif';
                        ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
                        const vpDistDisp = Math.abs(curr4.y - vp1.y) * drawingScale;
                        ctx.fillText(`VP距離: ${(vpDistDisp/1000).toFixed(2)}m`, curr4.x + 3, curr4.y - 3);
                        ctx.restore();

                        const sizeMM = cubeSize * (gridConfig.spacing || 10);
                        const vpPoint = gridMode === GRID_MODES.PERSP_2 ? { x:(vp1.x+vp2.x)/2, y:(vp1.y+vp2.y)/2 } : vp1;
                        const result = createPerspCubeEntities(curr4, sizeMM, vpPoint, '#9333ea', 0.3);
                        if (!result.error) {
                            ctx.save();
                            ctx.strokeStyle = '#9333ea'; ctx.lineWidth = 0.4; ctx.setLineDash([2,1]);
                            result.entities.forEach(le => { ctx.beginPath(); ctx.moveTo(le.p1.x,le.p1.y); ctx.lineTo(le.p2.x,le.p2.y); ctx.stroke(); });
                            ctx.setLineDash([]); ctx.restore();
                        } else {
                            // エラー時は赤い×印で警告表示（位置を直感的に伝える）
                            ctx.save();
                            ctx.strokeStyle = '#ff3333'; ctx.lineWidth = 0.5;
                            const xs = 3;
                            ctx.beginPath();
                            ctx.moveTo(curr4.x-xs,curr4.y-xs); ctx.lineTo(curr4.x+xs,curr4.y+xs);
                            ctx.moveTo(curr4.x+xs,curr4.y-xs); ctx.lineTo(curr4.x-xs,curr4.y+xs);
                            ctx.stroke();
                            ctx.restore();
                        }
                    }
                }

                // ── 正多角形プレビュー ──
                if (tool === TOOLS.REG_POLY && tempPoints.length === 1) {
                    const curr3 = snapPos.current || currentMousePos.current;
                    if (curr3) {
                        const center3 = tempPoints[0];
                        const r3 = Geo.dist(center3, curr3);
                        const startAngle3 = Math.atan2(curr3.y - center3.y, curr3.x - center3.x);
                        ctx.save();
                        ctx.strokeStyle = strokeColor; ctx.lineWidth = strokeWidth;
                        ctx.setLineDash([2, 2]);
                        ctx.beginPath();
                        for (let i = 0; i < regPolySides; i++) {
                            const a = startAngle3 + (i / regPolySides) * Math.PI * 2;
                            const px3 = center3.x + Math.cos(a) * r3;
                            const py3 = center3.y + Math.sin(a) * r3;
                            i === 0 ? ctx.moveTo(px3, py3) : ctx.lineTo(px3, py3);
                        }
                        ctx.closePath(); ctx.stroke();
                        // 中心点
                        ctx.fillStyle = strokeColor;
                        ctx.beginPath(); ctx.arc(center3.x, center3.y, 1/(v.scale*MM_TO_PX), 0, Math.PI*2); ctx.fill();
                        // 半径線
                        ctx.strokeStyle = '#aaaaaa'; ctx.lineWidth = 0.3/(v.scale*MM_TO_PX);
                        ctx.beginPath(); ctx.moveTo(center3.x, center3.y); ctx.lineTo(curr3.x, curr3.y); ctx.stroke();
                        ctx.setLineDash([]); ctx.restore();
                    }
                }
                if (tool === TOOLS.POLYGON && tempPoints.length > 0) {
                    const curr2 = snapPos.current || currentMousePos.current;
                    ctx.save();
                    ctx.strokeStyle = strokeColor; ctx.lineWidth = strokeWidth;
                    ctx.setLineDash([2, 2]);
                    ctx.beginPath();
                    ctx.moveTo(tempPoints[0].x, tempPoints[0].y);
                    for (let i = 1; i < tempPoints.length; i++) ctx.lineTo(tempPoints[i].x, tempPoints[i].y);
                    if (curr2) ctx.lineTo(curr2.x, curr2.y);
                    ctx.stroke();
                    // 始点ハイライト（クローズ可能距離）
                    if (curr2 && tempPoints.length >= 3 && Geo.dist(curr2, tempPoints[0]) < 3/(v.scale*MM_TO_PX)) {
                        ctx.strokeStyle = '#00ff00'; ctx.lineWidth = 1/(v.scale*MM_TO_PX);
                        ctx.beginPath(); ctx.arc(tempPoints[0].x, tempPoints[0].y, 2/(v.scale*MM_TO_PX), 0, Math.PI*2); ctx.stroke();
                    }
                    // 頂点ドット
                    tempPoints.forEach((pt, i) => {
                        ctx.fillStyle = i === 0 ? '#ff4444' : strokeColor;
                        ctx.beginPath(); ctx.arc(pt.x, pt.y, 1/(v.scale*MM_TO_PX), 0, Math.PI*2); ctx.fill();
                    });
                    ctx.setLineDash([]); ctx.restore();
                }

                if (tool === TOOLS.ERASER) {
                    const mPos = currentMousePos.current;
                    ctx.save(); ctx.strokeStyle = '#ff0000'; ctx.lineWidth = 1/(v.scale*MM_TO_PX); ctx.beginPath(); ctx.arc(mPos.x, mPos.y, 5/(v.scale*MM_TO_PX), 0, Math.PI*2); ctx.stroke(); ctx.restore();
                }

                // ── 選択ハイライト ──
                if (tool === TOOLS.SELECT && selectedIds.current.size > 0) {
                    ctx.save();
                    ctx.strokeStyle = '#2299ff';
                    ctx.lineWidth = 1.5 / (v.scale * MM_TO_PX);
                    ctx.setLineDash([3/(v.scale*MM_TO_PX), 2/(v.scale*MM_TO_PX)]);
                    entities.forEach(ent => {
                        if (!selectedIds.current.has(ent.id)) return;
                        // バウンディングボックスを計算して枠を描く
                        let xs = [], ys = [];
                        if (ent.p1) { xs.push(ent.p1.x); ys.push(ent.p1.y); }
                        if (ent.p2) { xs.push(ent.p2.x); ys.push(ent.p2.y); }
                        if (ent.c)  { xs.push(ent.c.x-ent.r, ent.c.x+ent.r); ys.push(ent.c.y-ent.r, ent.c.y+ent.r); }
                        if (ent.pts) ent.pts.forEach(p => { xs.push(p.x); ys.push(p.y); });
                        if (xs.length === 0) return;
                        const pad = 2 / (v.scale * MM_TO_PX);
                        const bx = Math.min(...xs)-pad, by = Math.min(...ys)-pad;
                        const bw = Math.max(...xs)-bx+pad*2, bh = Math.max(...ys)-by+pad*2;
                        ctx.beginPath(); ctx.rect(bx, by, bw, bh); ctx.stroke();
                        // ハンドル（四隅）
                        ctx.setLineDash([]);
                        ctx.fillStyle = '#2299ff';
                        const hs = 3 / (v.scale * MM_TO_PX);
                        [[bx,by],[bx+bw,by],[bx,by+bh],[bx+bw,by+bh]].forEach(([hx,hy]) => {
                            ctx.beginPath(); ctx.rect(hx-hs, hy-hs, hs*2, hs*2); ctx.fill();
                        });
                        ctx.setLineDash([3/(v.scale*MM_TO_PX), 2/(v.scale*MM_TO_PX)]);
                    });
                    ctx.setLineDash([]); ctx.restore();
                }

                // ── ラバーバンド選択 ──
                if (tool === TOOLS.SELECT && selBoxRef.current) {
                    const sb = selBoxRef.current;
                    const bx = Math.min(sb.x1,sb.x2), by = Math.min(sb.y1,sb.y2);
                    const bw = Math.abs(sb.x2-sb.x1), bh = Math.abs(sb.y2-sb.y1);
                    ctx.save();
                    ctx.strokeStyle = '#2299ff'; ctx.lineWidth = 0.5/(v.scale*MM_TO_PX);
                    ctx.setLineDash([2/(v.scale*MM_TO_PX),2/(v.scale*MM_TO_PX)]);
                    ctx.strokeRect(bx,by,bw,bh);
                    ctx.fillStyle = 'rgba(34,153,255,0.08)';
                    ctx.fillRect(bx,by,bw,bh);
                    ctx.setLineDash([]); ctx.restore();
                }

                ctx.restore(); ctx.restore();

                if (gridConfig.visible) {
                    if (gridMode.includes('PERSP')) {
                        const toScreen = (pt) => Geo.projectPoint(pt.x, pt.y, { scale: v.scale * MM_TO_PX, offsetX: v.offsetX, offsetY: v.offsetY });
                        const drawHandle = (vp, label) => {
                            const s = toScreen(vp); ctx.fillStyle = '#00bcd4'; ctx.strokeStyle = 'white'; ctx.lineWidth = 2;
                            ctx.beginPath(); ctx.arc(s.x, s.y, 8, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                            ctx.fillStyle = 'white'; ctx.font = '10px sans-serif'; ctx.fillText(label, s.x + 10, s.y - 10);
                        };
                        drawHandle(vp1, "VP1");
                        if (gridMode === GRID_MODES.PERSP_2) drawHandle(vp2, "VP2");
                    }

                    if (snapPos.current && tool !== TOOLS.ERASER) {
                        const sp = snapPos.current;
                        const s = { x: sp.x * v.scale * MM_TO_PX + v.offsetX, y: sp.y * v.scale * MM_TO_PX + v.offsetY };
                        ctx.lineWidth = 2;
                        if (snapEnabled) {
                            // スナップON: 緑の四角
                            ctx.strokeStyle = '#00ff00';
                            ctx.beginPath(); ctx.rect(s.x - 4, s.y - 4, 8, 8); ctx.stroke();

                    if (dragState.current && smartGuides.current && smartGuides.current.length > 0) {

            const getMouseWorldPos = (e) => {

            const calculateSnap = (rawPos, shiftKey) => {
                let bestSnap = null;

                // ── グリッドスナップ（snapEnabled=true かつグリッド表示中のみ）──
                if (snapEnabled && gridConfig.visible) {
                    let minDist = 13 / viewRef.current.scale;
                    const majorStep = gridConfig.spacing || 10;
                    let step = gridConfig.showSubGrid ? (majorStep / Math.max(2, gridConfig.subDivisions || 5)) : majorStep;
                    // ズームインして画面上のマス目が広がった時、自動でさらに細分化してスナップ精度を上げる

                    if (gridMode === GRID_MODES.ORTHO) {

                        const kv = Math.round((rawPos.y + tanAngle * rawPos.x) / step) * step;

            const handleMouseDown = (e) => {

                                const newEnt = {
                                    id: Date.now() + Math.random() * 999,
                                    type: TOOLS.POLYGON,
                                    pts,
                                    material: selectedMaterial,
                                    color: strokeColor,
                                    lineWidth: strokeWidth,
                                    lineStyle: strokeStyleType,

                            let hit = false;
                            if (ent.type === TOOLS.LINE || ent.type === TOOLS.DIM || ent.isDim) {

                                }
                            } else if (ent.type === TOOLS.RECT) {

                                const y1=Math.min(ent.p1.y,ent.p1.y+ent.h),y2=Math.max(ent.p1.y,ent.p1.y+ent.h);
                                hit=pt.x>=x1&&pt.x<=x2&&pt.y>=y1&&pt.y<=y2;
