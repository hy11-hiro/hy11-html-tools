<html lang="ja">

    <title>Drafting Canvas - 測量入力（修正完了版）</title>
    
    <!-- Tailwind CSS（Play CDN: バージョン指定不可の仕様のため固定なし。影響は軽微） -->

    <style>

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 8px; height: 8px; }

        ::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #777; }

        input[type=number], input[type=text] { @apply bg-white text-black border border-gray-400 rounded p-1 focus:outline-none focus:border-blue-500; }

</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;
        const { jsPDF } = window.jspdf;

        const DPI = 96;
        const MM_TO_PX = DPI / 25.4;

        // ズームインした際、画面上のマス目が広くなりすぎたら自動的に細分化するための実効ステップを計算。
        // グリッド描画（drawGrid）とスナップ（calculateSnap）の両方でこの関数を使うことで、
        // 「見えているグリッド」と「スナップできる点」を常に一致させる。
        const getAdaptiveGridStep = (baseStep, viewScale) => {
            const pxPerStep = baseStep * viewScale * MM_TO_PX;
            if (pxPerStep > 45) {
                const extraDiv = Math.min(32, Math.pow(2, Math.floor(Math.log2(pxPerStep / 45))));
                return baseStep / extraDiv;
            }
            return baseStep;
        };
        
        const PAPERS = {
            A4_L: { width: 297, height: 210, name: 'A4 横' },
            A4_P: { width: 210, height: 297, name: 'A4 縦' },
            A3_L: { width: 420, height: 297, name: 'A3 横' },
            A3_P: { width: 297, height: 420, name: 'A3 縦' },
        };

        const GRID_MODES = { ORTHO: 'ORTHO', ISO: 'ISO', PERSP_1: 'PERSP_1', PERSP_2: 'PERSP_2' };
        const TOOLS = { SELECT: 'select', LINE: 'line', RECT: 'rect', CIRCLE: 'circle', ARC: 'arc', DIM: 'dimension', ERASER: 'eraser', TEXT: 'text', POLYGON: 'polygon', BLOCK_WALL: 'block_wall', SYMBOL: 'symbol', REG_POLY: 'reg_poly', CUBE: 'cube', LEADER: 'leader', MLINE: 'mline', FILLET: 'fillet', CHAMFER: 'chamfer' };

        // 外構シンボル定義
        const GAIKO_SYMBOLS = {
            // 構造物

            monchuu_L:  { label: '門柱（大）',     category: '構造物', w: 600,  h: 600  },

            door_single:{ label: '片開き扉',       category: '構造物', w: 900,  h: 100  },

            carport_2:  { label: 'カーポート2台',  category: '構造物', w: 5500, h: 5000 },
            garage:     { label: 'ガレージ',       category: '構造物', w: 3000, h: 5500 },
            shed:       { label: '物置',           category: '構造物', w: 1500, h: 900  },
            wheel_stop: { label: '車止め',         category: '構造物', w: 600,  h: 150  },
            trash_area: { label: 'ゴミ置き場',     category: '構造物', w: 1200, h: 900  },
            retaining_wall: { label: '擁壁・土留め', category: '構造物', w: 1000, h: 250 },
            // 乗り物

            kei:        { label: '軽自動車',        category: '乗り物', w: 1480, h: 3400 },

            // 植栽

            tree_M:     { label: '中木（中）',      category: '植栽', r: 750  },
            tree_L:     { label: '高木（大）',      category: '植栽', r: 1500 },
            tree_conifer: { label: '針葉樹',        category: '植栽', r: 900, isConifer: true },
            hedge:      { label: '生垣',            category: '植栽', w: 500,  h: 2000 },
            // 設備
            post:       { label: '郵便ポスト',      category: '設備', w: 300,  h: 400  },
            ac:         { label: 'エアコン室外機',  category: '設備', w: 900,  h: 300  },
            tap:        { label: '立水栓',          category: '設備', w: 200,  h: 200  },
            hose_bib:   { label: '散水栓',          category: '設備', r: 150, iconChar: '散' },
            clothesline:{ label: '物干し',          category: '設備', w: 150,  h: 1800 },
            nameplate:  { label: '表札・インターホン', category: '設備', w: 150, h: 300 },
            light_post: { label: 'ポールライト',    category: '設備', r: 200  , isLight: true },
            light_wall: { label: '壁付ライト',      category: '設備', w: 200,  h: 150  , isLight: true },
            // 敷地・外構記号（国交省「建築工事設計図書作成基準」別表1・別表2 準拠）
            kita:       { label: '方位記号',        category: '敷地記号', r: 450, isCompass: true },
            kyoukai:    { label: '敷地境界標',      category: '敷地記号', w: 180, h: 180 },
            bm:         { label: 'ベンチマーク(BM)', category: '敷地記号', w: 350, h: 350 },
            engishi:    { label: '縁石',            category: '敷地記号', w: 600, h: 150 },
            masu_u:     { label: '排水桝（雨水）',   category: '敷地記号', w: 400, h: 400 },
            masu_o:     { label: '排水桝（汚水）',   category: '敷地記号', w: 400, h: 400 },
            suiryoki:   { label: '量水器',          category: '敷地記号', r: 220, iconChar: '水' },
            gas_meter:  { label: 'ガスメーター',    category: '敷地記号', w: 400, h: 280 },
            hydrant:    { label: '屋外消火栓',      category: '敷地記号', r: 250, iconChar: '消' },
            boring:     { label: 'ボーリング位置',  category: '敷地記号', r: 150, iconChar: 'B' },
            level_mark: { label: 'レベル表示(GL/FL/BM)', category: '敷地記号', w: 300, h: 300, isLevelMark: true },
            slope_arrow:{ label: '水勾配矢印',      category: '敷地記号', w: 900, h: 200 },
            fence_mesh: { label: 'フェンス（メッシュ）', category: '構造物', w: 900, h: 150 },
            fence_board:{ label: 'フェンス（目隠し）',   category: '構造物', w: 900, h: 150 },
        };

        // 外構材料パターン定義
        // 線種定義（実線・破線・点線・一点鎖線・二点鎖線）単位はmm
        const LINE_STYLES = {
            solid:        { label: '実線',   dash: [] },
            dashed:       { label: '破線',   dash: [3, 1.5] },
            dotted:       { label: '点線',   dash: [0.4, 1] },
            dash_dot:     { label: '一点鎖線', dash: [4, 1, 0.5, 1] },
            dash_dot_dot: { label: '二点鎖線', dash: [4, 1, 0.5, 1, 0.5, 1] },
        };

        const MATERIALS = {
            // 基本
            none:          { label: 'なし',               color: null,      pattern: null,        category: '基本' },
            concrete:      { label: 'コンクリート',       color: '#e8e8e8', pattern: 'concrete',  category: '基本' },
            concrete_wash: { label: '洗い出し',           color: '#ddd8c8', pattern: 'wash',      category: '基本' },
            asphalt:       { label: 'アスファルト',       color: '#888888', pattern: 'asphalt',   category: '基本' },
            // 石・タイル系
            tile:          { label: 'タイル（300角）',    color: '#f0f0f0', pattern: 'tile',      category: '石・タイル' },
            tile_600:      { label: 'タイル（600角）',    color: '#eeeeee', pattern: 'tile600',   category: '石・タイル' },
            brick:         { label: 'レンガ',             color: '#c0694a', pattern: 'brick',     category: '石・タイル' },
            interlock:     { label: 'インターロッキング', color: '#d0c8b8', pattern: 'interlock', category: '石・タイル' },
            hirakita:      { label: '平板（300×600）',   color: '#d8d8d0', pattern: 'hirakita',  category: '石・タイル' },
            stepping:      { label: '飛び石',             color: '#c8c0b0', pattern: 'stepping',  category: '石・タイル' },
            natural_stone: { label: '乱形石',             color: '#c8c0a8', pattern: 'nstone',    category: '石・タイル' },
            // 自然
            gravel:        { label: '砂利',               color: '#d4c9a0', pattern: 'gravel',    category: '自然' },
            crushed_stone: { label: '割り石・砕石',       color: '#c8c4b8', pattern: 'crushed', category: '自然' },
            sand:          { label: '砂',                 color: '#f0e6c0', pattern: 'sand',      category: '自然' },
            soil:          { label: '地盤（土）',         color: '#c4a882', pattern: 'soil',      category: '自然' },
            grass:         { label: '芝（洋芝）',         color: '#72b050', pattern: 'grass',     category: '自然' },
            grass_j:       { label: '芝（高麗芝）',       color: '#5a9038', pattern: 'grass_j',   category: '自然' },
            // 木材
            wood:          { label: 'ウッドデッキ',       color: '#c89060', pattern: 'wood',      category: '木材' },
            wood_chip:     { label: 'ウッドチップ',       color: '#b87840', pattern: 'woodchip',  category: '木材' },
        };

        // ブロック積み設定
        // 法線ベクトルは描画方向の左側を正とする
        // 内積み: 境界線の内側（敷地側）にブロックが入る → 正方向(+1)
        // 外積み: 境界線の外側（道路側）にブロックが入る → 負方向(-1)
        const BLOCK_POSITIONS = {
            inner:  { label: '内積み', offset:  1 },
            center: { label: '芯積み', offset:  0 },
            outer:  { label: '外積み', offset: -1 },
        };
        const BLOCK_THICKNESSES = [
            { val: 100, label: '100mm (10cm)' },
            { val: 120, label: '120mm (12cm)' },
            { val: 150, label: '150mm (15cm)' },
            { val: 190, label: '190mm (19cm)' },
        ];

        // フェンス種別
        const FENCE_TYPES = {
            none:       { label: 'なし' },
            mesh:       { label: 'メッシュフェンス',   drawFn: 'mesh'   },
            horizontal: { label: 'アルミ横格子',        drawFn: 'horiz'  },
            vertical:   { label: 'アルミ縦格子',        drawFn: 'vert'   },
            wood:       { label: 'ウッドフェンス',      drawFn: 'wood'   },
            louver:     { label: 'ルーバーフェンス',    drawFn: 'louver' },
        };
        const FENCE_HEIGHTS = [600, 800, 1000, 1200, 1500, 1800, 2000];

        const SCALES = [ { val: 1, label: '1:1' }, { val: 10, label: '1:10' }, { val: 20, label: '1:20' }, { val: 30, label: '1:30' }, { val: 50, label: '1:50' }, { val: 100, label: '1:100' }, { val: 200, label: '1:200' }, { val: 250, label: '1:250' }, { val: 300, label: '1:300' }, { val: 500, label: '1:500' }, { val: 1000, label: '1:1000' } ];
        const LINE_WIDTHS = [ { val: 0.1, label: '0.1mm' }, { val: 0.2, label: '0.2mm' }, { val: 0.3, label: '0.3mm' }, { val: 0.5, label: '0.5mm' }, { val: 0.7, label: '0.7mm' }, { val: 1.0, label: '1.0mm' }, { val: 2.0, label: '2.0mm' } ];

        const Geo = {
            dist: (p1, p2) => Math.sqrt((p1.x - p2.x) ** 2 + (p1.y - p2.y) ** 2),
            mid: (p1, p2) => ({ x: (p1.x + p2.x) / 2, y: (p1.y + p2.y) / 2 }),
            snapToGrid: (val, step) => Math.round(val / step) * step,
            projectPoint: (x, y, matrix) => ({ x: (x * matrix.scale) + matrix.offsetX, y: (y * matrix.scale) + matrix.offsetY }),
            unprojectPoint: (screenX, screenY, matrix) => ({ x: (screenX - matrix.offsetX) / matrix.scale, y: (screenY - matrix.offsetY) / matrix.scale }),
            distToSegment: (p, a, b) => {
                const l2 = (a.x - b.x) ** 2 + (a.y - b.y) ** 2;
                if (l2 === 0) return Geo.dist(p, a);
                let t = ((p.x - a.x) * (b.x - a.x) + (p.y - a.y) * (b.y - a.y)) / l2;
                t = Math.max(0, Math.min(1, t));
                const proj = { x: a.x + t * (b.x - a.x), y: a.y + t * (b.y - a.y) };
                return Geo.dist(p, proj);
            }
        };

        // 図形1つの外接矩形（ワールド座標mm）を求める。取得できない場合はnull
        const getEntityBBox = (ent) => {
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            const add = (x, y) => { if (isFinite(x) && isFinite(y)) { minX=Math.min(minX,x); maxX=Math.max(maxX,x); minY=Math.min(minY,y); maxY=Math.max(maxY,y); } };
            try {
                if (ent.p1) add(ent.p1.x, ent.p1.y);
                if (ent.p2) add(ent.p2.x, ent.p2.y);
                if (ent.type === TOOLS.RECT && ent.p1) add(ent.p1.x+ent.w, ent.p1.y+ent.h);
                if (ent.c && ent.r != null) { add(ent.c.x-ent.r, ent.c.y-ent.r); add(ent.c.x+ent.r, ent.c.y+ent.r); }
                if (ent.pts) ent.pts.forEach(p => add(p.x, p.y));
            } catch (e) {}
            if (!isFinite(minX)) return null;
            return { minX, minY, maxX, maxY, cx: (minX+maxX)/2, cy: (minY+maxY)/2 };
        };

        // --- Survey Modal Component ---
        const SurveyTableModal = ({ isOpen, onClose, onImport }) => {
            const [groups, setGroups] = useState([
                { id: 1, name: '測量エリア1', points: [] }
            ]);
            const [activeGroupId, setActiveGroupId] = useState(1);
            const [isSurveyCoords, setIsSurveyCoords] = useState(true); 
            const [closeLoop, setCloseLoop] = useState(true);
            const [drawPoints, setDrawPoints] = useState(true);
            const [autoScale, setAutoScale] = useState(false);
            const [manualScale, setManualScale] = useState(100);  // 指定縮尺（分母）
            const [tab, setTab] = useState('table');
            const [pasteText, setPasteText] = useState('');
            const [parsePreview, setParsePreview] = useState([]);
            const [parseError, setParseError] = useState('');

            // Icon refresh effect
            useEffect(() => {
                if (isOpen && window.lucide) {
                    setTimeout(() => { try { window.lucide.createIcons(); } catch(e) { console.warn('lucide createIcons failed', e); } }, 50);
                }
            }, [isOpen, groups, activeGroupId, tab]);

            // テキスト貼り付けパーサー（堅牢版）
            const parsePasteText = (text) => {
                const lines = text.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0);
                const pts = [];

                for (const line of lines) {
                    // Step1: 特殊文字の正規化
                    const norm = line
                        .replace(/[−–—－]/g, '-')          // 各種マイナス記号 → ハイフン
                        .replace(/[\u00a0\u3000\ufeff]/g, ' '); // 特殊スペース → 半角スペース

                    // Step2: タブ・スペースで分割
                    const rawCols = norm.split(/\t|\s+/).map(c => c.trim()).filter(c => c.length > 0);

                    // Step3: 「523.」+「891」→「523.891」に結合（小数点後スペース由来）
                    const cols = [];
                    for (let i = 0; i < rawCols.length; i++) {
                        if (/\d\.$/.test(rawCols[i]) && i + 1 < rawCols.length && /^\d+$/.test(rawCols[i + 1])) {
                            cols.push(rawCols[i] + rawCols[i + 1]);
                            i++; // 次のトークンをスキップ
                        } else {
                            cols.push(rawCols[i]);
                        }
                    }

                    if (cols.length < 2) continue;

                    // Step4: 各トークンを点名／数値に分類
                    let name = '';
                    const nums = [];
                    for (const col of cols) {
                        if (/^-?\d+(\.\d+)?$/.test(col)) {
                            nums.push(parseFloat(col));
                        } else if (/[A-Za-z\u3040-\u9fff\u4e00-\u9fff]/.test(col) && name === '' && nums.length === 0) {
                            // 最初の文字含みトークン（数値抽出前）= 点名
                            name = col;
                        }
                    }

                    if (nums.length < 2) continue;

                    // Step5: ヘッダー・フッター行をスキップ
                    if (/^(Xn|Yn|NO|測点|点名|合計|倍面積|面積|地積)$/i.test(name)) continue;

                    const ptName = name || ('P' + (pts.length + 1));
                    pts.push({ name: ptName, x: nums[0], y: nums[1] });
                }
                return pts;
            };

            const handlePasteChange = (text) => {
                setPasteText(text);
                const pts = parsePasteText(text);
                setParsePreview(pts);
                if (pts.length === 0 && text.trim().length > 0) {
                    setParseError('座標を認識できませんでした。点名・X座標・Y座標の順に並んでいるか確認してください。');
                } else {
                    setParseError('');
                }
            };

            const applyPaste = () => {
                if (parsePreview.length < 2) { setParseError('2点以上の座標が必要です。'); return; }
                setGroups(groups.map(g => g.id === activeGroupId ? { ...g, points: parsePreview } : g));
                setTab('table');
                setPasteText(''); setParsePreview([]); setParseError('');
            };

            const activeGroup = groups.find(g => g.id === activeGroupId) || { id: -1, name: '', points: [] };
            
            const calculateArea = (pts) => {
                if (!pts || pts.length < 3) return { m2: 0, tsubo: 0 };
                let sum = 0;
                for (let i = 0; i < pts.length; i++) {
                    const c = pts[i], n = pts[(i + 1) % pts.length], p = pts[(i - 1 + pts.length) % pts.length];
                    if(isNaN(c.x) || isNaN(c.y)) continue;
                    sum += c.x * (n.y - p.y);
                }
                const area = Math.abs(sum / 2);
                return { m2: area.toFixed(2), tsubo: (area * 0.3025).toFixed(2) };
            };
            
            const activeAreaInfo = useMemo(() => calculateArea(activeGroup.points), [activeGroup.points]);

            const updatePoint = (idx, field, val) => {
                const newPoints = [...activeGroup.points]; 
                newPoints[idx] = { ...newPoints[idx], [field]: val };
                setGroups(groups.map(g => g.id === activeGroupId ? { ...g, points: newPoints } : g));
            };

            const addPoint = () => {
                const newPoints = [...activeGroup.points, { name: '', x: 0, y: 0 }];
                setGroups(groups.map(g => g.id === activeGroupId ? { ...g, points: newPoints } : g));
            };

            const removePoint = (idx) => {
                const newPoints = activeGroup.points.filter((_, i) => i !== idx);
                setGroups(groups.map(g => g.id === activeGroupId ? { ...g, points: newPoints } : g));
            };

            const formatDim = useCallback((valMM) => {
                if (unit === 'm') {
                    // 測量慣行：mm単位で切り捨てて3桁表示
                    const floored = Math.floor(valMM);
                    return (floored / 1000).toFixed(3) + 'm';
                }
                if (unit === 'mm_nolabel') {
                    return String(Math.floor(valMM));
                }
                return Math.floor(valMM) + 'mm';
            }, [unit]);


            // ── 材料ハッチングパターン描画 ──
            const drawMaterialPattern = (ctx, pts, material, scale, bw) => {
                const mat = MATERIALS[material];
                if (!mat || !mat.pattern) return;
                if (pts.length < 3) return;

                ctx.save();
                ctx.beginPath();
                ctx.moveTo(pts[0].x, pts[0].y);
                for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
                ctx.closePath();
                ctx.clip();

                const xs = pts.map(p => p.x), ys = pts.map(p => p.y);
                const minX = Math.min(...xs), maxX = Math.max(...xs);
                const minY = Math.min(...ys), maxY = Math.max(...ys);

                // パターン間隔（mm）: 縮尺に応じて調整
                const sp = Math.max(1.5, 4 / (scale || 1) * 50);

                ctx.strokeStyle = 'rgba(0,0,0,0.35)';
                ctx.lineWidth = 0.15;
                ctx.setLineDash([]);

                if (mat.pattern === 'concrete') {
                    // コンクリート: 斜め線 45°
                    for (let d = minX + minY - (maxX - minX + maxY - minY); d < maxX + maxY; d += sp) {
                        ctx.beginPath();
                        ctx.moveTo(d - minY, minY); ctx.lineTo(d - maxY, maxY);
                        ctx.stroke();
                    }
                } else if (mat.pattern === 'gravel') {
                    // 砂利: ランダムっぽい楕円
                    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
                    const seed = 42;
                    let rx = minX, ry = minY, si = seed;
                    const rnd = () => { si = (si * 1103515245 + 12345) & 0x7fffffff; return si / 0x7fffffff; };
                    for (let gx = minX; gx < maxX; gx += sp * 1.2) {
                        for (let gy = minY; gy < maxY; gy += sp * 0.9) {
                            const ox = (rnd() - 0.5) * sp * 0.6;
                            const oy = (rnd() - 0.5) * sp * 0.5;
                            const ew = sp * 0.35 * (0.5 + rnd() * 0.5);
                            const eh = sp * 0.2 * (0.5 + rnd() * 0.5);
                            const angle = rnd() * Math.PI;
                            ctx.beginPath();
                            ctx.ellipse(gx + ox, gy + oy, ew, eh, angle, 0, Math.PI * 2);
                            ctx.stroke();
                        }
                    }
                } else if (mat.pattern === 'crushed') {
                    // 割り石・砕石: 斜線のみ（国交省「建築工事設計図書作成基準」別表2 準拠）
                    ctx.strokeStyle = 'rgba(0,0,0,0.6)';
                    ctx.lineWidth = 0.18;
                    for (let d = minX + minY - (maxX - minX + maxY - minY); d < maxX + maxY; d += sp * 0.8) {
                        ctx.beginPath();
                        ctx.moveTo(d - minY, minY); ctx.lineTo(d - maxY, maxY);
                        ctx.stroke();
                    }
                } else if (mat.pattern === 'sand') {
                    // 砂: 細かいドット
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    let si2 = 7;
                    const rnd2 = () => { si2 = (si2 * 1103515245 + 12345) & 0x7fffffff; return si2 / 0x7fffffff; };
                    for (let gx = minX; gx < maxX; gx += sp * 0.6) {
                        for (let gy = minY; gy < maxY; gy += sp * 0.6) {
                            if (rnd2() > 0.4) continue;
                            const ox = (rnd2() - 0.5) * sp * 0.5;
                            const oy = (rnd2() - 0.5) * sp * 0.5;
                            ctx.beginPath();
                            ctx.arc(gx + ox, gy + oy, 0.15, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                } else if (mat.pattern === 'soil') {
                    // 地盤（土）: 斜線＋点
                    for (let d = minX + minY - (maxX - minX + maxY - minY); d < maxX + maxY; d += sp * 1.5) {
                        ctx.beginPath();
                        ctx.moveTo(d - minY, minY); ctx.lineTo(d - maxY, maxY);
                        ctx.stroke();
                    }
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    let si3 = 13;
                    const rnd3 = () => { si3 = (si3 * 1103515245 + 12345) & 0x7fffffff; return si3 / 0x7fffffff; };
                    for (let gx = minX + sp; gx < maxX; gx += sp * 1.5) {
                        for (let gy = minY + sp; gy < maxY; gy += sp * 1.5) {
                            ctx.beginPath(); ctx.arc(gx, gy, 0.3, 0, Math.PI * 2); ctx.fill();
                        }
                    }
                } else if (mat.pattern === 'grass') {
                    // 芝: 短い V字（黒線、製図の一般的な芝記号）
                    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
                    ctx.lineWidth = 0.15;
                    for (let gx = minX + sp/2; gx < maxX; gx += sp) {
                        for (let gy = minY + sp/2; gy < maxY; gy += sp * 0.8) {
                            const h = sp * 0.45;
                            ctx.beginPath();
                            ctx.moveTo(gx - sp*0.25, gy + h*0.5);
                            ctx.lineTo(gx, gy);
                            ctx.lineTo(gx + sp*0.25, gy + h*0.5);
                            ctx.stroke();
                        }
                    }
                } else if (mat.pattern === 'asphalt') {
                    // アスファルト: 細かい斜線2方向
                    for (let d = minX + minY - (maxX - minX + maxY - minY); d < maxX + maxY; d += sp * 0.7) {
                        ctx.beginPath();
                        ctx.moveTo(d - minY, minY); ctx.lineTo(d - maxY, maxY);
                        ctx.stroke();
                    }
                    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
                    for (let d = -(maxX + maxY); d < maxX + maxY; d += sp * 0.7) {
                        ctx.beginPath();
                        ctx.moveTo(-d + minY, minY); ctx.lineTo(-d + maxY, maxY);
                        ctx.stroke();
                    }
                } else if (mat.pattern === 'tile') {
                    // タイル: グリッド
                    const ts = sp * 1.2;
                    for (let gx = Math.floor(minX/ts)*ts; gx <= maxX; gx += ts) {
                        ctx.beginPath(); ctx.moveTo(gx, minY); ctx.lineTo(gx, maxY); ctx.stroke();
                    }
                    for (let gy = Math.floor(minY/ts)*ts; gy <= maxY; gy += ts) {
                        ctx.beginPath(); ctx.moveTo(minX, gy); ctx.lineTo(maxX, gy); ctx.stroke();
                    }
                } else if (mat.pattern === 'wood') {
                    // ウッドデッキ: 横木目線（幅広板）
                    const boardW = sp * 1.5;
                    for (let gy = minY; gy < maxY; gy += boardW) {
                        ctx.beginPath(); ctx.moveTo(minX, gy); ctx.lineTo(maxX, gy); ctx.stroke();
                        // 板内の木目
                        ctx.strokeStyle = 'rgba(0,0,0,0.12)'; ctx.lineWidth = 0.08;
                        ctx.beginPath(); ctx.moveTo(minX, gy + boardW*0.4); ctx.lineTo(maxX, gy + boardW*0.4); ctx.stroke();
                        ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 0.15;
                    }

                } else if (mat.pattern === 'wash') {
                    // 洗い出しコンクリート: 斜線45° + ランダム小石
                    for (let d = minX + minY - (maxX - minX + maxY - minY); d < maxX + maxY; d += sp * 1.2) {
                        ctx.beginPath(); ctx.moveTo(d - minY, minY); ctx.lineTo(d - maxY, maxY); ctx.stroke();
                    }
                    ctx.fillStyle = 'rgba(0,0,0,0.25)';
                    let rws = 31;
                    const rwn = () => { rws = (rws * 1103515245 + 12345) & 0x7fffffff; return rws / 0x7fffffff; };
                    for (let gx = minX; gx < maxX; gx += sp * 0.5) {
                        for (let gy = minY; gy < maxY; gy += sp * 0.5) {
                            if (rwn() > 0.35) continue;
                            const ox = (rwn()-0.5)*sp*0.4, oy = (rwn()-0.5)*sp*0.4;
                            const r3 = 0.15 + rwn()*0.2;
                            ctx.beginPath(); ctx.arc(gx+ox, gy+oy, r3, 0, Math.PI*2); ctx.fill();
                        }
                    }

                } else if (mat.pattern === 'tile600') {
                    // タイル600角: 大判グリッド
                    const ts6 = sp * 2.5;
                    for (let gx = Math.floor(minX/ts6)*ts6; gx <= maxX; gx += ts6) {
                        ctx.beginPath(); ctx.moveTo(gx, minY); ctx.lineTo(gx, maxY); ctx.stroke();
                    }
                    for (let gy = Math.floor(minY/ts6)*ts6; gy <= maxY; gy += ts6) {
                        ctx.beginPath(); ctx.moveTo(minX, gy); ctx.lineTo(maxX, gy); ctx.stroke();
                    }

                } else if (mat.pattern === 'brick') {
                    // レンガ: 横2: 縦1 比率、千鳥配置
                    const bw = sp * 2.0, bh = sp * 0.9;
                    for (let gy = minY; gy < maxY; gy += bh) {
                        const row = Math.round((gy - minY) / bh);
                        const offset = (row % 2) * bw * 0.5;
                        for (let gx = minX - bw + offset; gx < maxX; gx += bw) {
                            ctx.strokeRect(gx, gy, bw - 0.3, bh - 0.3);
                        }
                    }

                } else if (mat.pattern === 'interlock') {
                    // インターロッキング: 煉瓦状の小ブロック（ランニングボンド）
                    const ilw = sp * 1.2, ilh = sp * 0.6;
                    for (let gy = minY; gy < maxY; gy += ilh) {
                        const row = Math.round((gy - minY) / ilh);
                        const offset = (row % 2) * ilw * 0.5;
                        for (let gx = minX - ilw + offset; gx < maxX; gx += ilw) {
                            if (bw) {
                                ctx.strokeRect(gx, gy, ilw, ilh);
                            } else {
                                ctx.fillStyle = row % 3 === 0 ? 'rgba(180,160,130,0.3)'
                                              : row % 3 === 1 ? 'rgba(160,150,120,0.3)'
                                              : 'rgba(170,155,125,0.3)';
                                ctx.fillRect(gx+0.1, gy+0.1, ilw-0.2, ilh-0.2);
                                ctx.strokeRect(gx, gy, ilw, ilh);
                            }
                        }
                    }

                } else if (mat.pattern === 'hirakita') {
                    // 平板300×600: 長手方向を交互
                    const pw = sp * 2.0, ph = sp * 1.0;
                    for (let gy = minY; gy < maxY; gy += ph * 2) {
                        for (let gx = minX; gx < maxX; gx += pw) { ctx.strokeRect(gx, gy, pw, ph); }
                        for (let gx = minX + pw*0.5; gx < maxX; gx += pw) { ctx.strokeRect(gx, gy+ph, pw, ph); }
                    }

                } else if (mat.pattern === 'stepping') {
                    // 飛び石: ランダム配置の楕円
                    let rss = 17;
                    const rsn = () => { rss = (rss * 1103515245 + 12345) & 0x7fffffff; return rss / 0x7fffffff; };
                    for (let gx = minX + sp*0.8; gx < maxX - sp*0.5; gx += sp * 2.2) {
                        for (let gy = minY + sp*0.8; gy < maxY - sp*0.5; gy += sp * 2.5) {
                            const ox = (rsn()-0.5)*sp*0.5, oy = (rsn()-0.5)*sp*0.5;
                            const rw = sp*(0.5+rsn()*0.3), rh = sp*(0.4+rsn()*0.25);
                            const ang = rsn()*Math.PI;
                            if (!bw) { ctx.fillStyle = 'rgba(180,170,150,0.4)'; }
                            ctx.beginPath(); ctx.ellipse(gx+ox, gy+oy, rw, rh, ang, 0, Math.PI*2);
                            if (!bw) ctx.fill();
                            ctx.stroke();
                        }
                    }

                } else if (mat.pattern === 'nstone') {
                    // 乱形石: ランダムな多角形パッチワーク
                    let rns = 23;
                    const rnn = () => { rns = (rns * 1103515245 + 12345) & 0x7fffffff; return rns / 0x7fffffff; };
                    const stoneSize = sp * 1.5;
                    for (let gx = minX; gx < maxX; gx += stoneSize) {
                        for (let gy = minY; gy < maxY; gy += stoneSize) {
                            const sides = 5 + Math.floor(rnn() * 3);
                            ctx.beginPath();
                            for (let i = 0; i < sides; i++) {
                                const a = (i / sides) * Math.PI * 2 + rnn()*0.4;
                                const r4 = stoneSize * (0.3 + rnn() * 0.25);
                                const px = gx + stoneSize*0.5 + Math.cos(a)*r4;
                                const py = gy + stoneSize*0.5 + Math.sin(a)*r4;
                                i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
                            }
                            ctx.closePath();
                            if (!bw) ctx.fillStyle = 'rgba(180,170,145,0.2)';
                            if (!bw) ctx.fill();
                            ctx.stroke();
                        }
                    }

                } else if (mat.pattern === 'grass_j') {
                    // 高麗芝: 短い斜め線（密な横縞）
                    for (let gy = minY; gy < maxY; gy += sp * 0.5) {
                        for (let gx = minX; gx < maxX; gx += sp * 0.6) {
                            ctx.strokeStyle = bw ? 'rgba(0,0,0,0.5)' : 'rgba(60,140,40,0.5)';
                            const jitter = (Math.sin(gx * 7.3 + gy * 3.1) * 0.5) * sp * 0.15;
                            ctx.beginPath(); ctx.moveTo(gx + jitter, gy);
                            ctx.lineTo(gx + sp*0.12 + jitter, gy - sp*0.3); ctx.stroke();
                        }
                    }
                    ctx.strokeStyle = 'rgba(0,0,0,0.25)';

                } else if (mat.pattern === 'woodchip') {
                    // ウッドチップ: 短い線を乱雑に
                    let rwc = 41;
                    const rwcn = () => { rwc = (rwc * 1103515245 + 12345) & 0x7fffffff; return rwc / 0x7fffffff; };
                    ctx.lineWidth = 0.2;
                    for (let gx = minX; gx < maxX; gx += sp * 0.5) {
                        for (let gy = minY; gy < maxY; gy += sp * 0.5) {
                            if (rwcn() > 0.5) continue;
                            const ox = (rwcn()-0.5)*sp*0.45, oy = (rwcn()-0.5)*sp*0.45;
                            const ang = rwcn() * Math.PI;
                            const cl = sp * (0.15 + rwcn()*0.2);
                            ctx.strokeStyle = bw ? 'rgba(0,0,0,0.5)' : `rgba(${100+Math.floor(rwcn()*60)},${60+Math.floor(rwcn()*40)},20,0.6)`;
                            ctx.beginPath();
                            ctx.moveTo(gx+ox-Math.cos(ang)*cl, gy+oy-Math.sin(ang)*cl);
                            ctx.lineTo(gx+ox+Math.cos(ang)*cl, gy+oy+Math.sin(ang)*cl);
                            ctx.stroke();
                        }
                    }
                    ctx.strokeStyle = 'rgba(0,0,0,0.25)';
                }

                ctx.restore();
            };

            // ブロック壁のオフセットを「中心方向」基準で計算するヘルパー
            // nx,ny: 進行方向の左法線  position: 'inner'|'center'|'outer'
            // innerDir: 1=法線正方向が内側, -1=法線負方向が内側
            const blockOffsets = (nx, ny, thickPaper, position, p1, p2) => {
                // 線分の中点から用紙中心への方向を「内」とする
                const pp = PAPERS[paper];
                const cx = pp.width / 2, cy = pp.height / 2;
                const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
                // 中心方向ドット積：正なら法線正方向が内側
                const toCenterX = cx - mx, toCenterY = cy - my;
                const dot = nx * toCenterX + ny * toCenterY;
                // innerSign: 法線のどちら向きが「内」か
                const innerSign = dot >= 0 ? 1 : -1;

                // inner: 内側へ全厚, outer: 外側へ全厚, center: 中央
                const factor = position === 'inner' ? innerSign
                             : position === 'outer' ? -innerSign
                             : 0;
                const halfT = thickPaper / 2;
                const offA = factor === 0 ? -halfT : (factor > 0 ? 0       : -thickPaper);
                const offB = factor === 0 ?  halfT : (factor > 0 ? thickPaper : 0);
                return { offA, offB };
            };

            // ── ブロック壁エンティティ生成 ──
            const createBlockWallEntities = useCallback((p1, p2, thickness_mm, position, color, lineWidth, fenceType, fenceHeight_mm) => {
                const dx = p2.x - p1.x, dy = p2.y - p1.y;
                const len = Math.sqrt(dx*dx + dy*dy);
                if (len < 0.1) return [];
                const nx = -dy / len, ny = dx / len;
                const thickPaper = thickness_mm / drawingScale;
                const { offA, offB } = blockOffsets(nx, ny, thickPaper, position, p1, p2);

                const ents = [];
                const addLine = (a, b, extra = {}) => ents.push({
                    id: Date.now() + Math.random() * 9999,
                    type: TOOLS.LINE, p1: {...a}, p2: {...b},
                    color, lineWidth, layer: 'drawing', ...extra
                });

                // ブロック2本線
                const lineA_p1 = { x: p1.x + nx*offA, y: p1.y + ny*offA };
                const lineA_p2 = { x: p2.x + nx*offA, y: p2.y + ny*offA };
                const lineB_p1 = { x: p1.x + nx*offB, y: p1.y + ny*offB };
                const lineB_p2 = { x: p2.x + nx*offB, y: p2.y + ny*offB };

                addLine(lineA_p1, lineA_p2);
                addLine(lineB_p1, lineB_p2);
                // 端部閉鎖線
                addLine(lineA_p1, lineB_p1);
                addLine(lineA_p2, lineB_p2);

                // ブロック目地（400mm毎 = 1ブロック単位）
                const BLOCK_UNIT = 400 / drawingScale;
                const numJoints = Math.floor(len / BLOCK_UNIT) - 1;
                for (let i = 1; i <= numJoints; i++) {
                    const t = (i * BLOCK_UNIT) / len;
                    const mx2 = p1.x + t * dx, my2 = p1.y + t * dy;
                    addLine({ x: mx2 + nx*offA, y: my2 + ny*offA }, { x: mx2 + nx*offB, y: my2 + ny*offB });
                }

                // ── 引き出し線（JIS Z 8312 準拠）──
                // 構造: 矢印(壁面) → 斜め線 → 折れ点 → 水平参照線 → テキスト(参照線上)
                const pp2 = PAPERS[paper];
                const midX2 = (p1.x + p2.x) / 2, midY2 = (p1.y + p2.y) / 2;
                const wallDirX = dx / len, wallDirY = dy / len;

                // 外側判定（用紙中心から遠い方向）
                const toCx = pp2.width/2 - midX2, toCy = pp2.height/2 - midY2;
                const leaderSign = (nx*toCx + ny*toCy) >= 0 ? -1 : 1;

                // 矢印先端：ブロック外縁の中央
                const outerOff = leaderSign > 0 ? offB : offA;
                const arrowX = midX2 + nx * outerOff;
                const arrowY = midY2 + ny * outerOff;

                // 折れ点：矢印から「常に上方向 + 用紙内向き水平成分」で15mm
                // Y軸は下向きなので -Y = 上
                const upY = -1;  // 常に上方向
                // 水平成分：参照線を伸ばす方向（右or左）で決める
                // 用紙右半分にいる → 左向き、左半分 → 右向き
                const refDir = (arrowX > pp2.width / 2) ? -1 : 1;
                // 折れ点を矢印から斜め上方向へ
                const kDX = refDir * 0.707;
                const kDY = -0.707;   // 常に上
                const kneeX = arrowX + kDX * 15;
                const kneeY = arrowY + kDY * 15;

                // 水平参照線（折れ点から水平に22mm）
                const refLen = 22;
                const refEndX = kneeX + refDir * refLen;
                const refEndY = kneeY;   // 水平なのでYは同じ

                // ラベル
                let labelText = `CB${thickness_mm}`;
                if (fenceType && fenceType !== 'none' && fenceHeight_mm > 0) {
                    labelText += `+${FENCE_TYPES[fenceType]?.label || 'F'} H=${fenceHeight_mm}`;
                }
                const labelColor = '#222244';
                const thinLW = Math.max(0.1, lineWidth * 0.5);

                // ① 矢印（30°開き、先端から折れ点方向）
                const arrSize = 1.8;
                const arrAngle = Math.PI / 6;
                const pX2 = -kDY, pY2 = kDX;   // 斜め線の法線
                const spread = arrSize * Math.tan(arrAngle);
                const arrBX = arrowX + kDX * arrSize, arrBY = arrowY + kDY * arrSize;
                addLine({ x: arrowX, y: arrowY },
                        { x: arrBX + pX2*spread, y: arrBY + pY2*spread },
                        { color: labelColor, lineWidth: thinLW, isDim: true });
                addLine({ x: arrowX, y: arrowY },
                        { x: arrBX - pX2*spread, y: arrBY - pY2*spread },
                        { color: labelColor, lineWidth: thinLW, isDim: true });

                // ② 斜め引き出し線（矢印 → 折れ点）
                addLine({ x: arrowX, y: arrowY }, { x: kneeX, y: kneeY },
                        { color: labelColor, lineWidth: thinLW, isDim: true });

                // ③ 水平参照線（折れ点 → 参照線端）
                addLine({ x: kneeX, y: kneeY }, { x: refEndX, y: refEndY },
                        { color: labelColor, lineWidth: thinLW, isDim: true });

                // ④ テキスト（参照線の真上 1.8mm・中央揃え）
                ents.push({
                    id: Date.now() + Math.random() * 9999,
                    type: 'text_label',
                    p1: { x: (kneeX + refEndX) / 2, y: kneeY - 1.8 },
                    text: labelText,
                    color: labelColor, layer: 'annotation', isDim: true,
                    fontSize: 2.5, align: 'center'
                });

                // ── フェンス描画 ──
                if (fenceType && fenceType !== 'none' && fenceHeight_mm > 0) {
                    ents.push({
                        id: Date.now() + Math.random() * 9999,
                        type: 'fence_fill',
                        pts: [lineA_p1, lineA_p2, lineB_p2, lineB_p1],
                        fenceType, fenceHeight: fenceHeight_mm,
                        color: strokeColor, lineWidth, layer: 'drawing'
                    });
                }
                return ents;
            }, [drawingScale, paper]);

            // ── シンボル描画ヘルパー（図面風）──
            const drawGaikoSymbol = (ctx, ent, scale) => {
                const { symbolType, p1, rotation = 0 } = ent;
                const sym = GAIKO_SYMBOLS[symbolType];
                if (!sym) return;
                const s = scale;
                ctx.save();
                ctx.translate(p1.x, p1.y);
                ctx.rotate(rotation);
                const lw = ent.lineWidth || 0.25;
                const symScale = ent.scale || 1;

                if (sym.r) {
                    const r = (sym.r * symScale) / s;
                    if (sym.isCompass) {
                        // 方位記号: 円 + 北を指す矢印 + N
                        ctx.strokeStyle = '#000'; ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = lw * 1.2;
                        ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(0, -r * 0.85); ctx.lineTo(r * 0.22, r * 0.35); ctx.lineTo(0, r * 0.15); ctx.lineTo(-r * 0.22, r * 0.35);
                        ctx.closePath(); ctx.fillStyle = '#000'; ctx.fill();
                        ctx.rotate(-rotation);
                        ctx.fillStyle = '#000'; ctx.font = `bold ${r * 0.55}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                        ctx.fillText('N', 0, -r * 0.15);
                        ctx.restore(); return;
                    } else if (sym.iconChar) {
                        // 汎用丸アイコン（量水器・屋外消火栓・ボーリング位置など）
                        const ic = ent.color || '#333';
                        ctx.strokeStyle = ic; ctx.fillStyle = 'rgba(255,255,255,0.85)'; ctx.lineWidth = lw * 1.2;
                        ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                        ctx.rotate(-rotation);
                        ctx.fillStyle = ic; ctx.font = `bold ${r * 0.9}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                        ctx.fillText(sym.iconChar, 0, 0);
                        ctx.fillStyle = '#333'; ctx.font = `1.8px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
                        ctx.fillText(sym.label, 0, r + 0.8);
                        ctx.restore(); return;
                    }
                    // 植栽・ライト（円形）
                    if (sym.isLight) {
                        ctx.strokeStyle = '#cc8800'; ctx.lineWidth = lw * 1.2;
                        ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.stroke();
                        ctx.beginPath(); ctx.arc(0,0,r*0.4,0,Math.PI*2); ctx.stroke();
                        ctx.lineWidth = lw * 0.6;
                        for (let i=0;i<8;i++){const a=i*Math.PI/4;ctx.beginPath();ctx.moveTo(Math.cos(a)*r*0.5,Math.sin(a)*r*0.5);ctx.lineTo(Math.cos(a)*r*0.9,Math.sin(a)*r*0.9);ctx.stroke();}
                    } else if (sym.isConifer) {
                        // 針葉樹: 円＋放射状のギザギザ（星形）で常緑針葉樹を表現
                        ctx.strokeStyle='#00441b'; ctx.fillStyle='rgba(0,80,30,0.15)'; ctx.lineWidth=lw;
                        ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill(); ctx.stroke();
                        ctx.strokeStyle='#00441b'; ctx.lineWidth=lw*0.8;
                        const spikes = 10;
                        ctx.beginPath();
                        for (let i=0;i<spikes*2;i++){
                            const a = (i/(spikes*2))*Math.PI*2;
                            const rr = i%2===0 ? r*0.95 : r*0.55;
                            const px = Math.cos(a)*rr, py = Math.sin(a)*rr;
                            if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
                        }
                        ctx.closePath(); ctx.stroke();
                    } else {
                        ctx.strokeStyle='#006600'; ctx.fillStyle='rgba(0,120,0,0.12)'; ctx.lineWidth=lw;
                        ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill(); ctx.stroke();
                        ctx.strokeStyle='#004400'; ctx.lineWidth=lw*0.7;
                        for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2;const cx3=Math.cos(a)*r*0.62,cy3=Math.sin(a)*r*0.62;ctx.beginPath();ctx.arc(cx3,cy3,r*0.35,0,Math.PI*2);ctx.stroke();}
                        ctx.fillStyle='#5a3a1a';ctx.beginPath();ctx.arc(0,0,r*0.1,0,Math.PI*2);ctx.fill();
                    }
                    ctx.rotate(-rotation);
                    ctx.fillStyle=sym.isLight?'#cc8800':'#006600'; ctx.font=`${1.8}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='top';
                    ctx.fillText(sym.label,0,r+0.8);
                    ctx.restore(); return;
                }

                const w=(sym.w*symScale)/s, h=(sym.h*symScale)/s, hw=w/2, hh=h/2;
                ctx.lineWidth=lw;

                if (symbolType==='monchuu'||symbolType==='monchuu_L') {
                    ctx.fillStyle='rgba(80,80,80,0.7)'; ctx.strokeStyle='#222'; ctx.lineWidth=lw*1.5;
                    ctx.fillRect(-hw,-hh,w,h); ctx.strokeRect(-hw,-hh,w,h);

                } else if (symbolType==='mon_sliding') {
                    ctx.strokeStyle='#333'; ctx.strokeRect(-hw,-hh,w,h);
                    const aw=hw*0.75; ctx.lineWidth=lw*0.8;
                    ctx.beginPath(); ctx.moveTo(-hw+2/s,0); ctx.lineTo(-hw+aw,0); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(-hw+aw-2/s,-1.5/s); ctx.lineTo(-hw+aw,0); ctx.lineTo(-hw+aw-2/s,1.5/s); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(hw-2/s,0); ctx.lineTo(hw-aw,0); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(hw-aw+2/s,-1.5/s); ctx.lineTo(hw-aw,0); ctx.lineTo(hw-aw+2/s,1.5/s); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(0,-hh); ctx.lineTo(0,hh); ctx.stroke();

                } else if (symbolType==='mon_swing') {
                    ctx.strokeStyle='#333'; ctx.lineWidth=lw*1.2;
                    ctx.beginPath(); ctx.moveTo(-hw,-hh); ctx.lineTo(hw,-hh); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(-hw,-hh); ctx.lineTo(-hw,hh); ctx.stroke();
                    ctx.lineWidth=lw*0.6; ctx.setLineDash([1/s,1/s]);
                    ctx.beginPath(); ctx.arc(-hw,-hh,w,0,Math.PI/2); ctx.stroke();
                    ctx.setLineDash([]); ctx.lineWidth=lw*1.2;
                    ctx.beginPath(); ctx.moveTo(-hw,-hh); ctx.lineTo(-hw,-hh+w); ctx.stroke();

                } else if (symbolType==='door_single') {
                    ctx.strokeStyle='#333'; ctx.lineWidth=lw*1.2;
                    ctx.beginPath(); ctx.moveTo(-hw,0); ctx.lineTo(hw,0); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(hw,0); ctx.lineTo(hw,w); ctx.stroke();
                    ctx.lineWidth=lw*0.5; ctx.setLineDash([1/s,1/s]);
                    ctx.beginPath(); ctx.arc(hw,0,w,Math.PI/2,Math.PI); ctx.stroke();
                    ctx.setLineDash([]);

                } else if (symbolType==='door_double') {
                    ctx.strokeStyle='#333'; ctx.lineWidth=lw*1.2;
                    ctx.beginPath(); ctx.moveTo(-hw,0); ctx.lineTo(hw,0); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(-hw,0); ctx.lineTo(-hw,hw); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(hw,0); ctx.lineTo(hw,hw); ctx.stroke();
                    ctx.lineWidth=lw*0.5; ctx.setLineDash([1/s,1/s]);
                    ctx.beginPath(); ctx.arc(-hw,0,hw,-Math.PI/2,0); ctx.stroke();
                    ctx.beginPath(); ctx.arc(hw,0,hw,-Math.PI/2,-Math.PI,true); ctx.stroke();
                    ctx.setLineDash([]);

                } else if (symbolType.startsWith('carport')) {
                    // カーポート：外形（破線）+ 柱のみ、斜線なし
                    ctx.strokeStyle='#333'; ctx.lineWidth=lw*0.7;
                    ctx.setLineDash([2/s,1/s]);
                    ctx.strokeRect(-hw,-hh,w,h);
                    ctx.setLineDash([]);
                    const colS=Math.min(150/s,hw*0.12);
                    ctx.fillStyle='#444'; ctx.lineWidth=lw*0.5;
                    [[-hw,-hh],[hw-colS,-hh],[-hw,hh-colS],[hw-colS,hh-colS]].forEach(([cx2,cy2])=>{ctx.fillRect(cx2,cy2,colS,colS);ctx.strokeRect(cx2,cy2,colS,colS);});
                    if (symbolType==='carport_2') {
                        ctx.fillRect(-colS/2,-hh,colS,colS); ctx.fillRect(-colS/2,hh-colS,colS,colS);
                    }

                } else if (symbolType==='garage') {
                    ctx.strokeStyle='#333'; ctx.lineWidth=lw;
                    ctx.strokeRect(-hw,-hh,w,h);
                    ctx.fillStyle='rgba(180,180,180,0.1)'; ctx.fillRect(-hw,-hh,w,h);
                    ctx.lineWidth=lw*2.5; ctx.strokeStyle='#555';
                    ctx.beginPath(); ctx.moveTo(-hw,-hh); ctx.lineTo(hw,-hh); ctx.stroke();
                    ctx.lineWidth=lw*0.5; ctx.strokeStyle='#888';
                    for(let i=1;i<=4;i++){const yy=-hh+h*0.25*i*0.5;ctx.beginPath();ctx.moveTo(-hw,yy);ctx.lineTo(hw,yy);ctx.stroke();}

                } else if (symbolType==='car'||symbolType==='kei') {
                    const cr2=Math.min(200/s,hw*0.2);
                    ctx.beginPath(); ctx.roundRect(-hw,-hh,w,h,cr2);
                    ctx.fillStyle='rgba(220,230,250,0.25)'; ctx.fill();
                    ctx.strokeStyle='#333'; ctx.lineWidth=lw; ctx.stroke();
                    ctx.lineWidth=lw*1.8; ctx.strokeStyle='#555';
                    ctx.beginPath(); ctx.moveTo(-hw,-hh+h*0.08); ctx.lineTo(hw,-hh+h*0.08); ctx.stroke();
                    const wr2=200/s,wxOff=hw-wr2*0.6,wyOff=hh-wr2*1.2;
                    ctx.lineWidth=lw*1.5; ctx.strokeStyle='#222';
                    [[-wxOff,-wyOff],[wxOff,-wyOff],[-wxOff,wyOff],[wxOff,wyOff]].forEach(([cx2,cy2])=>{ctx.beginPath();ctx.arc(cx2,cy2,wr2,0,Math.PI*2);ctx.stroke();});

                } else if (symbolType==='bicycle') {
                    const wr3=hh*0.35; ctx.strokeStyle='#333'; ctx.lineWidth=lw;
                    ctx.beginPath(); ctx.arc(0,-hh+wr3,wr3,0,Math.PI*2); ctx.stroke();
                    ctx.beginPath(); ctx.arc(0,hh-wr3,wr3,0,Math.PI*2); ctx.stroke();
                    ctx.lineWidth=lw*1.2;
                    ctx.beginPath(); ctx.moveTo(-hw*0.6,-hh+wr3); ctx.lineTo(hw*0.6,-hh+wr3); ctx.stroke();
                    ctx.lineWidth=lw;
                    ctx.beginPath(); ctx.moveTo(0,-hh+wr3*2); ctx.lineTo(0,hh-wr3*2); ctx.moveTo(-hw*0.3,0); ctx.lineTo(hw*0.3,0); ctx.stroke();
                    ctx.lineWidth=lw*1.5;
                    ctx.beginPath(); ctx.moveTo(-hw*0.4,0); ctx.lineTo(hw*0.4,0); ctx.stroke();

                } else if (symbolType==='hedge') {
                    ctx.fillStyle='rgba(0,120,0,0.1)'; ctx.fillRect(-hw,-hh,w,h);
                    ctx.strokeStyle='#006600'; ctx.lineWidth=lw;
                    const bumpN=Math.max(4,Math.round(h/(150/s)));
                    ctx.beginPath(); ctx.moveTo(-hw,-hh);
                    for(let i=0;i<=bumpN;i++){const t=i/bumpN,yy=-hh+t*h;ctx.lineTo(-hw-(i%2===0?60/s:0),yy);}
                    ctx.lineTo(-hw,hh);ctx.lineTo(hw,hh);
                    for(let i=bumpN;i>=0;i--){const t=i/bumpN,yy=-hh+t*h;ctx.lineTo(hw+(i%2===0?60/s:0),yy);}
                    ctx.closePath(); ctx.stroke();

                } else if (symbolType==='post') {
                    ctx.strokeStyle='#aa2200'; ctx.lineWidth=lw;
                    ctx.fillStyle='rgba(200,50,50,0.2)'; ctx.fillRect(-hw,-hh,w,h); ctx.strokeRect(-hw,-hh,w,h);
                    ctx.fillStyle='#aa2200'; ctx.font=`bold ${h*0.55}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('〒',0,0);

                } else if (symbolType==='ac') {
                    ctx.strokeStyle='#555'; ctx.lineWidth=lw;
                    ctx.fillStyle='rgba(180,180,180,0.2)'; ctx.fillRect(-hw,-hh,w,h); ctx.strokeRect(-hw,-hh,w,h);
                    const fr=Math.min(hh*0.7,hw*0.5);
                    ctx.beginPath(); ctx.arc(-hw+hw*0.5,0,fr,0,Math.PI*2); ctx.stroke();
                    ctx.fillStyle='#888'; ctx.fillRect(hw*0.4,-hh*0.7,hw*0.5,hh*1.4);

                } else if (symbolType==='tap') {
                    ctx.strokeStyle='#0066aa'; ctx.lineWidth=lw*1.2;
                    ctx.beginPath(); ctx.arc(0,0,hw,0,Math.PI*2);
                    ctx.fillStyle='rgba(0,100,200,0.15)'; ctx.fill(); ctx.stroke();
                    ctx.lineWidth=lw*0.8;
                    ctx.beginPath(); ctx.moveTo(0,-hh); ctx.lineTo(0,hh); ctx.moveTo(-hw,0); ctx.lineTo(hw,0); ctx.stroke();

                } else if (symbolType==='light_wall') {
                    ctx.strokeStyle='#cc8800'; ctx.lineWidth=lw;
                    ctx.fillStyle='rgba(255,200,0,0.2)'; ctx.fillRect(-hw,-hh,w,h); ctx.strokeRect(-hw,-hh,w,h);
                    ctx.lineWidth=lw*0.5; ctx.strokeStyle='rgba(255,180,0,0.6)';
                    for(let i=-2;i<=2;i++){const a=i*Math.PI/8;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.sin(a)*h*1.5,-Math.cos(a)*h*1.5);ctx.stroke();}

                } else if (symbolType==='kyoukai') {
                    // 敷地境界標: 小さな四角＋対角線
                    ctx.strokeStyle='#000'; ctx.lineWidth=lw*1.3;
                    ctx.strokeRect(-hw,-hh,w,h);
                    ctx.beginPath(); ctx.moveTo(-hw,-hh); ctx.lineTo(hw,hh); ctx.moveTo(hw,-hh); ctx.lineTo(-hw,hh); ctx.stroke();

                } else if (symbolType==='bm') {
                    // ベンチマーク(BM): 三角形＋小円
                    ctx.strokeStyle='#000'; ctx.lineWidth=lw*1.2; ctx.fillStyle='rgba(255,255,255,0.9)';
                    ctx.beginPath(); ctx.moveTo(0,-hh); ctx.lineTo(hw,hh); ctx.lineTo(-hw,hh); ctx.closePath(); ctx.fill(); ctx.stroke();
                    ctx.beginPath(); ctx.arc(0,-hh*0.15,hw*0.22,0,Math.PI*2); ctx.stroke();

                } else if (symbolType==='engishi') {
                    // 縁石: 帯状に短いハッチング
                    ctx.strokeStyle='#000'; ctx.lineWidth=lw*1.1;
                    ctx.strokeRect(-hw,-hh,w,h);
                    ctx.lineWidth=lw*0.6;
                    for(let gx=-hw+ h*0.6; gx<hw; gx+=h*0.9){ ctx.beginPath(); ctx.moveTo(gx,-hh); ctx.lineTo(gx-h*0.5,hh); ctx.stroke(); }

                } else if (symbolType==='masu_u' || symbolType==='masu_o') {
                    // 排水桝（雨水／汚水）: 正方形＋対角線＋文字
                    const isU = symbolType==='masu_u';
                    ctx.strokeStyle = isU ? '#0066aa' : '#996600'; ctx.lineWidth=lw*1.2; ctx.fillStyle='rgba(255,255,255,0.9)';
                    ctx.strokeRect(-hw,-hh,w,h); ctx.fillRect(-hw,-hh,w,h);
                    ctx.beginPath(); ctx.moveTo(-hw,-hh); ctx.lineTo(hw,hh); ctx.moveTo(hw,-hh); ctx.lineTo(-hw,hh); ctx.stroke();
                    ctx.rotate(-rotation);
                    ctx.fillStyle = isU ? '#0066aa' : '#996600'; ctx.font=`bold ${h*0.55}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
                    ctx.fillText(isU ? '雨' : '汚', 0, 0);

                } else if (symbolType==='gas_meter') {
                    ctx.strokeStyle='#cc6600'; ctx.lineWidth=lw;
                    ctx.fillStyle='rgba(255,200,150,0.2)'; ctx.fillRect(-hw,-hh,w,h); ctx.strokeRect(-hw,-hh,w,h);
                    ctx.rotate(-rotation);
                    ctx.fillStyle='#cc6600'; ctx.font=`bold ${h*0.5}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
                    ctx.fillText('G', 0, 0);

                } else if (symbolType==='shed') {
                    // 物置: 矩形＋切妻屋根線＋扉線
                    ctx.strokeStyle='#333'; ctx.lineWidth=lw;
                    ctx.fillStyle='rgba(200,200,200,0.15)'; ctx.fillRect(-hw,-hh,w,h); ctx.strokeRect(-hw,-hh,w,h);
                    ctx.lineWidth=lw*0.7;
                    ctx.beginPath(); ctx.moveTo(-hw,0); ctx.lineTo(0,-hh*0.7); ctx.lineTo(hw,0); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(0,hh*0.15); ctx.lineTo(0,hh); ctx.stroke();

                } else if (symbolType==='wheel_stop') {
                    // 車止め: 塗りつぶした角丸長方形
                    ctx.strokeStyle='#333'; ctx.fillStyle='#666'; ctx.lineWidth=lw;
                    const rad = Math.min(hh, w*0.15);
                    ctx.beginPath();
                    ctx.moveTo(-hw+rad,-hh); ctx.lineTo(hw-rad,-hh); ctx.quadraticCurveTo(hw,-hh,hw,-hh+rad);
                    ctx.lineTo(hw,hh-rad); ctx.quadraticCurveTo(hw,hh,hw-rad,hh);
                    ctx.lineTo(-hw+rad,hh); ctx.quadraticCurveTo(-hw,hh,-hw,hh-rad);
                    ctx.lineTo(-hw,-hh+rad); ctx.quadraticCurveTo(-hw,-hh,-hw+rad,-hh);
                    ctx.closePath(); ctx.fill(); ctx.stroke();

                } else if (symbolType==='trash_area') {
                    // ゴミ置き場: 枠＋斜線ハッチ
                    ctx.strokeStyle='#555'; ctx.lineWidth=lw;
                    ctx.strokeRect(-hw,-hh,w,h);
                    ctx.lineWidth=lw*0.5; ctx.strokeStyle='rgba(85,85,85,0.6)';
                    for (let gx=-hw+h*0.3; gx<hw; gx+=h*0.45) { ctx.beginPath(); ctx.moveTo(Math.max(-hw,gx-h), -hh); ctx.lineTo(Math.min(hw,gx), hh); ctx.stroke(); }

                } else if (symbolType==='retaining_wall') {
                    // 擁壁・土留め: 帯＋片側ハッチ（断面表記の簡易版）
                    ctx.strokeStyle='#333'; ctx.lineWidth=lw;
                    ctx.strokeRect(-hw,-hh,w,h);
                    ctx.lineWidth=lw*0.6;
                    for (let gx=-hw; gx<hw; gx+=h*0.6) { ctx.beginPath(); ctx.moveTo(gx,-hh); ctx.lineTo(gx-h*0.5,hh); ctx.stroke(); }

                } else if (symbolType==='bike_rack') {
                    // 駐輪スペース: 枠＋区画の縦線
                    ctx.strokeStyle='#333'; ctx.lineWidth=lw;
                    ctx.strokeRect(-hw,-hh,w,h);
                    ctx.lineWidth=lw*0.6;
                    for (let gx=-hw+w*0.16; gx<hw; gx+=w*0.16) { ctx.beginPath(); ctx.moveTo(gx,-hh); ctx.lineTo(gx,hh); ctx.stroke(); }

                } else if (symbolType==='clothesline') {
                    // 物干し: 支柱2本＋物干し竿
                    ctx.strokeStyle='#555'; ctx.lineWidth=lw*1.2;
                    ctx.beginPath(); ctx.arc(0,-hh*0.85,w*0.4,0,Math.PI*2); ctx.stroke();
                    ctx.beginPath(); ctx.arc(0, hh*0.85,w*0.4,0,Math.PI*2); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(0,-hh*0.85); ctx.lineTo(0,hh*0.85); ctx.stroke();

                } else if (symbolType==='nameplate') {
                    // 表札・インターホン: 縦長の矩形＋横線2本
                    ctx.strokeStyle='#444'; ctx.fillStyle='rgba(200,200,200,0.2)'; ctx.lineWidth=lw;
                    ctx.fillRect(-hw,-hh,w,h); ctx.strokeRect(-hw,-hh,w,h);
                    ctx.lineWidth=lw*0.5;
                    ctx.beginPath(); ctx.moveTo(-hw,-hh*0.2); ctx.lineTo(hw,-hh*0.2); ctx.stroke();
                    ctx.beginPath(); ctx.arc(0,hh*0.5,hh*0.18,0,Math.PI*2); ctx.stroke();

                } else if (symbolType==='level_mark') {
                    // レベル表示: ▽記号＋高さの値（GL/FL/BM等）
                    ctx.strokeStyle='#000'; ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.lineWidth=lw*1.2;
                    ctx.beginPath();
                    ctx.moveTo(-hw*0.55,-hh*0.5); ctx.lineTo(hw*0.55,-hh*0.5); ctx.lineTo(0,hh*0.35); ctx.closePath();
                    ctx.fill(); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(-hw*0.8,-hh*0.5); ctx.lineTo(hw*0.8,-hh*0.5); ctx.stroke();
                    ctx.rotate(-rotation);
                    ctx.fillStyle='#000'; ctx.font=`bold ${h*0.45}px sans-serif`; ctx.textAlign='left'; ctx.textBaseline='middle';
                    ctx.fillText(ent.levelText || '±0', hw*0.9, -hh*0.15);
                    ctx.restore(); return;

                } else if (symbolType==='slope_arrow') {
                    // 水勾配矢印: 矢印方向は水下（低い方）を示す
                    ctx.strokeStyle='#000'; ctx.fillStyle='#000'; ctx.lineWidth=lw*1.1;
                    ctx.beginPath(); ctx.moveTo(-hw,0); ctx.lineTo(hw*0.75,0); ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(hw,0); ctx.lineTo(hw*0.6,-h*0.22); ctx.lineTo(hw*0.6,h*0.22); ctx.closePath(); ctx.fill();

                } else if (symbolType==='fence_mesh') {
                    // フェンス（メッシュ）: 横線＋格子状の縦線
                    ctx.strokeStyle='#333'; ctx.lineWidth=lw;
                    ctx.beginPath(); ctx.moveTo(-hw,-hh); ctx.lineTo(hw,-hh); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(-hw,hh); ctx.lineTo(hw,hh); ctx.stroke();
                    ctx.lineWidth=lw*0.6;
                    for (let gx=-hw; gx<=hw; gx+=w*0.12) { ctx.beginPath(); ctx.moveTo(gx,-hh); ctx.lineTo(gx,hh); ctx.stroke(); }

                } else if (symbolType==='fence_board') {
                    // フェンス（目隠し・板塀）: 隙間なく並ぶ縦板
                    ctx.strokeStyle='#333'; ctx.lineWidth=lw;
                    ctx.strokeRect(-hw,-hh,w,h);
                    ctx.lineWidth=lw*0.5;
                    for (let gx=-hw+w*0.08; gx<hw; gx+=w*0.08) { ctx.beginPath(); ctx.moveTo(gx,-hh); ctx.lineTo(gx,hh); ctx.stroke(); }

                } else {
                    ctx.strokeStyle='#333'; ctx.lineWidth=lw; ctx.strokeRect(-hw,-hh,w,h);
                }

                ctx.rotate(-rotation);
                ctx.fillStyle='#222'; ctx.font=`${1.8}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='top';
                ctx.fillText(sym.label,0,hh+1);
                ctx.restore();
            };
            // ── 透視図 立方体描画（1点透視）──
            // front面の4頂点からVPへの相対位置を一様スケールしてback面を生成
            // これによりback面が常に正しい矩形（平行四辺形ではなく相似形）になる
            const createPerspCubeEntities = (frontCenter, size, vpPoint, color, lineWidth) => {
                const half = size / 2;
                // front面の4頂点（正方形）
                const front = [
                    { x: frontCenter.x - half, y: frontCenter.y - half },
                    { x: frontCenter.x + half, y: frontCenter.y - half },
                    { x: frontCenter.x + half, y: frontCenter.y + half },
                    { x: frontCenter.x - half, y: frontCenter.y + half },
                ];
                // VPがfront面の中心とほぼ同じ高さ（誤差±0.5mm未満）の場合のみ拒否
                // それ以外はVPがどれだけ近くても自動的に描画可能（スケールを安全範囲にクランプ）
                const vpDistY = vpPoint.y - frontCenter.y;
                if (Math.abs(vpDistY) < 0.5) {
                    return { error: 'VPが立方体の中心と水平に重なっています。VPを上下にずらしてください。' };
                }
                // back面のスケール係数: VPが近いほど奥行きが浅くなる（極端に潰れないよう0.3〜0.75でクランプ）
                const rawRatio = Math.abs(vpDistY) / (half * 3);
                const scale = Math.max(0.3, Math.min(0.75, rawRatio));
                const back = front.map(p => ({
                    x: vpPoint.x + scale * (p.x - vpPoint.x),
                    y: vpPoint.y + scale * (p.y - vpPoint.y),
                }));

                const ents = [];
                const addLine = (a, b) => ents.push({
                    id: Date.now() + Math.random() * 9999,
                    type: TOOLS.LINE, p1: { ...a }, p2: { ...b },
                    color, lineWidth, layer: 'drawing'
                });

                // front面の4辺
                for (let i = 0; i < 4; i++) addLine(front[i], front[(i + 1) % 4]);
                // back面の4辺
                for (let i = 0; i < 4; i++) addLine(back[i], back[(i + 1) % 4]);
                // 奥行きの接続線（4本）
                for (let i = 0; i < 4; i++) addLine(front[i], back[i]);

                return { entities: ents };
            };

            const fitViewToScreen = useCallback(() => {

                const p = PAPERS[paper];
                if (!p) return;
                const w = size.width;
                const h = size.height;
                const margin = 40;

                // 用紙範囲
                let minX = 0, minY = 0, maxX = p.width, maxY = p.height;

                // 図形が用紙の外にはみ出している場合も含めてフィットさせる
                entities.forEach(ent => {
                    try {
                        const pts = [];
                        if (ent.p1) pts.push(ent.p1);
                        if (ent.p2) pts.push(ent.p2);
                        if (ent.c && ent.r != null) { pts.push({x: ent.c.x-ent.r, y: ent.c.y-ent.r}, {x: ent.c.x+ent.r, y: ent.c.y+ent.r}); }
                        if (ent.pts) pts.push(...ent.pts);
                        if (ent.type === TOOLS.RECT && ent.p1) pts.push({x: ent.p1.x+ent.w, y: ent.p1.y+ent.h});
                        pts.forEach(pt => {
                            if (pt && isFinite(pt.x) && isFinite(pt.y)) {
                                minX = Math.min(minX, pt.x); maxX = Math.max(maxX, pt.x);
                                minY = Math.min(minY, pt.y); maxY = Math.max(maxY, pt.y);
                            }
                        });
                    } catch (e) {}
                });

                const boundsW_px = (maxX - minX) * MM_TO_PX;
                const boundsH_px = (maxY - minY) * MM_TO_PX;
                let fitScale = Math.min((w - margin*2) / boundsW_px, (h - margin*2) / boundsH_px);
                if (!isFinite(fitScale) || fitScale <= 0) fitScale = 0.5;
                const offsetX = (w - (maxX + minX) * MM_TO_PX * fitScale) / 2;
                const offsetY = (h - (maxY + minY) * MM_TO_PX * fitScale) / 2;
                viewRef.current = { scale: fitScale, offsetX: offsetX, offsetY: offsetY };
                setForceUpdate(prev => prev + 1);
            }, [paper, size, entities]);

            useEffect(() => {
                if (window.lucide) { try { window.lucide.createIcons(); } catch(e) { console.warn('lucide createIcons failed', e); } }

                // ── 動的に追加される data-lucide 要素を自動検知してSVG化 ──
                // (条件付きレンダリングで新規追加されるアイコンが空のまま残るバグの対策)
                const iconObserver = new MutationObserver((mutations) => {
                    let hasNewIcon = false;
                    for (const m of mutations) {
                        m.addedNodes.forEach(node => {
                            if (node.nodeType !== 1) return;
                            // 未変換の <i data-lucide> のみ検知（変換後のSVGはdata-lucideを保持するため除外しないと無限ループになる）
                            if (node.tagName === 'I' && node.hasAttribute?.('data-lucide')) hasNewIcon = true;
                            else if (node.querySelector?.('i[data-lucide]')) hasNewIcon = true;
                        });
                    }
                    if (hasNewIcon && window.lucide) {
                        try { window.lucide.createIcons(); } catch(e) { /* ignore */ }
                    }
                });
                iconObserver.observe(document.body, { childList: true, subtree: true });

                const ro = new ResizeObserver(entries => {
                    for (let entry of entries) {
                        const { width, height } = entry.contentRect;
                        if (width > 0 && height > 0) setSize({ width, height });
                    }
                });
                if (containerRef.current) ro.observe(containerRef.current);
                const handleKey = (e) => {
                    const tag = e.target.tagName;
                    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
                    if (e.key === 's' || e.key === 'S') setSnapEnabled(prev => !prev);
                    if (e.key === 'o' || e.key === 'O') setOrthoMode(prev => !prev);
                    if (e.key === 'g' || e.key === 'G') setAlignGuideEnabled(prev => !prev);
                    // Delete / Backspace: 選択エンティティを削除
                    if ((e.key === 'Delete' || e.key === 'Backspace') && selectedIds.current.size > 0) {
                        const next = entities.filter(ent => !selectedIds.current.has(ent.id));
                        setEntities(next); pushHistory(next);
                        selectedIds.current = new Set();
                        setSelVersion(v => v+1);
                    }
                    // Escape: 選択解除
                    if (e.key === 'Escape') {
                        selectedIds.current = new Set();
                        setSelVersion(v => v+1);
                        setTempPoints([]);
                    }
                };
                window.addEventListener('keydown', handleKey);
                return () => { ro.disconnect(); iconObserver.disconnect(); window.removeEventListener('keydown', handleKey); };
            }, []);

            useEffect(() => {
                if (size.width > 50 && size.height > 50) fitViewToScreen();
            }, [size, paper]); 

            const pushHistory = (newEntities) => {
                const newHistory = history.current.slice(0, historyIndex.current + 1);
                newHistory.push(JSON.parse(JSON.stringify(newEntities)));
                history.current = newHistory;
                historyIndex.current = newHistory.length - 1;
            };

            const undo = () => {
                if (historyIndex.current > 0) {
                    historyIndex.current--;
                    setEntities(history.current[historyIndex.current]);
                } else if (historyIndex.current === 0) {
                    historyIndex.current = -1;
                    setEntities([]);
                }
            };

            const addEntity = (entity) => {
                const newEnts = [...entities, { ...entity, id: Date.now(), layer: 'drawing', lineWidth: strokeWidth, lineStyle: strokeStyleType, color: strokeColor }];
                setEntities(newEnts);
                pushHistory(newEnts);
                setTempPoints([]);
            };

            const importSurveyData = (groups, options) => {
                let allPoints = [];
                groups.forEach(g => {
                    g.points.forEach(p => {
                        if (!isNaN(parseFloat(p.x)) && !isNaN(parseFloat(p.y))) {
                            allPoints.push({ x: parseFloat(p.x), y: parseFloat(p.y) });
                        }
                    });
                });

                if (allPoints.length < 2) {
                    alert("有効な座標が2点以上見つかりませんでした。");
                    return;
                }

                let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                allPoints.forEach(p => {
                    if (p.x < minX) minX = p.x;
                    if (p.x > maxX) maxX = p.x;
                    if (p.y < minY) minY = p.y;
                    if (p.y > maxY) maxY = p.y;
                });

                const rawWidth = maxX - minX;
                const rawHeight = maxY - minY;
                const centerX = minX + rawWidth / 2;
                const centerY = minY + rawHeight / 2;

                let scaleToUse = options.autoScale ? drawingScale : (options.manualScale || drawingScale);
                const p = PAPERS[paper];
                const contentW = p.width - 40; 
                const contentH = p.height - 40;

                // 単位変換係数
                // 測量座標系（平面直角座標）はメートル単位 → mm に変換するため ×1000
                // 非測量座標（CAD等の相対座標）はmm単位とみなす
                const unitMult = options.isSurveyCoords ? 1000 : 1;

                if (options.autoScale) {
                    // rawWidth/Height はメートル → mm換算して縮尺を決定
                    const w_mm = rawWidth * unitMult;
                    const h_mm = rawHeight * unitMult;
                    const sX = w_mm / contentW;
                    const sY = h_mm / contentH;
                    let idealS = Math.max(sX, sY);
                    
                    const standardScales = SCALES.map(s => s.val).sort((a,b)=>a-b);
                    let found = false;
                    for (let s of standardScales) {
                        if (s >= idealS) {
                            scaleToUse = s;
                            found = true;
                            break;
                        }
                    }
                    if (!found) scaleToUse = Math.ceil(idealS / 10) * 10;
                    setDrawingScale(scaleToUse);
                } else {
                    // 指定縮尺を使用
                    scaleToUse = options.manualScale || drawingScale;
                    setDrawingScale(scaleToUse);
                }

                const paperCX = p.width / 2;
                const paperCY = p.height / 2;
                const newEntities = [];

                groups.forEach((group, gIdx) => {
                    const validPoints = group.points.filter(p => !isNaN(parseFloat(p.x)) && !isNaN(parseFloat(p.y)));
                    if (validPoints.length === 0) return;

                    const mappedPoints = validPoints.map(pt => {
                        const px = parseFloat(pt.x);
                        const py = parseFloat(pt.y);
                        const relX = (px - centerX) * unitMult; 
                        const relY = (py - centerY) * unitMult;
                        
                        let canvasX, canvasY;
                        if (options.isSurveyCoords) {
                            canvasX = paperCX + (relY / scaleToUse);
                            canvasY = paperCY - (relX / scaleToUse);
                        } else {
                            canvasX = paperCX + (relX / scaleToUse);
                            canvasY = paperCY - (relY / scaleToUse);
                        }
                        return { x: canvasX, y: canvasY, name: pt.name, rawX: px, rawY: py };
                    });

                    // Create lines
                    for (let i = 0; i < mappedPoints.length - 1; i++) {
                        newEntities.push({
                            id: Date.now() + gIdx * 1000 + i,
                            type: TOOLS.LINE,
                            p1: { x: mappedPoints[i].x, y: mappedPoints[i].y },
                            p2: { x: mappedPoints[i+1].x, y: mappedPoints[i+1].y },
                            layer: 'drawing', lineWidth: strokeWidth, color: strokeColor
                        });
                    }

                    if (options.closeLoop && mappedPoints.length > 2) {
                        const last = mappedPoints[mappedPoints.length - 1];
                        const first = mappedPoints[0];
                        newEntities.push({
                            id: Date.now() + gIdx * 1000 + 999,
                            type: TOOLS.LINE,
                            p1: { x: last.x, y: last.y },
                            p2: { x: first.x, y: first.y },
                            layer: 'drawing', lineWidth: strokeWidth, color: strokeColor
                        });
                    }

                    // Add Text for points
                    if (options.drawPoints) {
                        mappedPoints.forEach((mp, idx) => {
                            const label = mp.name ? mp.name : "";
                            if(label) {
                                newEntities.push({
                                    id: Date.now() + gIdx * 1000 + 500 + idx,
                                    type: 'text_label',
                                    p1: { x: mp.x, y: mp.y },
                                    text: label,
                                    layer: 'annotation', color: '#000000' // Black
                                });
                            }
                        });
                    }
                });

                setEntities(prev => [...prev, ...newEntities]);
                pushHistory([...entities, ...newEntities]);
            };

            // ── 多重線のオフセット配列を計算（中心線あり/なし、左右の本数を指定可能）──
            const computeMlineOffsets = (spacing, leftCount, rightCount, showCenter) => {
                const offsets = [];
                if (showCenter) offsets.push(0);
                for (let i = 1; i <= rightCount; i++) offsets.push(i * spacing);
                for (let i = 1; i <= leftCount; i++) offsets.push(-i * spacing);
                return offsets;
            };

            // ── 角（頂点）付近のクリックから、隣接する2辺を自動検出 ──
            const findCornerAt = (pos) => {
                const threshold = 10 / viewRef.current.scale;

                // 1. 既存の線分同士で端点が近接している（＝角を成している）箇所を探す
                const lines = entities.filter(e => e.type === TOOLS.LINE);
                for (let i = 0; i < lines.length; i++) {
                    for (let j = i + 1; j < lines.length; j++) {
                        const a = lines[i], b = lines[j];
                        const pairs = [[a.p1,b.p1],[a.p1,b.p2],[a.p2,b.p1],[a.p2,b.p2]];
                        for (const [pa, pb] of pairs) {
                            if (Geo.dist(pa, pb) < 1 && Geo.dist(pos, pa) < threshold) return [a, b];
                        }
                    }
                }

                // 2. 矩形の頂点付近をクリックした場合は、その場で分解して隣接2辺を返す
                for (const ent of entities) {
                    if (ent.type !== TOOLS.RECT) continue;
                    const p1 = ent.p1, p2 = {x:ent.p1.x+ent.w, y:ent.p1.y}, p3 = {x:ent.p1.x+ent.w, y:ent.p1.y+ent.h}, p4 = {x:ent.p1.x, y:ent.p1.y+ent.h};
                    const corners = [p1, p2, p3, p4];
                    for (let k = 0; k < 4; k++) {
                        if (Geo.dist(pos, corners[k]) < threshold) {
                            const edgePts = [[p1,p2],[p2,p3],[p3,p4],[p4,p1]];
                            const newLines = edgePts.map((edge) => ({
                                id: Date.now() + Math.random() * 999,
                                type: TOOLS.LINE, p1: edge[0], p2: edge[1],
                                color: ent.color || strokeColor, lineWidth: ent.lineWidth || strokeWidth, lineStyle: ent.lineStyle, layer: 'drawing'
                            }));
                            const next = entities.filter(e => e.id !== ent.id).concat(newLines);
                            setEntities(next); pushHistory(next);
                            return [newLines[(k+3)%4], newLines[k]];
                        }
                    }
                }
                return null;
            };

            const findLineEntityAt = (pos) => {
                const threshold = 6 / viewRef.current.scale;
                let best = null, bestDist = Infinity, bestIsRect = false, bestEdgeIndex = -1;
                entities.forEach(ent => {
                    if (ent.type === TOOLS.LINE) {
                        const d = Geo.distToSegment(pos, ent.p1, ent.p2);
                        if (d < threshold && d < bestDist) { best = ent; bestDist = d; bestIsRect = false; }
                    } else if (ent.type === TOOLS.RECT) {
                        const p1 = ent.p1, p2 = {x:ent.p1.x+ent.w, y:ent.p1.y}, p3 = {x:ent.p1.x+ent.w, y:ent.p1.y+ent.h}, p4 = {x:ent.p1.x, y:ent.p1.y+ent.h};
                        const edges = [[p1,p2],[p2,p3],[p3,p4],[p4,p1]];
                        edges.forEach((edge, idx) => {
                            const d = Geo.distToSegment(pos, edge[0], edge[1]);
                            if (d < threshold && d < bestDist) { best = ent; bestDist = d; bestIsRect = true; bestEdgeIndex = idx; }
                        });
                    }
                });
                if (!best) return null;
                if (!bestIsRect) return best;
                // 矩形の辺をクリックした場合は、その場で矩形を4本の線分に分解してから該当の辺を返す
                const ent = best;
                const p1 = ent.p1, p2 = {x:ent.p1.x+ent.w, y:ent.p1.y}, p3 = {x:ent.p1.x+ent.w, y:ent.p1.y+ent.h}, p4 = {x:ent.p1.x, y:ent.p1.y+ent.h};
                const edgePts = [[p1,p2],[p2,p3],[p3,p4],[p4,p1]];
                const newLines = edgePts.map((edge) => ({
                    id: Date.now() + Math.random() * 999,
                    type: TOOLS.LINE, p1: edge[0], p2: edge[1],
                    color: ent.color || strokeColor, lineWidth: ent.lineWidth || strokeWidth, lineStyle: ent.lineStyle, layer: 'drawing'
                }));
                const next = entities.filter(e => e.id !== ent.id).concat(newLines);
                setEntities(next); pushHistory(next);
                return newLines[bestEdgeIndex];
            };

            // ── フィレット（角丸め）／面取り 計算 ──
            const computeCornerOp = (lineA, lineB, mode, amount) => {
                // 2直線（無限直線として）の交点を求める
                const x1=lineA.p1.x, y1=lineA.p1.y, x2=lineA.p2.x, y2=lineA.p2.y;
