                                let inside=false;
                                for (let j=0,k=pts3.length-1;j<pts3.length;k=j++) {
                                    if (((pts3[j].y>pt.y)!==(pts3[k].y>pt.y))&&pt.x<(pts3[k].x-pts3[j].x)*(pt.y-pts3[j].y)/(pts3[k].y-pts3[j].y)+pts3[j].x) inside=!inside;
                                }
                                hit=inside;
                            } else if (ent.type === 'symbol') {
                                const sym2=GAIKO_SYMBOLS[ent.symbolType]||{};
                                const r3=sym2.r?sym2.r/drawingScale:Math.max((sym2.w||400),(sym2.h||400))/drawingScale/2;
                                hit=Geo.dist(pt,ent.p1)<r3+hitRadius;
                            } else if (ent.type === 'text_label') {
                                hit=Geo.dist(pt,ent.p1)<hitRadius*4;
                            } else if (ent.type === 'mline') {
                                if (ent.p1 && ent.p2) {
                                    const ddx=ent.p2.x-ent.p1.x, ddy=ent.p2.y-ent.p1.y;
                                    const lenSq=ddx*ddx+ddy*ddy;
                                    const offs = ent.offsets || computeMlineOffsets(ent.spacing||100, ent.leftCount!=null?ent.leftCount:1, ent.rightCount!=null?ent.rightCount:1, ent.showCenter!==false);
                                    const maxOff = offs.length ? Math.max(...offs.map(Math.abs)) : 0;
                                    if (lenSq>0) { const t=Math.max(0,Math.min(1,((pt.x-ent.p1.x)*ddx+(pt.y-ent.p1.y)*ddy)/lenSq)); const nx2=ent.p1.x+t*ddx-pt.x,ny2=ent.p1.y+t*ddy-pt.y; hit=Math.sqrt(nx2*nx2+ny2*ny2)<maxOff+hitRadius; }
                                }
                            } else if (ent.type === 'leader') {
                                hit = Geo.distToSegment(pt, ent.p1, ent.p2) < hitRadius*2 || Geo.dist(pt, ent.p2) < hitRadius*4;
                            }
                            if (hit) { hitId=ent.id; break; }
                        }
                        if (hitId !== null) {
                            if (e.shiftKey) { if(selectedIds.current.has(hitId))selectedIds.current.delete(hitId); else selectedIds.current.add(hitId); }
                            else { if(!selectedIds.current.has(hitId)) selectedIds.current=new Set([hitId]); }
                            // ドラッグ開始
                            const origPositions={};
                            entities.forEach(ent=>{ if(selectedIds.current.has(ent.id)) origPositions[ent.id]=JSON.parse(JSON.stringify(ent)); });
                            dragState.current={ startWorld:{x:pt.x,y:pt.y}, origPositions };
                        } else {
                            if (!e.shiftKey) selectedIds.current=new Set();
                            selBoxRef.current={ x1:pt.x, y1:pt.y, x2:pt.x, y2:pt.y };
                        }
                        setSelVersion(v=>v+1);
                        return;
                    }
                    else {
                        if (tempPoints.length === 0) { setTempPoints([pt]); }
                        else {
                            const start = tempPoints[0];
                            let newEnt = null;
                            if (tool === TOOLS.LINE) newEnt = { type: TOOLS.LINE, p1: start, p2: pt };
                            else if (tool === TOOLS.RECT) newEnt = { type: TOOLS.RECT, p1: start, w: pt.x - start.x, h: pt.y - start.y };
                            else if (tool === TOOLS.CIRCLE) newEnt = { type: TOOLS.CIRCLE, c: start, r: Geo.dist(start, pt) };
                            else if (tool === TOOLS.DIM) newEnt = { type: TOOLS.DIM, p1: start, p2: pt, fontSize: dimFontSize, textOffset: dimTextOffset };
                            else if (tool === TOOLS.MLINE) newEnt = { type: 'mline', p1: start, p2: pt, spacing: mlineSpacing, leftCount: mlineLeftCount, rightCount: mlineRightCount, showCenter: mlineShowCenter };
                            else if (tool === TOOLS.BLOCK_WALL) {
                                const walls = createBlockWallEntities(start, pt, blockThickness, blockPosition, strokeColor, strokeWidth, fenceType, fenceHeight);
                                const next = [...entities, ...walls];
                                setEntities(next); pushHistory(next);
                                setTempPoints([pt]); return;
                            }
                            if (newEnt) addEntity(newEnt);
                        }
                    }
                }
            };

            const handleMouseMove = (e) => {
                if (isPanning.current) {
                    const dx = e.clientX - lastMouse.current.x; const dy = e.clientY - lastMouse.current.y;
                    viewRef.current.offsetX += dx; viewRef.current.offsetY += dy; lastMouse.current = { x: e.clientX, y: e.clientY }; return;
                }
                const wPos = getMouseWorldPos(e);
                if (tool === TOOLS.ERASER && e.buttons === 1) eraseEntityAt(wPos);

                // ── SELECT: エンティティドラッグ移動 ──
                if (tool === TOOLS.SELECT && e.buttons === 1 && dragState.current) {
                    const ds = dragState.current;
                    let dx2 = wPos.x - ds.startWorld.x;
                    let dy2 = wPos.y - ds.startWorld.y;

                    // ── スマートガイド（中心・端をパワーポイント/Canva風に整列） ──
                    if (!e.altKey) {
                        const p = PAPERS[paper];
                        // 移動中の選択図形全体の外接矩形（オフセット適用前の元位置＋現在のdx2/dy2）
                        let selMinX=Infinity, selMinY=Infinity, selMaxX=-Infinity, selMaxY=-Infinity;
                        Object.values(ds.origPositions).forEach(orig => {
                            const bb = getEntityBBox(orig);
                            if (!bb) return;
                            selMinX=Math.min(selMinX,bb.minX); selMaxX=Math.max(selMaxX,bb.maxX);
                            selMinY=Math.min(selMinY,bb.minY); selMaxY=Math.max(selMaxY,bb.maxY);
                        });
                        if (isFinite(selMinX)) {
                            const curMinX=selMinX+dx2, curMaxX=selMaxX+dx2, curCx=(curMinX+curMaxX)/2;
                            const curMinY=selMinY+dy2, curMaxY=selMaxY+dy2, curCy=(curMinY+curMaxY)/2;

                            // 候補となるX/Y値を収集（用紙中心・用紙端、および他の図形の端・中心）
                            const candX = [0, p.width, p.width/2];
                            const candY = [0, p.height, p.height/2];
                            entities.forEach(ent => {
                                if (selectedIds.current.has(ent.id)) return;
                                const bb = getEntityBBox(ent);
                                if (!bb) return;
                                candX.push(bb.minX, bb.maxX, bb.cx);
                                candY.push(bb.minY, bb.maxY, bb.cy);
                            });

                            const thresh = 6 / (viewRef.current.scale * MM_TO_PX); // 画面上約6pxに相当するワールド距離
                            const guides = [];
                            let bestDx = null, bestDxDist = thresh;
                            [['minX',curMinX],['maxX',curMaxX],['cx',curCx]].forEach(([key,val]) => {
                                candX.forEach(c => {
                                    const d = Math.abs(val - c);
                                    if (d < bestDxDist) { bestDxDist = d; bestDx = { adjust: c - val, pos: c }; }
                                });
                            });
                            let bestDy = null, bestDyDist = thresh;
                            [['minY',curMinY],['maxY',curMaxY],['cy',curCy]].forEach(([key,val]) => {
                                candY.forEach(c => {
                                    const d = Math.abs(val - c);
                                    if (d < bestDyDist) { bestDyDist = d; bestDy = { adjust: c - val, pos: c }; }
                                });
                            });
                            // ※ 強制的に位置を吸着させると、グリッド配置など思い通りの位置に置けなくなるため、
                            //   ガイド線はあくまで「ここが中心/端ですよ」という視覚的な目印として表示するのみとし、
                            //   図形の位置（dx2/dy2）は一切変更しない。
                            if (bestDx) { guides.push({ type: 'v', pos: bestDx.pos }); }
                            if (bestDy) { guides.push({ type: 'h', pos: bestDy.pos }); }
                            smartGuides.current = guides;
                        }
                    } else {
                        smartGuides.current = [];
                    }

                    setEntities(prev => prev.map(ent => {
                        if (!selectedIds.current.has(ent.id)) return ent;
                        const orig = ds.origPositions[ent.id];
                        if (!orig) return ent;
                        const moved = JSON.parse(JSON.stringify(orig));
                        const mv = (p) => p ? { x: p.x+dx2, y: p.y+dy2 } : p;
                        if (moved.p1) moved.p1 = mv(moved.p1);
                        if (moved.p2) moved.p2 = mv(moved.p2);
                        if (moved.c)  moved.c  = mv(moved.c);
                        if (moved.pts) moved.pts = moved.pts.map(mv);
                        return moved;
                    }));
                    setSelVersion(v=>v+1);
                    return;
                }

                // ── SELECT: ラバーバンド更新 ──
                if (tool === TOOLS.SELECT && e.buttons === 1 && selBoxRef.current) {
                    selBoxRef.current.x2 = wPos.x;
                    selBoxRef.current.y2 = wPos.y;
                    setSelVersion(v=>v+1);
                }

                if (isDraggingVP.current) {
                    if (isDraggingVP.current === 'vp1') setVp1(wPos);
                    if (isDraggingVP.current === 'vp2') setVp2(wPos);
                    return;
                }
                currentMousePos.current = wPos;
                snapPos.current = calculateSnap(wPos, e.shiftKey);
            };

            const handleMouseUp = () => {
                isPanning.current = false;
                isDraggingVP.current = null;
                if (tool === TOOLS.ERASER) setTempPoints([]);

                // SELECT: ドラッグ確定
                if (tool === TOOLS.SELECT) {
                    if (dragState.current) {
                        pushHistory([...entities]);
                        dragState.current = null;
                        smartGuides.current = [];
                        setForceUpdate(prev => prev + 1);
                    }
                    // ラバーバンド選択確定
                    if (selBoxRef.current) {
                        const sb = selBoxRef.current;
                        const x1=Math.min(sb.x1,sb.x2), x2=Math.max(sb.x1,sb.x2);
                        const y1=Math.min(sb.y1,sb.y2), y2=Math.max(sb.y1,sb.y2);
                        if (x2-x1 > 1 || y2-y1 > 1) {
                            entities.forEach(ent => {
                                let cx2=null,cy2=null;
                                if (ent.p1) { cx2=ent.p1.x; cy2=ent.p1.y; }
                                else if (ent.c) { cx2=ent.c.x; cy2=ent.c.y; }
                                else if (ent.pts?.length) { cx2=ent.pts[0].x; cy2=ent.pts[0].y; }
                                if (cx2!==null && cx2>=x1&&cx2<=x2&&cy2>=y1&&cy2<=y2) selectedIds.current.add(ent.id);
                            });
                        }
                        selBoxRef.current = null;
                        setSelVersion(v=>v+1);
                    }
                }
            };
            const handleWheel = (e) => {
                if (e.ctrlKey) return; e.preventDefault();
                const v = viewRef.current; const factor = 1 + (e.deltaY > 0 ? -0.1 : 0.1);
                const rect = canvasRef.current.getBoundingClientRect();
                const mx = (e.clientX - rect.left) * (canvasRef.current.width/rect.width);
                const my = (e.clientY - rect.top) * (canvasRef.current.height/rect.height);
                const before = Geo.unprojectPoint(mx, my, { scale: v.scale*MM_TO_PX, offsetX: v.offsetX, offsetY: v.offsetY });
                v.scale = Math.max(0.1, Math.min(v.scale * factor, 50));
                const after = Geo.unprojectPoint(mx, my, { scale: v.scale*MM_TO_PX, offsetX: v.offsetX, offsetY: v.offsetY });
                v.offsetX += (after.x - before.x) * v.scale * MM_TO_PX; v.offsetY += (after.y - before.y) * v.scale * MM_TO_PX;
            };

            // ── 選択中のテキストエンティティ（文字ツールで配置したもの）を取得 ──
            const selectedTextEntity = (tool === TOOLS.SELECT && selectedIds.current.size === 1)
                ? entities.find(e => selectedIds.current.has(e.id) && e.type === 'text_label' && e.userText === true) || null
                : null;

            const updateSelectedText = (patch, commit = true) => {
                if (!selectedTextEntity) return;
                const next = entities.map(e => e.id === selectedTextEntity.id ? { ...e, ...patch } : e);
                setEntities(next);
                if (commit) pushHistory(next);
            };

            const deleteSelectedText = () => {
                if (!selectedTextEntity) return;
                const next = entities.filter(e => e.id !== selectedTextEntity.id);
                setEntities(next); pushHistory(next);
                selectedIds.current = new Set();
                setSelVersion(v => v + 1);
            };

            // ── 選択中の線分・図形（線種変更用） ──
            const LINE_STYLE_TYPES = [TOOLS.LINE, TOOLS.RECT, TOOLS.CIRCLE, TOOLS.POLYGON];
            const selectedLineEntities = (tool === TOOLS.SELECT && selectedIds.current.size >= 1)
                ? entities.filter(e => selectedIds.current.has(e.id) && LINE_STYLE_TYPES.includes(e.type))
                : [];

            const updateSelectedLineStyle = (newStyle) => {
                if (selectedLineEntities.length === 0) return;
                const idSet = new Set(selectedLineEntities.map(e => e.id));
                const next = entities.map(e => idSet.has(e.id) ? { ...e, lineStyle: newStyle } : e);
                setEntities(next); pushHistory(next);
            };

            // ── 選択中の外構シンボル（大きさ変更用） ──
            const selectedSymbolEntity = (tool === TOOLS.SELECT && selectedIds.current.size === 1)
                ? entities.find(e => selectedIds.current.has(e.id) && e.type === 'symbol') || null
                : null;

            const updateSelectedSymbolScale = (newScale, commit = true) => {
                if (!selectedSymbolEntity) return;
                const next = entities.map(e => e.id === selectedSymbolEntity.id ? { ...e, scale: newScale } : e);
                setEntities(next);
                if (commit) pushHistory(next);
            };

            const updateSelectedSymbolLevelText = (newText, commit = true) => {
                if (!selectedSymbolEntity) return;
                const next = entities.map(e => e.id === selectedSymbolEntity.id ? { ...e, levelText: newText } : e);
                setEntities(next);
                if (commit) pushHistory(next);
            };

            // ── 選択中の寸法（文字サイズ・上下位置を個別設定） ──
            const selectedDimEntity = (tool === TOOLS.SELECT && selectedIds.current.size === 1)
                ? entities.find(e => selectedIds.current.has(e.id) && e.type === TOOLS.DIM) || null
                : null;

            const updateSelectedDim = (patch, commit = true) => {
                if (!selectedDimEntity) return;
                const next = entities.map(e => e.id === selectedDimEntity.id ? { ...e, ...patch } : e);
                setEntities(next);
                if (commit) pushHistory(next);
            };

            return (
                <div className="w-full h-screen flex flex-col bg-[#2d2d2d]">
                    <div className="h-14 bg-gray-900 border-b border-gray-700 flex items-center px-4 space-x-4 flex-shrink-0">
                        <div className="text-xl font-bold text-white flex items-center cursor-pointer hover:text-blue-300 transition-colors" onClick={() => setShowHelpModal(true)} title="このツールについて"><i data-lucide="pen-tool" className="mr-2"></i> Drafting</div>
                        <div className="h-8 w-px bg-gray-700 mx-2"></div>
                        <select className="bg-white text-black text-sm border border-gray-400 rounded p-1" value={paper} onChange={(e) => setPaper(e.target.value)}>{Object.entries(PAPERS).map(([k, v]) => <option key={k} value={k}>{v.name}</option>)}</select>
                        
                        <div className="flex items-center text-white text-xs space-x-2 bg-gray-800 p-1 rounded border border-gray-600">
                            <select value={drawingScale} onChange={(e)=>setDrawingScale(Number(e.target.value))} className="border-0 bg-white text-black py-0">{SCALES.map(s => (<option key={s.val} value={s.val}>{s.label}</option>))}</select>
                            <select value={unit} onChange={(e)=>setUnit(e.target.value)} className="border-0 bg-white text-black py-0"><option value="mm">mm</option><option value="mm_nolabel">mm（単位非表示）</option><option value="m">m</option></select>
                            <select value={strokeWidth} onChange={(e)=>setStrokeWidth(Number(e.target.value))} className="border-0 bg-white text-black py-0">{LINE_WIDTHS.map(w => (<option key={w.val} value={w.val}>{w.label}</option>))}</select>
                            <select value={strokeStyleType} onChange={(e)=>setStrokeStyleType(e.target.value)} className="border-0 bg-white text-black py-0">{Object.entries(LINE_STYLES).map(([k, s]) => (<option key={k} value={k}>{s.label}</option>))}</select>
                            <input type="color" value={strokeColor} onChange={(e)=>setStrokeColor(e.target.value)} className="w-5 h-5 rounded border-0 p-0 bg-transparent"/>
                        </div>

                        <div className="flex bg-gray-800 rounded overflow-hidden border border-gray-600">
                            {[ {id:GRID_MODES.ORTHO, l:'直交'}, {id:GRID_MODES.ISO, l:'ISO'}, {id:GRID_MODES.PERSP_1, l:'1点'}, {id:GRID_MODES.PERSP_2, l:'2点'} ].map(m => (<button key={m.id} onClick={() => setGridMode(m.id)} className={`px-3 py-1 text-xs ${gridMode === m.id ? 'bg-blue-600 text-white' : 'text-gray-300 hover:bg-gray-700'}`}>{m.l}</button>))}
                        </div>
                        
                        <button 
                            onClick={() => setGridConfig(prev => ({...prev, visible: !prev.visible}))} 
                            className={`ml-2 border border-gray-600 p-1 rounded hover:bg-gray-700 ${gridConfig.visible ? 'bg-blue-600 text-white' : 'bg-gray-800 text-gray-400'}`} 
                            title="グリッド表示切替"
                        >
                            <i data-lucide="layout-grid" className="w-5 h-5"></i>
                        </button>

                        <div className="relative">
                            <button onClick={() => setShowGridPanel(!showGridPanel)} className="bg-gray-800 border border-gray-600 p-1 rounded hover:bg-gray-700" title="グリッド設定"><i data-lucide="settings-2" className="w-5 h-5 text-gray-300"></i></button>
                            {showGridPanel && (
                                <div className="absolute top-10 left-0 w-64 panel z-50 text-sm">
                                    <h4 className="font-bold mb-2 border-b border-gray-500 pb-1">グリッド設定</h4>
                                    <div className="mb-2"><label className="block text-xs text-gray-300 mb-1">カラー</label><input type="color" value={gridConfig.color} onChange={(e) => setGridConfig({...gridConfig, color: e.target.value})} className="w-full h-8"/></div>
                                    <div className="mb-2"><label className="block text-xs text-gray-300 mb-1">不透明度</label><input type="range" min="0.1" max="1" step="0.1" value={gridConfig.opacity} onChange={(e) => setGridConfig({...gridConfig, opacity: parseFloat(e.target.value)})}/></div>
                                    <div className="mb-2"><label className="block text-xs text-gray-300 mb-1">間隔（mm）</label><input type="number" min="1" max="5000" step="1" value={gridConfig.spacing} onChange={(e) => setGridConfig({...gridConfig, spacing: Math.max(1, parseFloat(e.target.value)||1)})} className="w-full bg-white text-black border border-gray-400 rounded px-1 py-0.5"/></div>
                                    <div className="mb-2"><label className="block text-xs text-gray-300 mb-1">線の太さ（{(gridConfig.lineWidth ?? 0.15).toFixed(2)}mm）</label><input type="range" min="0.05" max="1" step="0.05" value={gridConfig.lineWidth ?? 0.15} onChange={(e) => setGridConfig({...gridConfig, lineWidth: parseFloat(e.target.value)})}/></div>
                                    <div className="mb-2 flex items-center"><input type="checkbox" id="subgrid" checked={gridConfig.showSubGrid} onChange={(e)=>setGridConfig({...gridConfig, showSubGrid: e.target.checked})} className="mr-2"/><label htmlFor="subgrid" className="text-xs text-gray-300">補助線</label></div>
                                    {gridConfig.showSubGrid && <div className="mb-2 flex items-center pl-6"><span className="text-xs text-gray-300 mr-2">分割数:</span><input type="number" min="2" max="20" value={gridConfig.subDivisions} onChange={(e)=>{ const raw = e.target.value; if(raw === '') { setGridConfig({...gridConfig, subDivisions: raw}); return; } const n = parseInt(raw); if(!isNaN(n)) setGridConfig({...gridConfig, subDivisions: n}); }} onBlur={(e)=>{ let n = parseInt(e.target.value); if(isNaN(n)) n = 2; n = Math.max(2, Math.min(20, n)); setGridConfig({...gridConfig, subDivisions: n}); }} className="w-16 bg-white text-black border border-gray-400 rounded px-1 py-0.5 focus:outline-none focus:border-blue-500"/></div>}
                                    {gridMode === GRID_MODES.ISO && <div className="mb-2"><label className="block text-xs text-gray-300">ISO角度</label><input type="range" min="15" max="75" step="5" value={gridConfig.isoAngle} onChange={(e)=>setGridConfig({...gridConfig, isoAngle: parseInt(e.target.value)})}/></div>}
                                </div>
                            )}
                        </div>
                        
                        <div className="h-8 w-px bg-gray-700 mx-2"></div>
                        <button onClick={() => setShowSurveyModal(true)} className="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1 rounded text-sm flex items-center shadow-lg transform transition active:scale-95">
                            <i data-lucide="table" className="w-4 h-4 mr-1"></i> 測量入力
                        </button>

                        <button onClick={fitViewToScreen} onMouseEnter={(e) => showTip(e, 'フィット（図面全体を画面に合わせる）')} onMouseLeave={hideTip} className="bg-gray-800 border border-gray-600 px-2 py-1 rounded hover:bg-gray-700 ml-2 flex items-center gap-1 text-gray-300 text-xs">
                            <i data-lucide="scan" className="w-4 h-4"></i>
                            <span>フィット</span>
                        </button>

                        {/* スナップ ON/OFF トグル */}
                        <button
                            onClick={() => setSnapEnabled(prev => !prev)}
                            title={snapEnabled ? 'スナップON（クリックでフリーモードへ） [S]' : 'フリーモード（クリックでスナップONへ） [S]'}
                            className={`ml-2 flex items-center gap-1.5 px-3 py-1 rounded border text-xs font-bold transition-all ${
                                snapEnabled
                                    ? 'bg-blue-700 border-blue-500 text-white'
                                    : 'bg-gray-900 border-orange-500 text-orange-400'
                            }`}
                        >
                            <i data-lucide={snapEnabled ? 'magnet' : 'pencil-line'} className="w-4 h-4"></i>
                            <span>{snapEnabled ? 'スナップ' : 'フリー'}</span>
                            <span className="opacity-40 text-xs">[S]</span>
                        </button>

                        {/* 直交モード ON/OFF トグル（水平・垂直に固定して真っ直ぐ線を引く） */}
                        <button
                            onClick={() => setOrthoMode(prev => !prev)}
                            title={orthoMode ? '直交モードON（水平・垂直に固定） [O]' : '直交モードOFF（クリックでON、または描画中はShiftで一時的に15°刻み） [O]'}
                            className={`ml-2 flex items-center gap-1.5 px-3 py-1 rounded border text-xs font-bold transition-all ${
                                orthoMode
                                    ? 'bg-blue-700 border-blue-500 text-white'
                                    : 'bg-gray-900 border-gray-600 text-gray-400'
                            }`}
                        >
                            <i data-lucide="move-horizontal" className="w-4 h-4"></i>
                            <span>直交</span>
                            <span className="opacity-40 text-xs">[O]</span>
                        </button>

                        {/* アライメント・トラッキングガイド ON/OFF トグル */}
                        <button
                            onClick={() => setAlignGuideEnabled(prev => !prev)}
                            title={alignGuideEnabled ? 'アライメントガイドON（既存図形との水平・垂直の目印を表示） [G]' : 'アライメントガイドOFF [G]'}
                            className={`ml-2 flex items-center gap-1.5 px-3 py-1 rounded border text-xs font-bold transition-all ${
                                alignGuideEnabled
                                    ? 'bg-cyan-700 border-cyan-500 text-white'
                                    : 'bg-gray-900 border-gray-600 text-gray-400'
                            }`}
                        >
                            <i data-lucide="crosshair" className="w-4 h-4"></i>
                            <span>ガイド</span>
                            <span className="opacity-40 text-xs">[G]</span>
                        </button>

                        {/* 描画中の計測値（寸法プレビュー）表示 ON/OFF トグル */}
                        <button
                            onClick={() => setShowLiveMeasure(prev => !prev)}
                            title={showLiveMeasure ? '描画中の計測値表示ON（クリックでOFFへ）' : '描画中の計測値表示OFF（クリックでONへ）'}
                            className={`ml-2 flex items-center gap-1.5 px-3 py-1 rounded border text-xs font-bold transition-all ${
                                showLiveMeasure
                                    ? 'bg-cyan-700 border-cyan-500 text-white'
                                    : 'bg-gray-900 border-gray-600 text-gray-400'
                            }`}
                        >
                            <i data-lucide="ruler" className="w-4 h-4"></i>
                            <span>計測値</span>
                        </button>

                        {/* 描画中のプレビュー線: 点線／実線 トグル */}
                        <button
                            onClick={() => setPreviewDashed(prev => !prev)}

                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    {/* 多角形の塗り材料 */}
                                    <div className="mb-4">
                                        <div className="text-xs text-gray-400 font-bold mb-2 uppercase tracking-wider border-b border-gray-700 pb-1">多角形 — 面材料</div>
                                        <label className="flex items-center gap-2 mb-2 text-xs bg-gray-800 border border-gray-600 rounded px-2 py-1.5 cursor-pointer hover:bg-gray-700">
                                            <input type="checkbox" checked={bwFill} onChange={(e) => setBwFill(e.target.checked)} />
                                            <span className="text-gray-200">白黒モード（着色なし・JIS製図ハッチングのみ）</span>
                                        </label>
                                        {['基本','石・タイル','自然','木材'].map(cat => (
                                            <div key={cat} className="mb-2">
                                                <div className="text-xs text-gray-500 mb-1">{cat}</div>
                                                <div className="grid grid-cols-2 gap-1">
                                                    {Object.entries(MATERIALS).filter(([,m]) => m.category === cat || (!m.category && cat === '基本')).map(([key, mat]) => (
                                                        <button key={key} onClick={() => setSelectedMaterial(key)}
                                                            className={`px-2 py-1.5 rounded text-xs font-bold border transition-all flex items-center gap-1.5 ${selectedMaterial === key ? 'border-green-500 bg-green-900 text-green-300' : 'border-gray-600 bg-gray-800 text-gray-300 hover:bg-gray-700'}`}>
                                                            {mat.color && <span className="w-3 h-3 rounded-sm border border-gray-500 flex-shrink-0" style={{background: mat.color}}></span>}
                                                            {mat.label}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                        <div className="text-xs text-gray-500 mt-1">ダブルクリックまたは始点クリックで確定</div>
                                    </div>

                                    {/* ブロック壁設定 */}
                                    <div>
                                        <div className="text-xs text-gray-400 font-bold mb-2 uppercase tracking-wider border-b border-gray-700 pb-1">ブロック壁設定</div>
                                        <div className="mb-2">
                                            <div className="text-xs text-gray-400 mb-1">厚さ</div>
                                            <div className="grid grid-cols-2 gap-1">
                                                {BLOCK_THICKNESSES.map(t => (
                                                    <button key={t.val} onClick={() => setBlockThickness(t.val)}
                                                        className={`px-2 py-1 rounded text-xs font-mono border transition-all ${blockThickness === t.val ? 'border-blue-500 bg-blue-900 text-blue-300' : 'border-gray-600 bg-gray-800 text-gray-300 hover:bg-gray-700'}`}>
                                                        {t.label}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                        <div>
                                            <div className="text-xs text-gray-400 mb-1">積み位置</div>
                                            <div className="grid grid-cols-3 gap-1">
                                                {Object.entries(BLOCK_POSITIONS).map(([key, pos]) => (
                                                    <button key={key} onClick={() => setBlockPosition(key)}
                                                        className={`px-2 py-1 rounded text-xs font-bold border transition-all ${blockPosition === key ? 'border-orange-500 bg-orange-900 text-orange-300' : 'border-gray-600 bg-gray-800 text-gray-300 hover:bg-gray-700'}`}>
                                                        {pos.label}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>

                                        {/* フェンス設定 */}
                                        <div className="mt-3 border-t border-gray-700 pt-3">
                                            <div className="text-xs text-gray-400 font-bold mb-2 uppercase tracking-wider">フェンス（ブロック天端）</div>
                                            <div className="mb-2">
                                                <div className="text-xs text-gray-400 mb-1">種別</div>
                                                <div className="grid grid-cols-2 gap-1">
                                                    {Object.entries(FENCE_TYPES).map(([key, ft]) => (
                                                        <button key={key} onClick={() => setFenceType(key)}
                                                            className={`px-2 py-1 rounded text-xs font-bold border transition-all ${fenceType === key ? 'border-blue-400 bg-blue-900 text-blue-200' : 'border-gray-600 bg-gray-800 text-gray-300 hover:bg-gray-700'}`}>
                                                            {ft.label}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                            {fenceType !== 'none' && (
                                                <div>
                                                    <div className="text-xs text-gray-400 mb-1">高さ</div>
                                                    <div className="grid grid-cols-4 gap-1">
                                                        {FENCE_HEIGHTS.map(h => (
                                                            <button key={h} onClick={() => setFenceHeight(h)}
                                                                className={`px-1 py-1 rounded text-xs font-mono border transition-all ${fenceHeight === h ? 'border-blue-400 bg-blue-900 text-blue-200' : 'border-gray-600 bg-gray-800 text-gray-300 hover:bg-gray-700'}`}>
                                                                {h >= 1000 ? (h/1000).toFixed(1)+'m' : h+'mm'}
                                                            </button>
                                                        ))}
                                                    </div>
                                                    <div className="text-xs text-blue-400 mt-1 bg-blue-950 rounded p-1">
                                                        ブロック天端にフェンスを自動配置
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                        <div className="text-xs text-gray-500 mt-2">クリック→クリックで連続描画、右クリックで終了</div>
                                    </div>
                                    </div>{/* /スクロール領域 */}
                                </div>
                            )}

                             <div className="absolute bottom-4 left-4 bg-black/60 text-white p-3 rounded text-xs pointer-events-none backdrop-blur-sm z-50">
                                <p className="font-bold mb-1">操作</p>
                                <ul className="space-y-1 text-gray-300">
                                    <li>🖱 左: 描画 / 確定</li><li>🖱 中: パン</li><li>🖱 右: 中断</li><li>🖱 ホイール: ズーム</li>
                                    <li>⇧ Shift: 角度拘束</li><li>Alt+ドラッグ: VP移動</li>
                                    {tool === TOOLS.POLYGON && <li className="text-green-400">多角形: ダブルクリックで確定</li>}
                                    {tool === TOOLS.BLOCK_WALL && <li className="text-blue-400">ブロック: クリックで連続描画</li>}
                                    {tool === TOOLS.LEADER && <li className="text-yellow-400">{tempPoints.length === 0 ? '引き出し線: ①矢印の先端をクリック' : '引き出し線: ②文字を置く位置をクリック→文字入力'}</li>}
                                    {tool === TOOLS.MLINE && <li className="text-yellow-400">{tempPoints.length === 0 ? '多重線: ①始点をクリック' : '多重線: ②終点をクリックして確定'}</li>}
                                    {tool === TOOLS.ARC && <li className="text-yellow-400">{tempPoints.length === 0 ? '円弧: ①中心をクリック' : tempPoints.length === 1 ? '円弧: ②開始点をクリック（半径が決まります）' : '円弧: ③終了点をクリックして確定（動かした方向に弧が伸びます）'}</li>}
                                    {(tool === TOOLS.FILLET || tool === TOOLS.CHAMFER) && (
                                        <li className="text-yellow-400">
                                            {!cornerOpFirst.current
                                                ? `${tool === TOOLS.FILLET ? '角丸め' : '面取り'}: 角（頂点）をクリックで即実行、または線を1本目クリック`
                                                : `${tool === TOOLS.FILLET ? '角丸め' : '面取り'}: 隣り合う2本目の線をクリックすると確定`}
                                        </li>
                                    )}
                                </ul>
                            </div>
                        </div>
                    </div>
                    
                    <SurveyTableModal 
                        isOpen={showSurveyModal} 
                        onClose={() => setShowSurveyModal(false)} 
                        onImport={importSurveyData}
                    />

                    {/* ── ヘルプ／このツールについて モーダル ── */}
                    {showHelpModal && (
                        <div className="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4" onClick={() => setShowHelpModal(false)}>
                            <div className="bg-gray-800 border border-gray-600 rounded-lg shadow-2xl w-full max-w-2xl max-h-[85vh] overflow-y-auto text-gray-200" onClick={(e) => e.stopPropagation()}>
                                <div className="flex justify-between items-center px-5 py-3 border-b border-gray-700 sticky top-0 bg-gray-800">
                                    <div className="flex items-center gap-2 text-lg font-bold text-white">
                                        <i data-lucide="pen-tool"></i> Drafting について
                                    </div>
                                    <button onClick={() => setShowHelpModal(false)} className="text-gray-400 hover:text-white p-1">
                                        <i data-lucide="x" className="w-5 h-5"></i>
                                    </button>
                                </div>
                                <div className="px-5 py-4 text-sm space-y-4">
                                    <p className="text-gray-300">建築・外構図面をブラウザ上で作成するための製図ツールです。直交／アイソメ／1点透視／2点透視のグリッドに対応し、寸法・線種・材料ハッチング・外構シンボルなどを使って図面を仕上げられます。</p>

                                    <div>
                                        <div className="font-bold text-blue-400 mb-1">基本ツール</div>
                                        <ul className="list-disc list-inside space-y-0.5 text-gray-300">
                                            <li>選択：図形の移動・削除、プロパティ変更。ドラッグ中は中心・他図形との整列を示すピンクのガイド線が出ます（位置を強制はしません）</li>
                                            <li>線分／矩形／円：基本図形の作成</li>
                                            <li>寸法：距離を自動計算して表示。文字サイズ・上下位置は個別に調整可能</li>
                                            <li>文字：クリックで自由にテキストを配置、向き（回転）・サイズ・色を変更可能</li>
                                            <li>多重線：2クリックで平行線をまとめて描画。間隔（1mm〜）、中心線から左右何本引くか、中心線自体を表示するかを個別に設定可能</li>
                                            <li>引き出し線：①矢印の先端→②文字の位置の順にクリックし、文字を入力。矢印＋折れ線＋水平の引き出し線＋文字、という形式で描画</li>
                                            <li>角丸め／面取り：角（頂点）を1回クリックするだけで、隣接する2辺を自動検出して丸め・面取り。矩形の辺もクリックすると自動的に線分に分解されて対応。半径・距離は数値入力で指定</li>
                                            <li>消しゴム：クリックした図形を削除</li>
                                        </ul>
                                    </div>

                                    <div>
                                        <div className="font-bold text-green-400 mb-1">外構ツール（左アイコン列の「外構設定」から表示）</div>
                                        <ul className="list-disc list-inside space-y-0.5 text-gray-300">
                                            <li>多角形（塗り）：頂点をクリックして囲み、コンクリート・地盤・砂利・砕石・タイル・芝など20種類の材料ハッチングで塗り分け</li>
                                            <li>正多角形：辺数を指定して配置</li>
                                            <li>ブロック壁：厚み・段数を指定して連続描画、フェンス追加も可能</li>
                                            <li>外構シンボル：門柱・カーポート・車・植栽（広葉樹／針葉樹）・郵便ポスト・エアコン室外機・物置・車止め・ゴミ置き場・擁壁・フェンス・方位記号・敷地境界標・ベンチマーク・排水桝（雨水／汚水）・量水器・ガスメーター・屋外消火栓・レベル表示（GL/FL/BM、高さの数値を入力可能）・水勾配矢印など約50種類。大きさは倍率（配置前・配置後どちらも数値入力可）で調整可能</li>
                                            <li>白黒モード：材料の色塗りをやめ、国交省「建築工事設計図書作成基準」に準じたハッチングのみの表示に切り替え（実際の図面に近い見た目になります）</li>
                                        </ul>
                                    </div>

                                    <div>
                                        <div className="font-bold text-purple-400 mb-1">線種・単位</div>
                                        <ul className="list-disc list-inside space-y-0.5 text-gray-300">
                                            <li>実線・破線・点線・一点鎖線・二点鎖線を切り替えて描画可能。既存の線分・矩形・円・多角形を選択して後から変更することもできます</li>
                                            <li>単位はmm／mm（単位非表示）／mから選択可能</li>
                                            <li>文字サイズ・線の間隔・角丸めの半径など、寸法に関わる数値はすべてキーボードで直接入力できます（1mm単位はもちろん、0.5mmなど細かい値も指定可）</li>
                                        </ul>
                                    </div>

                                    <div>
                                        <div className="font-bold text-orange-400 mb-1">補助機能（まっすぐ・きれいに描くための支援）</div>
                                        <ul className="list-disc list-inside space-y-0.5 text-gray-300">
                                            <li>直交モード：ONにすると線分・寸法・多重線などが水平・垂直方向にだけ固定されます（矩形には影響しません）</li>
                                            <li>アライメント・トラッキングガイド：描画中にカーソルが既存図形の点と水平・垂直に揃うと、水色の点線ガイドと丸印が表示されます。離れた図形とも位置を揃えられます</li>
                                            <li>グリッド設定：間隔やサブグリッドの細分化数を調整可能。拡大すると、見た目のグリッドとスナップできる点の両方が自動的に細かくなります</li>
                                        </ul>
                                    </div>

                                    <div>
                                        <div className="font-bold text-yellow-400 mb-1">ショートカット</div>
                                        <ul className="list-disc list-inside space-y-0.5 text-gray-300">
                                            <li><span className="font-mono bg-gray-700 px-1 rounded">S</span>：スナップON/OFF切り替え</li>
                                            <li><span className="font-mono bg-gray-700 px-1 rounded">O</span>：直交モードON/OFF切り替え</li>
                                            <li><span className="font-mono bg-gray-700 px-1 rounded">G</span>：アライメント・トラッキングガイドON/OFF切り替え</li>
                                            <li><span className="font-mono bg-gray-700 px-1 rounded">Shift</span>（描画中、直交モードOFF時）：15°単位で角度を拘束</li>
                                            <li><span className="font-mono bg-gray-700 px-1 rounded">Delete</span> / <span className="font-mono bg-gray-700 px-1 rounded">Backspace</span>：選択中の図形を削除</li>
                                            <li><span className="font-mono bg-gray-700 px-1 rounded">Esc</span>：描画中の操作をキャンセル</li>
                                        </ul>
                                    </div>

                                    <div>
                                        <div className="font-bold text-cyan-400 mb-1">その他</div>
                                        <ul className="list-disc list-inside space-y-0.5 text-gray-300">
                                            <li>「フィット」ボタン：用紙だけでなく、描かれている図形もすべて含めて画面に収まる位置・拡大率に戻す</li>
                                            <li>「測量入力」：座標データの一括入力・取り込み</li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
